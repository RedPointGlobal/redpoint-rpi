  #   endpoint: https://my-openai.openai.azure.com/
  #   deployment: gpt-5.1
  #   api_version: "2023-07-01-preview"
  #   temperature: "0.5"
  #   search_endpoint: https://my-search.search.windows.net
  #   vector_profile: vector-profile-000000000000
