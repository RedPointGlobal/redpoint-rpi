#            data:
#              - key: ConnectionString_Logging_Database
#                objectName: V7-ConnectionString-LoggingDatabase
#              - key: ConnectionString_Operations_Database
#                objectName: V7-ConnectionString-Operations-Database
#        parameters:
#          keyvaultName: my-keyvault
#          resourceGroup: my-resourceGroup
#          subscriptionId: 00000000-0000-0000-0000-000000000000
#          clientID: 00000000-0000-0000-0000-000000000000
#          tenantId: 00000000-0000-0000-0000-000000000000
#          usePodIdentity: "false"
#          useVMManagedIdentity: "false"
#          useWorkloadIdentity: "true"
#          syncSecret: "true"
#          enable-secret-rotation: "true"
#        objects:
#          - objectName: "V7-ConnectionString-Operations"
#            objectType: secret
#          - objectName: "V7-ConnectionString-LoggingDatabase"
#           objectType: secret

# ============================================================
#  INGRESS
# ============================================================
ingress:
  controller:
    # false if supplying your own controller
    enabled: true                         
  mode: private  
  # kubernetes | acm                          
  certificateSource: kubernetes
  # TLS entries (rendered when certificateSource=kubernetes).                                                      
  # For most deployments a single entry is all you need.                                                           
  # tls[].hosts only matters when you have multiple certs and need to                                              
  # tell Kubernetes which cert covers which hostnames. Most users never set it
  tls:
    - secretName: ingress-tls
#      hosts:
#        - rpi-interactionapi.example.com
#        - rpi-deploymentapi.example.com
#        - rpi-integrationapi.example.com
#        - rpi-realtimeapi.example.com
#        - rpi-callbackapi.example.com
#        - rpi-queuereader.example.com
#    - secretName: certsecrets             
#      hosts:
#        - rpi-custom.example.com
  domain: example.com
  subnetName: my-subnet-name  # required if mode=private
  # required if certificateSource=acm
  certificateArn: your_acm_certificate_arn  
  privateLink:
    azure:
      enabled: false
  # Service hostnames subdomains that are prepended to domain,
  hosts:
    config: rpi-deploymentapi
    client: rpi-interactionapi
    integration: rpi-integrationapi
    realtime: rpi-realtimeapi
    callbackapi: rpi-callbackapi           
    queuereader: rpi-queuereader
    rabbitmqconsole: rabbitmq-console
    smartactivation: rpi-web
#  annotations:
#    cert-manager.io/cluster-issuer: letsencrypt-prod-azure
#   kubernetes.io/ingress.allow-http: "false"
#    nginx.org/client-max-body-size: 4096m
#    nginx.org/location-snippets: |
#      access_log /var/log/nginx/access.log main;
#    nginx.org/proxy-read-timeout: 3600s
#    nginx.org/proxy-send-timeout: 3600s
  claimName: my-ingress-class-name
  
# ----------------------------------------------------------
#  REALTIME API
# ----------------------------------------------------------
realtimeapi:
  enabled: true
  multitenant: false
  replicas: 1
  rpiClientID: 00000000-0000-0000-0000-000000000000
  # mongodb | azureredis | redis | inMemorySql | googlebigtable
  cacheProvider:
    enabled: true
    provider: mongodb
    mongodb:
      databaseName: RealtimeCacheDB
      collectionName: RealtimeCacheCollection
  # azureservicebus | amazonsqs | googlepubsub | azureeventhubs | rabbitmq | azurestorage
  queueProvider:
    enabled: true
    provider: azureservicebus
    queueNames:
      formQueuePath: RPIWebFormSubmission
      eventsQueuePath: RPIWebEvents
      cacheOutputQueuePath: RPIWebCacheData
      recommendationsQueuePath: RPIWebRecommendations
      listenerQueuePath: RPIQueueListener
      callbackServiceQueuePath: RPICallbackApiQueue
    rabbitmq:
      rabbitmqSettings:
        username: redpoint-rpi
        # Use existing PVC
        existingClaim: pvc-rabbitmq-data             
        # Use dynamic provisioning (default)
        volumeClaimTemplates:
          # Disable to use existing PVC
          enabled: true                        
          storage: 100Gi
          storageClassName: default
  resources:
    requests:
      cpu: "100m"
      memory: 1Gi
    limits:
      memory: 1Gi
  autoscaling:
    enabled: false
  logging:
    realtimeapi:
      console: None
    realtimeagent:
      console: true

# ----------------------------------------------------------
#  Callback API
# ----------------------------------------------------------
callbackapi:
  enabled: true
  channelLabel: mpulse # or SendGrid
  replicas: 1
  multitenancy: 
    enabled: false
   # To add a new callbackapi, simply append a new entry to this list.
   # To remove one, delete or comment out the corresponding entry.
#  instances:
#    - name: "tenant1"
#     replicas: 1
  resources:
    requests:
      cpu: "100m"
      memory: 1Gi
    limits:
      memory: 1Gi
  autoscaling:
    enabled: false
  logging:
    Console: None

# ----------------------------------------------------------
#  Execution Services
# ----------------------------------------------------------
executionservice:
  enabled: true
  replicas: 1
  internalCache:
    enabled: true
    # filesystem | azureblob
    provider: filesystem
    backupToOpsDBInterval: "00:00:20"
    maxNumberRetries: "100"
    maxRetryDelay: "00:02:00"
    failOnPrimaryDataLoss: true
    failOnCacheConnectionError: true
    redisSettings:
      # Use existing PVC
      existingClaim: my-efs-pvc
      # Use dynamic provisioning (default)
      volumeClaimTemplates:
        # Disable to use existing PVC
        enabled: true
        storage: 100Gi
        storageClassName: default
  jobExecution:
    workflowPrioritization:
      enabled: true
      maxConcurrentWorkflowActivities: 24
    maxThreadsPerExecutionService: 50
    luxScisendRequestCount: 5
  resources:
    requests:
      cpu: "100m"
      memory: 1Gi
    limits:
      memory: 1Gi
  logging:
    Console: Trace
  podAnnotations:
    config.linkerd.io/skip-outbound-ports: "443"
    config.linkerd.io/proxy-outbound-connect-timeout: "240000ms"

# ----------------------------------------------------------
#  Interaction API
# ----------------------------------------------------------
interactionapi:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: "100m"
      memory: 1Gi
    limits:
      memory: 1Gi
  autoscaling:
    enabled: false
  logging:
    Console: None
  podAnnotations:
    config.linkerd.io/skip-outbound-ports: "443"
    config.linkerd.io/proxy-outbound-connect-timeout: "240000ms"

# ----------------------------------------------------------
#  Integration API 
# ----------------------------------------------------------
integrationapi:
  enabled: true
  replicas: 1
  username: admin@noemail.com
  password: my-password
  resources:
    requests:
      cpu: "100m"
      memory: 1Gi
    limits:
      memory: 1Gi
  autoscaling:
    enabled: false
  logging:
    Console: None

# ----------------------------------------------------------
#  Node Manager
# ----------------------------------------------------------
nodemanager:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 1Gi
    limits:
      memory: 1Gi
  autoscaling:
    enabled: false
  logging:
    Console: None

# ----------------------------------------------------------
#  Deployment API
# ----------------------------------------------------------
deploymentapi:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 1Gi
    limits:
      memory: 1Gi

# ----------------------------------------------------------
#  Queue Reader
# ----------------------------------------------------------
queuereader:
  enabled: true
  replicas: 1
  isFormProcessingEnabled: false
  isEventProcessingEnabled: true
  isCacheProcessingEnabled: true
  queueListenerEnabled: true
  isCallbackServiceProcessingEnabled: true
  realtimeConfiguration:
    isDistributed: true
  internalQueues:
    rabbitmqSettings:
      hostname: rpi-queuereader-rabbitmq
      username: redpoint-rpi
      virtualhost: /
      # Use existing PVC
      existingClaim: pvc-rabbitmq-data
      # Use dynamic provisioning (default)
      volumeClaimTemplates:
        # Disable to use existing PVC
        enabled: true
        storage: 100Gi
        storageClassName: default
  internalCache:
    # Use existing PVC
    existingClaim: pvc-rabbitmq-data
    # Use dynamic provisioning (default)
    volumeClaimTemplates:
      # Disable to use existing PVC
      enabled: true
      storage: 100Gi
      storageClassName: default
  tenantIds:
    - 00000000-0000-0000-0000-000000000000
  errorQueuePath: listenerQueueError 
  nonActiveQueuePath: listenerQueueNonActive
  resources:
    requests:
      cpu: "100m"
      memory: 1Gi
    limits:
      memory: 1Gi
  autoscaling:
    enabled: false
  logging:
    Console: None
    
# ----------------------------------------------------------
#  Rebrandly API
# ----------------------------------------------------------
rebrandly:
  enabled: false
  redisSettings:
    # Use existing PVC
    existingClaim: my-efs-pvc
    # Use dynamic provisioning (default)
    volumeClaimTemplates:
      # Disable to use existing PVC
      enabled: true
      storage: 50Gi
      storageClassName: efs-sc
      accessModes: ReadWriteOnce
# ----------------------------------------------------------
