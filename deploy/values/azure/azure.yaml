# ============================================================
# PRODUCTION ENVIRONMENT
# ============================================================
# Only set values that differ from chart defaults.
# See values-reference.yaml for all available keys.
# ============================================================

global:
  deployment:
    # azure | amazon | google | selfhosted
    platform: azure                      
    images:
      repository: rg1acrpub.azurecr.io/docker/redpointglobal/releases
      tag: "7.6.20260212.1413"
      imagePullPolicy: Always
      imagePullSecret:
        enabled: false
        name: redpoint-rpi
    # Optional: set the pod's timezone (e.g., "America/New_York"); leave empty to use default UTC
    podTimezone: "America/Los_Angeles"

# ----------------------------------------------------------
#  Database
# ----------------------------------------------------------
databases:
  operational:
    # sqlserver | postgrsql
    provider: sqlserver
    server_host: my-sqlserver-host
    server_username: my-sqlserver-username
    server_password: my-sqlserver-host-password
    pulse_database_name: Pulse
    pulse_logging_database_name: Pulse_Logging

  # ==========================
  # Data Warehouse Providers
  # ==========================
  # snowflake | bigquery | databricks
  datawarehouse:

    # Snowflake
    snowflake:
      enabled: true

# ----------------------------------------------------------
#  Cloud Identity & Secrets
# ----------------------------------------------------------
cloudIdentity:
  enabled: true
  serviceAccount:
    create: true
    name: redpoint-rpi
  azure:
    managedIdentityClientId: 00000000-0000-0000-0000-000000000000
    tenantId: 00000000-0000-0000-0000-000000000000

# ----------------------------------------------------------
#  Secrets Management
# ----------------------------------------------------------
secretsManagement:
  # kubernetes | sdk | csi
  provider: csi
  kubernetes:
    autoCreateSecrets: true
    secretName: redpoint-rpi-secrets
  sdk:
    azure:
      vaultUri: https://myvault.vault.azure.net/
      configurationReloadIntervalSeconds: 30
      useADTokenForDatabaseConnection: true
  csi:
    secretName: redpoint-rpi-secrets
    secretProviderClasses:
      - name: cert-secretprovider
        provider: azure
        secretObjects:
          - secretName: certsecrets
            type: kubernetes.io/tls
            data:
              - key: tls.key
                objectName: cert-key
              - key: tls.crt
                objectName: cert-crt
        parameters:
          keyvaultName: my-keyvault
          resourceGroup: my-resourceGroup
          subscriptionId: 00000000-0000-0000-0000-000000000000
          clientID: 00000000-0000-0000-0000-000000000000
          tenantId: 00000000-0000-0000-0000-000000000000
          usePodIdentity: "false"
          useVMManagedIdentity: "false"
          useWorkloadIdentity: "true"
        objects:
          - objectName: "my-cert"
            objectType: secret
#      - name: redpoint-rpi-secrets
#        provider: azure
#        secretObjects:
#          - secretName: redpoint-rpi-secrets
