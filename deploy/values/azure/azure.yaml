databaseUpgrade:
  enabled: true
  notification:
    enabled: true
    recipientEmail: first.last@example.com
# ============================================================
#  SMOKE TESTS
# ============================================================
# Lightweight validation pods that verify storage mounts and CSI
# secret mounts are working. Enable during initial setup or after
# infrastructure changes, then disable once verified.
#
# Two types:
#   pvc       — Mounts a PersistentVolumeClaim and writes a test file
#   csiSecret — Mounts a CSI SecretProviderClass volume and sleeps
smokeTests:
  enabled: true
  deployments:
    - name: deployment-blob
      type: pvc
      claimName: pvc-blob
      mountPath: /mnt/rpifileoutputdir
      serviceAccountName: redpoint-rpi
      image: mcr.microsoft.com/oss/nginx/nginx:1.17.3-alpine
      command:
        - "/bin/sh"
        - "-c"
        - while true; do echo $(date) >> /mnt/rpifileoutputdir/outfile; sleep 1; done
      nodeSelector:
        "kubernetes.io/os": linux

    - name: deployment-fs
      type: pvc
      claimName: pvc-blob
      mountPath: /mnt/rpifileoutputdirfs
      serviceAccountName: redpoint-rpi
      containerName: deployment-fs
      image: mcr.microsoft.com/oss/nginx/nginx:1.17.3-alpine
      command: ["/bin/sh", "-c"]
      args: ["while true; do echo $(date) >> /mnt/rpifileoutputdirfs/outfile; sleep 1; done"]
      nodeSelector:
        "kubernetes.io/os": linux

    - name: deployment-kv
      type: csiSecret
      secretProviderClass: redpoint-rpi-secrets
      mountPath: /home/secrets/secrets-store01
      serviceAccountName: redpoint-rpi
      containerName: secrets
      volumeName: secrets-store01-inline
      image: mcr.microsoft.com/oss/nginx/nginx:1.17.3-alpine
      command: ["/bin/sh", "-c", "--"]
      args: ["while true; do sleep 30; done;"]
      nodeSelector:
        nodepool: user

    - name: deployment-kv-cert
      type: csiSecret
      secretProviderClass: cert-secretprovider
      mountPath: /home/secrets/secrets-store02
      serviceAccountName: redpoint-rpi
      containerName: secrets
      volumeName: secrets-store01-cert
      image: mcr.microsoft.com/oss/nginx/nginx:1.17.3-alpine
      command: ["/bin/sh", "-c", "--"]
      args: ["while true; do sleep 30; done;"]
      nodeSelector:
        nodepool: user
        
# ----------------------------------------------------------
#  Storage Configuration
# ----------------------------------------------------------
storage:
  persistentVolumeClaims:
    FileOutputDirectory:
      enabled: true
      claimName: pvc-blob
      mountPath: /mnt/rpifileoutputdir
    Plugins:
      enabled: false
      claimName: realtimeplugins
      mountPath: /app/plugins
    DataManagementUploadDirectory:
      enabled: false
      claimName: rpdmuploaddirectory
      mountPath: /rpdmuploaddirectory
# ----------------------------------------------------------
#  Persistent Volumes
# ----------------------------------------------------------
  # Azure Blob Storage
  persistentVolumes:
    - name: rpifileoutputdir   # Logical name of the PersistentVolume (PV)
      capacity: 10Gi           # Maximum storage capacity allocated to this volume
      accessModes:
        - ReadWriteMany        # Allows multiple pods/nodes to mount with read/write access
      storageClassName: blob-fuse  # StorageClass using Azure Blob CSI driver (BlobFuse)
      reclaimPolicy: Retain    # Keeps the underlying Blob container after PVC deletion
      mountOptions:
        - -o allow_other       # Allows all users in the container to access the mounted filesystem
        - --file-cache-timeout-in-seconds=120  # Sets local file cache timeout to 120 seconds
      csi:
        driver: blob.csi.azure.com  # Azure Blob Storage CSI driver
        # Must be unique per container across the cluster
        volumeHandle: ce-platform-saceplatform-test-cfc263
        volumeAttributes:
          storageAccount: saceplatform  # Azure Storage Account name
          containerName: test-cfc263  # Azure Blob container name
          # Managed Identity Client ID used for authentication
          clientID: 00000000-0000-0000-0000-000000000000
          resourcegroup: CE-Platform
          # subscriptionid: if storage account is in a different subscription
          subscriptionid: 00000000-0000-0000-0000-000000000000
      pvc:
        claimName: pvc-blob   # Name of the PersistentVolumeClaim (PVC) that binds to this PV
      annotations:
        pv.kubernetes.io/provisioned-by: blob.csi.azure.com
        helm.sh/resource-policy: keep
        
#    # Azure File Share
    - name: rpifileoutputdirfs  # Logical name of the PersistentVolume (PV)
      capacity: 10Gi            # Maximum storage size allocated to this volume
      accessModes: 
        - ReadWriteMany         # Allows multiple pods/nodes to read and write simultaneously
      storageClassName: azurefile-csi  # StorageClass that provisions Azure File via CSI driver
      reclaimPolicy: Retain     # Keeps the underlying storage even after PVC is deleted
      mountOptions:
        - -o allow_other        # Allows other users inside the container to access the mounted volume
        - --file-cache-timeout-in-seconds=120  # Sets file cache timeout to 120 seconds
      csi:
        driver: file.csi.azure.com   # Azure File CSI driver
        # Must be unique per storage account + file share across the cluster
         # <resourceGroup>#<storageAccount>#<fileShareName>
        volumeHandle: "myresourceGroup#mystorageAccount#fileShareName"
        volumeAttributes:
          storageaccount: "mystorageAccountName"   # Azure Storage Account name (required)
          shareName: "myFileShareName"         # Azure File Share name (required)
          clientID: 00000000-0000-0000-0000-000000000000  # Managed Identity Client ID used for authentication
          # Specify if the storage account is NOT in the AKS managed resource group (MC_*)
          resourcegroup: "myresourceGroupName"
          # tenantID: $IDENTITY_TENANT only if workload identity and AKS cluster are in different Azure AD tenants
          # subscriptionid: $SUBSCRIPTION only if storage account is in a different subscription
          subscriptionid: 00000000-0000-0000-0000-000000000000
      pvc:
        claimName: rpifileoutputdir  # Name of the PersistentVolumeClaim (PVC) that will bind to this PV

# ==========================
# Service Mesh
# ==========================
serviceMesh:
  enabled: true
  # Supported: linkerd
  provider: linkerd
  # Linkerd Server CRDs for L7 traffic policy
  servers:
  - name: realtimeapi
    podSelector:
      app.kubernetes.io/name: rpi-realtimeapi
    port: 8080
    proxyProtocol: HTTP/1
  - name: executionservice
    podSelector:
      app.kubernetes.io/name: rpi-executionservice
    port: 8080
    proxyProtocol: HTTP/1
  - name: interactionapi
    podSelector:
      app.kubernetes.io/name: rpi-interactionapi
    port: 8080
    proxyProtocol: HTTP/1
  - name: integrationapi
    podSelector:
      app.kubernetes.io/name: rpi-integrationapi
    port: 8080
    proxyProtocol: HTTP/1
  - name: callbackapi
    podSelector:
      app.kubernetes.io/name: rpi-callbackapi
    port: 8080
    proxyProtocol: HTTP/1
  - name: deploymentapi
    podSelector:
      app.kubernetes.io/name: rpi-deploymentapi
    port: 8080
    proxyProtocol: HTTP/1
  - name: queuereader
    podSelector:
      app.kubernetes.io/name: rpi-queuereader
    port: 8080
    proxyProtocol: HTTP/1

