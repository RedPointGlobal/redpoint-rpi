# ============================================================
# STAGING ENVIRONMENT
# ============================================================
# Mirrors production structure with reduced resources.
# See values-reference.yaml for all available keys.
# ============================================================

global:
  deployment:
    platform: amazon                      # azure | amazon | google | selfhosted
    images:
      tag: "7.7.20260220.1524"
      imagePullSecret:
        enabled: true
        name: redpoint-rpi

# ----------------------------------------------------------
#  Database
# ----------------------------------------------------------
databases:
  operational:
    provider: sqlserver
    server_host: staging-db.cluster-xxxx.us-east-1.rds.amazonaws.com
    server_username: rpi_admin
    server_password: CHANGE_ME
    pulse_database_name: RPIPulse_Staging
    pulse_logging_database_name: RPILogging_Staging

# ----------------------------------------------------------
#  Cloud Identity & Secrets
# ----------------------------------------------------------
cloudIdentity:
  enabled: true
  provider: Amazon
  secretsManagement:
    enabled: true
    secretsProvider: awssecretsmanager
    secretName: redpoint-rpi-secrets-staging
  amazonSettings:
    credentialsType: iamRole
    roleArn: arn:aws:iam::123456789012:role/rpi-staging-role
    webIdentityTokenFile: /var/run/secrets/eks.amazonaws.com/serviceaccount/token
    stsRegionalEndpoints: regional
    region: us-east-1

# ----------------------------------------------------------
#  Ingress
# ----------------------------------------------------------
ingress:
  controller:
    enabled: true
  mode: public
  certificateSource: acm
  certificateArn: arn:aws:acm:us-east-1:123456789012:certificate/xxxxx
  domain: staging.rpi.example.com
  hosts:
    config: deploymentapi
    client: interactionapi
    integration: integrationapi
    realtime: realtimeapi
    callbackapi: callbackapi
    queuereader: queuereader
    rabbitmqconsole: rabbitmq-console
    smartactivation: smartactivation

# ----------------------------------------------------------
#  Core Services (single replica, smaller resources)
# ----------------------------------------------------------
realtimeapi:
  enabled: true
  replicas: 1
  rpiClientID: 00000000-0000-0000-0000-000000000000
  authentication:
    type: basic
    basic:
      standard: false
      forms: true
      listenerQueue: true
      recommendations: true
  cacheProvider:
    enabled: true
    provider: mongodb
    mongodb:
      connectionString: CHANGE_ME
      databaseName: PulseCache_Staging
      collectionName: RealtimeCache
  queueProvider:
    enabled: true
    provider: amazonsqs
    queueNames:
      formQueuePath: RPIWebFormSubmission-Staging
      eventsQueuePath: RPIWebEvents-Staging
      cacheOutputQueuePath: RPIWebCacheData-Staging
      recommendationsQueuePath: RPIWebRecommendations-Staging
      listenerQueuePath: RPIQueueListener-Staging
      callbackServiceQueuePath: RPICallbackApiQueue-Staging
    amazonsqs:
      credentialsType: accessKey
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      memory: 2Gi
  autoscaling:
    enabled: false

callbackapi:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      memory: 2Gi
  autoscaling:
    enabled: false

executionservice:
  enabled: true
  replicas: 1
  enableRPIAuthentication: true
  internalCache:
    enabled: true
    provider: filesystem
    redisSettings:
      type: internal
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      memory: 2Gi

interactionapi:
  enabled: true
  replicas: 1
  enableRPIAuthentication: true
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      memory: 2Gi
  autoscaling:
    enabled: false

integrationapi:
  enabled: true
  replicas: 1
  enableRPIAuthentication: true
  username: admin@noemail.com
  password: CHANGE_ME
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      memory: 2Gi
  autoscaling:
    enabled: false

nodemanager:
  enabled: true
  replicas: 1
  enableRPIAuthentication: true
  resources:
    requests:
      cpu: 250m
      memory: 1Gi
    limits:
      memory: 2Gi
  autoscaling:
    enabled: false

deploymentapi:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      memory: 1Gi

queuereader:
  enabled: true
  replicas: 1
  realtimeConfiguration:
    isDistributed: false
    tenantIds:
      - 00000000-0000-0000-0000-000000000000
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      memory: 2Gi
  autoscaling:
    enabled: false

# ----------------------------------------------------------
#  Optional Services
# ----------------------------------------------------------
rebrandly:
  enabled: false

diagnosticsMode:
  copytoAzureBlob:
    enabled: false
  copytoSftp:
    enabled: false

SMTPSettings:
  SMTP_SenderAddress: noreply-staging@example.com
  SMTP_SenderName: "Redpoint RPI (Staging)"
  SMTP_Address: email-smtp.us-east-1.amazonaws.com
  SMTP_Port: 587
  EnableSSL: true
  UseCredentials: true
  SMTP_Username: CHANGE_ME
  SMTP_Password: CHANGE_ME

# ----------------------------------------------------------
#  Smart Activation
# ----------------------------------------------------------
smartActivation:
  enabled: false

# ----------------------------------------------------------
#  Node Scheduling
# ----------------------------------------------------------
nodeSelector:
  enabled: false

tolerations:
  enabled: false

# ----------------------------------------------------------
#  Advanced Overrides
# ----------------------------------------------------------
# Enable debug logging in staging for easier troubleshooting
advanced:
  realtimeapi:
    logging:
      realtimeapi:
        default: Debug
      realtimeagent:
        default: Debug
  executionservice:
    logging:
      default: Debug
  queuereader:
    logging:
      default: Debug
