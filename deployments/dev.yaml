# ============================================================
# DEV ENVIRONMENT
# ============================================================
# Minimal footprint for local/dev clusters. Single replicas,
# low resources, debug logging, no autoscaling, no scheduling
# constraints. Designed to run on a small node pool or locally
# with Docker Desktop / minikube / kind.
#
# See values-reference.yaml for all available keys.
# ============================================================

global:
  deployment:
    # Set to "demo" to deploy embedded MSSQL + MongoDB containers
    # mode: demo
    platform: selfhosted
    images:
      tag: "7.7.20260220.1524"
      imagePullSecret:
        enabled: true
        name: redpoint-rpi

# ----------------------------------------------------------
#  Database
# ----------------------------------------------------------
# When using demo mode, point to the in-cluster databases:
#   server_host: rpi-demo-mssql
#   server_username: sa
#   server_password: ".RedPoint2021"
databases:
  operational:
    provider: sqlserver
    server_host: host.docker.internal
    server_username: sa
    server_password: CHANGE_ME
    pulse_database_name: RPIPulse_Dev
    pulse_logging_database_name: RPILogging_Dev

# ----------------------------------------------------------
#  Cloud Identity & Secrets
# ----------------------------------------------------------
cloudIdentity:
  enabled: false
  secretsManagement:
    enabled: false
    secretsProvider: kubernetes
    autoCreateSecrets: true
    secretName: redpoint-rpi-secrets

# ----------------------------------------------------------
#  Ingress
# ----------------------------------------------------------
ingress:
  controller:
    enabled: true
  mode: public
  certificateSource: kubernetes
  tlsSecretName: ingress-tls
  domain: dev.local
  hosts:
    config: deploymentapi
    client: interactionapi
    integration: integrationapi
    realtime: realtimeapi
    callbackapi: callbackapi
    queuereader: queuereader
    rabbitmqconsole: rabbitmq-console
    smartactivation: smartactivation

# ----------------------------------------------------------
#  Core Services (single replica, minimal resources)
# ----------------------------------------------------------
realtimeapi:
  enabled: true
  replicas: 1
  rpiClientID: 00000000-0000-0000-0000-000000000000
  authentication:
    type: basic
    basic:
      standard: false
      forms: true
      listenerQueue: true
      recommendations: true
  cacheProvider:
    enabled: true
    provider: mongodb
    mongodb:
      connectionString: CHANGE_ME
      databaseName: PulseCache_Dev
      collectionName: RealtimeCache
  queueProvider:
    enabled: true
    provider: rabbitmq
    queueNames:
      formQueuePath: RPIWebFormSubmission
      eventsQueuePath: RPIWebEvents
      cacheOutputQueuePath: RPIWebCacheData
      recommendationsQueuePath: RPIWebRecommendations
      listenerQueuePath: RPIQueueListener
      callbackServiceQueuePath: RPICallbackApiQueue
    rabbitmq:
      type: internal
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      memory: 1Gi
  autoscaling:
    enabled: false

callbackapi:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      memory: 1Gi
  autoscaling:
    enabled: false

executionservice:
  enabled: true
  replicas: 1
  enableRPIAuthentication: true
  internalCache:
    enabled: true
    provider: filesystem
    redisSettings:
      type: internal
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      memory: 1Gi

interactionapi:
  enabled: true
  replicas: 1
  enableRPIAuthentication: true
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      memory: 1Gi
  autoscaling:
    enabled: false

integrationapi:
  enabled: true
  replicas: 1
  enableRPIAuthentication: true
  username: admin@noemail.com
  password: Dev_Password_123
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      memory: 1Gi
  autoscaling:
    enabled: false

nodemanager:
  enabled: true
  replicas: 1
  enableRPIAuthentication: true
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi
  autoscaling:
    enabled: false

deploymentapi:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi

queuereader:
  enabled: true
  replicas: 1
  realtimeConfiguration:
    isDistributed: false
    tenantIds:
      - 00000000-0000-0000-0000-000000000000
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      memory: 1Gi
  autoscaling:
    enabled: false

# ----------------------------------------------------------
#  Optional Services (disabled to save resources)
# ----------------------------------------------------------
rebrandly:
  enabled: false

diagnosticsMode:
  copytoAzureBlob:
    enabled: false
  copytoSftp:
    enabled: false

SMTPSettings:
  SMTP_SenderAddress: dev@dev.local
  SMTP_SenderName: "RPI Dev"
  SMTP_Address: localhost
  SMTP_Port: 1025
  EnableSSL: false
  UseCredentials: false
  SMTP_Username: ""
  SMTP_Password: ""

# ----------------------------------------------------------
#  Smart Activation
# ----------------------------------------------------------
smartActivation:
  enabled: false

# ----------------------------------------------------------
#  Node Scheduling (none for dev)
# ----------------------------------------------------------
nodeSelector:
  enabled: false

tolerations:
  enabled: false

# ----------------------------------------------------------
#  Advanced Overrides
# ----------------------------------------------------------
# Verbose logging, relaxed probes, smaller sub-resources
advanced:
  livenessProbe:
    initialDelaySeconds: 120
    periodSeconds: 30
    failureThreshold: 10
  startupProbe:
    initialDelaySeconds: 30
    periodSeconds: 15
    failureThreshold: 60
  realtimeapi:
    logging:
      realtimeapi:
        default: Debug
        endpoint: Debug
        shared: Debug
      realtimeagent:
        default: Debug
        database: Debug
    queueProvider:
      rabbitmq:
        rabbitmqSettings:
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
    cacheProvider:
      redis:
        redisSettings:
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
  executionservice:
    logging:
      default: Debug
      database: Debug
    internalCache:
      redisSettings:
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            memory: 256Mi
  interactionapi:
    logging:
      default: Debug
    enableSwagger: true
  integrationapi:
    logging:
      default: Debug
    enableSwagger: true
  queuereader:
    logging:
      default: Debug
    threadPoolSize: 2
    maxBatchSize: 10
  callbackapi:
    logging:
      default: Debug
  nodemanager:
    logging:
      default: Debug
  deploymentapi:
    logging:
      default: Debug
