# ============================================================
# PRODUCTION ENVIRONMENT
# ============================================================
# Only set values that differ from chart defaults.
# See values-reference.yaml for all available keys.
# ============================================================

global:
  deployment:
    platform: amazon                      # azure | amazon | google | selfhosted
    images:
      tag: "7.7.20260220.1524"
      imagePullSecret:
        enabled: true
        name: redpoint-rpi

# ----------------------------------------------------------
#  Database
# ----------------------------------------------------------
databases:
  operational:
    provider: sqlserver
    server_host: prod-db.cluster-xxxx.us-east-1.rds.amazonaws.com
    server_username: rpi_admin
    server_password: CHANGE_ME
    pulse_database_name: RPIPulse
    pulse_logging_database_name: RPILogging

# ----------------------------------------------------------
#  Cloud Identity & Secrets
# ----------------------------------------------------------
cloudIdentity:
  enabled: true
  provider: Amazon
  secretsManagement:
    enabled: true
    secretsProvider: awssecretsmanager
    secretName: redpoint-rpi-secrets
  amazonSettings:
    credentialsType: iamRole
    roleArn: arn:aws:iam::123456789012:role/rpi-prod-role
    webIdentityTokenFile: /var/run/secrets/eks.amazonaws.com/serviceaccount/token
    stsRegionalEndpoints: regional
    region: us-east-1

# ----------------------------------------------------------
#  Ingress
# ----------------------------------------------------------
ingress:
  controller:
    enabled: true
  mode: public
  certificateSource: acm
  certificateArn: arn:aws:acm:us-east-1:123456789012:certificate/xxxxx
  domain: rpi.example.com
  hosts:
    config: deploymentapi
    client: interactionapi
    integration: integrationapi
    realtime: realtimeapi
    callbackapi: callbackapi
    queuereader: queuereader
    rabbitmqconsole: rabbitmq-console
    smartactivation: smartactivation

# ----------------------------------------------------------
#  Core Services
# ----------------------------------------------------------
realtimeapi:
  enabled: true
  replicas: 3
  rpiClientID: 00000000-0000-0000-0000-000000000000
  authentication:
    type: basic
    basic:
      standard: false
      forms: true
      listenerQueue: true
      recommendations: true
  cacheProvider:
    enabled: true
    provider: mongodb
    mongodb:
      connectionString: CHANGE_ME
      databaseName: PulseCache
      collectionName: RealtimeCache
  queueProvider:
    enabled: true
    provider: amazonsqs
    queueNames:
      formQueuePath: RPIWebFormSubmission
      eventsQueuePath: RPIWebEvents
      cacheOutputQueuePath: RPIWebCacheData
      recommendationsQueuePath: RPIWebRecommendations
      listenerQueuePath: RPIQueueListener
      callbackServiceQueuePath: RPICallbackApiQueue
    amazonsqs:
      credentialsType: accessKey
  resources:
    requests:
      cpu: "1"
      memory: 4Gi
    limits:
      memory: 4Gi
  autoscaling:
    enabled: true

callbackapi:
  enabled: true
  replicas: 2
  resources:
    requests:
      cpu: "1"
      memory: 4Gi
    limits:
      memory: 4Gi
  autoscaling:
    enabled: true

executionservice:
  enabled: true
  replicas: 2
  enableRPIAuthentication: true
  internalCache:
    enabled: true
    provider: filesystem
    redisSettings:
      type: internal
  resources:
    requests:
      cpu: "1"
      memory: 4Gi
    limits:
      memory: 4Gi

interactionapi:
  enabled: true
  replicas: 2
  enableRPIAuthentication: true
  resources:
    requests:
      cpu: "1"
      memory: 4Gi
    limits:
      memory: 4Gi
  autoscaling:
    enabled: true

integrationapi:
  enabled: true
  replicas: 2
  enableRPIAuthentication: true
  username: admin@noemail.com
  password: CHANGE_ME
  resources:
    requests:
      cpu: "1"
      memory: 4Gi
    limits:
      memory: 4Gi
  autoscaling:
    enabled: true

nodemanager:
  enabled: true
  replicas: 2
  enableRPIAuthentication: true
  resources:
    requests:
      cpu: 500m
      memory: 3Gi
    limits:
      memory: 3Gi
  autoscaling:
    enabled: true

deploymentapi:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      memory: 1Gi

queuereader:
  enabled: true
  replicas: 2
  realtimeConfiguration:
    isDistributed: false
    tenantIds:
      - 00000000-0000-0000-0000-000000000000
  resources:
    requests:
      cpu: "1"
      memory: 4Gi
    limits:
      memory: 4Gi
  autoscaling:
    enabled: true

# ----------------------------------------------------------
#  Optional Services
# ----------------------------------------------------------
rebrandly:
  enabled: false

diagnosticsMode:
  copytoAzureBlob:
    enabled: false
  copytoSftp:
    enabled: false

# ----------------------------------------------------------
#  Authentication
# ----------------------------------------------------------
# MicrosoftEntraID:
#   enabled: false

# OpenIdProviders:
#   enabled: false

SMTPSettings:
  SMTP_SenderAddress: noreply@example.com
  SMTP_SenderName: "Redpoint RPI"
  SMTP_Address: email-smtp.us-east-1.amazonaws.com
  SMTP_Port: 587
  EnableSSL: true
  UseCredentials: true
  SMTP_Username: CHANGE_ME
  SMTP_Password: CHANGE_ME

# ----------------------------------------------------------
#  Smart Activation (uncomment to enable)
# ----------------------------------------------------------
smartActivation:
  enabled: false

# ----------------------------------------------------------
#  Node Scheduling
# ----------------------------------------------------------
nodeSelector:
  enabled: true
  key: workload
  value: redpoint-rpi

tolerations:
  enabled: true
  effect: NoSchedule
  key: workload
  operator: Equal
  value: redpoint-rpi

# ----------------------------------------------------------
#  Advanced Overrides (only if needed)
# ----------------------------------------------------------
# advanced:
#   realtimeapi:
#     autoscaling:
#       minReplicas: 3
#       maxReplicas: 10
