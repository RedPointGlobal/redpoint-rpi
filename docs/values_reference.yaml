      type: internal                      # internal (chart-managed) | external (BYO)
      rabbitmqSettings:
        hostname: "rpi-queuereader-rabbitmq"
        username: redpointrpi
        password: my_Super_Strong_Pwd
    tenantIds:
      - 00000000-0000-0000-0000-000000000000

  resources:
    requests:
      cpu: 500m
      memory: 3Gi
    limits:
      memory: 3Gi
  autoscaling:
    enabled: true


