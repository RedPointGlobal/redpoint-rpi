# ============================================================
#  SMOKE TESTS
# ============================================================
# Lightweight validation pods that verify storage mounts and CSI
# secret mounts are working. Enable during initial setup or after
# infrastructure changes, then disable once verified.
#
# Two types:
#   pvc       — Mounts a PersistentVolumeClaim and writes a test file
#   csiSecret — Mounts a CSI SecretProviderClass volume and sleeps

smokeTests:
  enabled: false
  deployments:
    # PVC mount test — writes a test file every 30s to verify write access
    - name: blob
      type: pvc
      claimName: rpifileoutputdir
      mountPath: /mnt/rpifileoutputdir
      # image: custom-image:tag        # Optional: override default net_utils image
      # serviceAccountName: my-sa      # Optional: for workload identity
      # resources:                     # Optional: override defaults
      #   requests:
      #     cpu: 50m
      #     memory: 64Mi
      #   limits:
      #     cpu: 200m
      #     memory: 128Mi

    - name: fileshare
      type: pvc
      claimName: pvc-fs
      mountPath: /mnt/fileshare

    # CSI secret mount test — mounts SecretProviderClass volume
    - name: kv-secrets
      type: csiSecret
      secretProviderClass: rpi-secrets
      mountPath: /mnt/secrets

    - name: kv-cert
      type: csiSecret
      secretProviderClass: cert-secretprovider
      mountPath: /mnt/certs


# ============================================================
#  POST-INSTALL AUTOMATION
# ============================================================
# Automates the three post-deployment API calls:
#   1. License activation
#   2. Cluster database install
#   3. Tenant creation (optional)
# Runs as a Helm post-install hook and ArgoCD PostSync hook.
# Idempotent — skips steps that are already complete.
postInstall:
  enabled: false

  # Use a pre-created K8s Secret instead of inline values.
  # Required keys: activation-key, admin-password, admin-username, admin-email
  # existingSecret: ""

  # License activation
  activationKey: ""
  systemName: ""

  # Initial admin user
  adminUsername: "coreuser"
  adminPassword: ""
  adminEmail: ""

  # Tenant creation (optional — runs after cluster DB install)
  tenant:
    enabled: false
    name: ""
    # existingSecret: ""  # Keys: dw-server, dw-database, dw-username, dw-password
    dataWarehouse:
      provider: SQLServer
      server: ""
      database: ""
      username: ""
      password: ""

  # API call timeout (seconds)
  waitTimeout: 360

  # Kubernetes Job settings
  backoffLimit: 3

  # Override connection details if deploymentapi uses a non-default name:
  # deploymentapiHost: rpi-deploymentapi
  # deploymentapiPort: "80"
  # maxReadyWaitSeconds: "600"
  # pollIntervalSeconds: "15"

  # Job container resources:
  # resources:
  #   requests:
  #     cpu: 50m
  #     memory: 64Mi
  #   limits:
  #     cpu: 200m
  #     memory: 128Mi

# ============================================================
#  PRE-FLIGHT VALIDATION
# ============================================================
# Runtime validation job that checks your configuration before
# or after deployment. Catches DNS, connectivity, and config
# issues that can't be detected at template render time.
preflight:
  enabled: false
  # test        -> runs with `helm test rpi` (post-install validation)
  # preInstall  -> runs as pre-install/pre-upgrade hook (blocks deploy on failure)
  mode: test

# ============================================================
#  DATABASE UPGRADE JOB
# ============================================================
# Automatically calls the deployment API upgrade endpoint after
# an image tag change. The Job name includes the sanitized tag,
# so Helm creates a new Job only when the tag changes.
# The upgrade endpoint is idempotent — safe to run multiple times.
databaseUpgrade:
  # Set to true to enable automatic database upgrades on tag changes
  enabled: true
  notification:
    enabled: true
    recipientEmail: admin@example.com

  # Override connection details if deploymentapi uses a non-default
  # service name or port:
  # deploymentapiHost: rpi-deploymentapi
  # deploymentapiPort: "80"

  # Override endpoint paths (rarely needed):
  # healthPath: /health/ready
  # upgradePath: /api/deployment/upgrade

  # Timeout for the upgrade API call (seconds)
  # waitTimeoutSeconds: "360"

  # Max time to wait for deploymentapi to become healthy (seconds)
  # maxReadyWaitSeconds: "600"

  # Polling interval when waiting for readiness (seconds)
  # pollIntervalSeconds: "15"

  # Kubernetes Job settings:
  # backoffLimit: 3                  # Retry attempts on failure
  # ttlSecondsAfterFinished: 3600   # Auto-cleanup after 1 hour
  # activeDeadlineSeconds: 900      # Max total Job runtime

  # Job container resources:
  # resources:
  #   requests:
  #     cpu: 50m
  #     memory: 64Mi
  #   limits:
  #     cpu: 200m
  #     memory: 128Mi


# ============================================================
#  QUEUE READER
# ============================================================

