  SMTP_Port: 587
  EnableSSL: true
  UseCredentials: true
  SMTP_Username: your_smtp_server_username
  SMTP_Password: your_smtp_server_password


# ============================================================
#  INGRESS
# ============================================================

ingress:
  controller:
    enabled: true                         # false if supplying your own controller
  mode: public                            # public | private
  certificateSource: kubernetes           # kubernetes | acm
  # TLS entries (rendered when certificateSource=kubernetes)
  # Add entries with explicit hosts lists for multi-cert setups
  tls:
    - secretName: ingress-tls
    # - secretName: certsecrets             # additional cert for FQDN hosts
    #   hosts:
    #     - mpulse.example.com
  domain: example.com
  subnetName: <my-ingress-vpc-subnet-name>  # required if mode=private
  certificateArn: your_acm_certificate_arn  # required if certificateSource=acm
  privateLink:
    azure:
      enabled: false
  # Service hostnames — subdomains are prepended to domain,
  # values containing a dot are used as FQDNs (e.g., mpulse.example.com)
  hosts:
    config: rpi-deploymentapi
    client: rpi-interactionapi
    integration: rpi-integrationapi
    realtime: rpi-realtimeapi
    callbackapi: rpi-callbackapi            # or: mpulse.example.com (FQDN)
    queuereader: rpi-queuereader
    rabbitmqconsole: rpi-rabbitmq-console
    smartactivation: rpi-smartActivation


# ============================================================
#  NETWORK POLICY
# ============================================================

networkPolicy:
  enabled: false


# ============================================================
#  SERVICE MESH
# ============================================================

serviceMesh:
  enabled: false
  provider: linkerd                      # Supported: linkerd
  # Linkerd Server CRDs for L7 traffic policy
  # servers:
  #   - name: realtimeapi
  #     podSelector:
  #       app.kubernetes.io/name: rpi-realtimeapi
  #     port: 8080                       # Default: 8080
  #     proxyProtocol: HTTP/1            # Default: HTTP/1
  #   - name: executionservice
  #     podSelector:
  #       app.kubernetes.io/name: rpi-executionservice
  #     port: 8080
  #     proxyProtocol: HTTP/1
  servers: []


# ============================================================
#  NODE SCHEDULING
# ============================================================

nodeSelector:
  enabled: false
  key: app
  value: redpoint-rpi

tolerations:
  enabled: false
  effect: NoSchedule
  key: app
  operator: Equal
  value: redpoint-rpi


# ============================================================
#  REDPOINT AI
# ============================================================

redpointAI:
  enabled: false
  naturalLanguage:
    ApiKey: <my-openai-key>
    ApiBase: https://example.openai.azure.com/
    ApiVersion: 2023-07-01-preview
    ChatGptEngine: gpt-5.1
    ChatGptTemp: 0.5
  cognitiveSearch:
    SearchEndpoint: https://example.search.windows.net
    SearchKey: <my-cognitivesearch-key>
    VectorSearchProfile: vector-profile-000000000000
    VectorSearchConfig: vector-config-000000000000
  modelStorage:
    ConnectionString: DefaultEndpointsProtocol=https;AccountName=my_account_name;AccountKey=my_account_access_key
    EmbeddingsModel: text-embedding-ada-002
    ModelDimensions: 1536
    ContainerName: my_blob_container_name
    BlobFolder: my_blob_container_folder_name


# ============================================================
#  SMART ACTIVATION
# ============================================================

smartActivation:
  enabled: false
  autoCreateSecrets: true
  secretName: rpi-smartactivation

authservice:
  replicas: 1
  default_username: admin@noemail.com
  default_password: my_Super_Strong_Pwd
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      memory: 2Gi

keycloak:
  replicas: 1
  hostname: keycloak
  username: admin@noemail.com
  password: my_Super_Strong_Pwd
  database_name: keycloak
  realm_name: redpoint-mercury
  realm_client_id: rpi-service
  realm_client_secret: <my-realm-client-secret>
  resources:
    requests:
      cpu: 500m
      memory: 3Gi
    limits:
      memory: 3Gi

reportingservice:
  sigma:
    enabled: false
    api_url: https://api.us.azure.sigmacomputing.com
    client_id: 48dd1982ab835ff53177e9cbd7fb5608b1db8c56491a040f2f0843a3bfc6b440
    client_secret: my_sigma_client_secret

initservice:
  replicas: 1
  database:
    operational:
      name: smart_activation_db
      connection_string: mongodb+srv://<my_username>:<my_password>@<my_hostname>/?retryWrites=true&w=majority
  resources:
    requests:
      cpu: 500m
      memory: 3Gi
    limits:
      memory: 3Gi

messageq:
  replicas: 1
  username: redpointrpi
  resources:
    requests:
      cpu: 500m
      memory: 3Gi
    limits:
      memory: 3Gi

maintenanceservice:
  replicas: 1
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      memory: 2Gi

servicesapi:
  replicas: 1
  sso_enabled: true
  resources:
    requests:
      cpu: 500m
      memory: 3Gi
    limits:
      memory: 3Gi

socketio:
  replicas: 1
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      memory: 2Gi

uiservice:
  replicas: 1
  resources:
    requests:
      cpu: 500m
      memory: 3Gi
    limits:
      memory: 3Gi

cdpcache:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      memory: 2Gi


