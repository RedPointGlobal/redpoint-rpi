# ============================================================
# REDPOINT RPI — COMPLETE VALUES REFERENCE
# ============================================================
# This file documents EVERY configurable value in the chart.
# DO NOT use this file as your values.yaml — it is for
# reference only.
#
# Override any value by setting it directly under the matching
# top-level key in your overrides file. You only need to include
# the values you want to change — everything else uses the
# chart's built-in defaults.
#
# Example overrides file:
#
#   realtimeapi:
#     replicas: 3
#     resources:
#       requests:
#         cpu: "2"
#     logging:
#       realtimeapi:
#         default: Debug
#
#   livenessProbe:
#     periodSeconds: 30
# ============================================================


# ============================================================
#  GLOBAL SETTINGS
# ============================================================

global:
  deployment:
    # Deployment mode: standard | demo
    # Demo mode deploys embedded MSSQL + MongoDB containers for dev/evaluation
    mode: standard

    # Cloud platform: azure | amazon | google | selfhosted
    platform: amazon

    images:
      repository: rg1acrpub.azurecr.io/docker/redpointglobal/releases
      # RPI version: <major.minor>.<year>-<MMDD>-<HHMM>
      tag: "7.7.20260220.1524"
      imagePullPolicy: Always
      imagePullSecret:
        enabled: true
        name: redpoint-rpi
      # Controls how Kubernetes ServiceAccounts are created:
      #   shared      — One ServiceAccount shared by all RPI services
      #   per-service — Each service gets its own ServiceAccount (default)
      #   both        — Shared + per-service ServiceAccounts are created
      # Individual services can override with serviceAccountName in their config block.
      serviceAccount:
        mode: per-service
        name: redpoint-rpi
    # Optional: set the pod's timezone (e.g., "America/New_York"); leave empty to use default UTC
    podTimezone: "" # 

# ============================================================
#  GLOBAL RESOURCE DEFAULTS
# ============================================================
# Applied to all services unless overridden per-service.
# Per-service overrides (e.g. interactionapi.resources) take priority.

resources:
  requests:
    cpu: 50m
    memory: 256Mi
  limits:
    memory: 3Gi

# ============================================================
#  OPERATIONAL DATABASE
# ============================================================

databases:
  operational:
    # Database engine: sqlserver | postgresql | sqlserveronvm
    provider: sqlserver
    server_host: <my-database-server-host>
    server_username: <my-database-server-username>
    server_password: <my-database-server-password>
    pulse_database_name: <my-pulse-database-name>
    pulse_logging_database_name: <my-logging-database-name>
    encrypt: true

  # --------------------------------------------------------
  # Data Warehouse Providers
  # --------------------------------------------------------
  datawarehouse:
    # BigQuery
    bigquery:
      enabled: false
      connections:
        - name: gbq-tenant1
          projectId: gbq-tenant1
          sqlDialect: 1
          OAuthMechanism: 0
          credentialsType: serviceAccount
          serviceAccountEmail: gbq-tenant1@my-project.iam.gserviceaccount.com
          configMapName: gbq-tenant1
          keyName: gbq-tenant1.json
          ConfigMapFilePath: /app/google-creds
          allowLargeResults: 0
          largeResultsDataSetId: _bqodbc_temp_tables
          largeResultsTempTableExpirationTime: "3600000"

    # Snowflake
    snowflake:
      enabled: false
      credentialsType: snowflake_jwt          
      ConfigMapName: snowflake-creds
      keyName: my-snowflake-rsakey.p8
      ConfigMapFilePath: /app/snowflake-creds

    # Databricks
    databricks:
      enabled: false
      connections:
        - name: dbx-tenant1
          host: my-host.2.azuredatabricks.net
          port: 443
          httpPath: /sql/1.0/warehouses/c546e1e69e8d2ac9
          username: token
          password: my_databricks_token
          schema: my_schema_name
          authMechanism: 3

# ==========================
# Cloud Identity 
# ==========================
cloudIdentity:
  enabled: true
  # Options: workloadIdentity | IAMRole | awsAccessKeys
  provider: workloadIdentity
  azureSettings:
    tenantId: your-azure-tenant-id
    workloadIdentity:
      managedIdentityClientId: your-workload-identity-client-id
  googleSettings:
    # ConfigMap containing the service account JSON credentials file 
    configMapName: my-google-svs-account
    keyName: my-google-svs-account.json
    ConfigMapFilePath: /app/google-creds
    serviceAccountEmail: my-google-svs-account@my-project.iam.gserviceaccount.com
    projectId: your_google_project_id
  amazonSettings:
    accessKeyId: <my-aws-iam-access-key>
    secretAccessKey: <my-aws-iam-secret-access-key>
    roleArn: arn:aws:iam::my-aws-account-id:role/my-role-name
    webIdentityTokenFile: /var/run/secrets/eks.amazonaws.com/serviceaccount/token
    stsRegionalEndpoints: regional
    region: us-east-1

# ============================================================
#  SECRETS MANAGEMENT
# ============================================================
secretsManagement:
  # Provider: kubernetes | sdk | csi
  provider: kubernetes

  # --------------------------------------------------------
  # Kubernetes secret configuration
  # --------------------------------------------------------
  kubernetes:
    autoCreateSecrets: false                 # Chart does not create the Secret — admin responsibility
    secretName: redpoint-rpi-secrets         # Name of the Kubernetes Secret to mount

  # --------------------------------------------------------
  # SDK — read secrets directly from a cloud vault
  # Requires cloudIdentity to be configured
  # --------------------------------------------------------
  sdk:
    azure:
      vaultUri: https://myvault.vault.azure.net/   # Azure Key Vault endpoint
      configurationReloadIntervalSeconds: 30        # Interval for refreshing secrets (seconds)
      useADTokenForDatabaseConnection: true         # Use Azure AD token for DB connections
    # amazon:
    #   region: us-east-1
    #   secretName: rpi/secrets
    # google:
    #   projectId: my-project

  # --------------------------------------------------------
  # CSI — mount secrets via Secrets Store CSI Driver
  # --------------------------------------------------------
  csi:
    secretProviderClasses:
      # --------------------------------------------------
      # Class 1 — RPI operational secrets from Key Vault
      # --------------------------------------------------
      - name: redpoint-rpi-secrets
        provider: azure
        secretObjects:                               # Sync vault secrets → Kubernetes Secret
          - secretName: rpi-synced-secrets
            type: Opaque
            data:
              - key: ConnectionString_Operations_Database
                objectName: V7-ConnectionString-Operations-Database
              - key: ConnectionString_Logging_Database
                objectName: V7-ConnectionString-LoggingDatabase
        parameters:                                  # Azure Key Vault authentication
          keyvaultName: my-keyvault
          resourceGroup: my-resource-group
          subscriptionId: aaaaaaaa-bbbb-cccc-dddd-eeeeeeeeeeee
          clientID: "11111111-2222-3333-4444-555555555555"
          tenantId: "66666666-7777-8888-9999-000000000000"
          usePodIdentity: "false"
          useVMManagedIdentity: "false"
          useWorkloadIdentity: "true"
          syncSecret: "true"
          enable-secret-rotation: "true"
        objects:                                     # Objects to fetch from Key Vault
          - objectName: "V7-ConnectionString-Operations-Database"
            objectType: secret
          - objectName: "V7-ConnectionString-LoggingDatabase"
            objectType: secret

      # --------------------------------------------------
      # Class 2 — TLS certificate from Key Vault
      # --------------------------------------------------
      - name: cert-secretprovider
        provider: azure
        secretObjects:
          - secretName: tls-cert-secret
            type: kubernetes.io/tls
            data:
              - key: tls.key
                objectName: my-tls-cert
              - key: tls.crt
                objectName: my-tls-cert
        parameters:
          keyvaultName: my-keyvault
          resourceGroup: my-resource-group
          subscriptionId: aaaaaaaa-bbbb-cccc-dddd-eeeeeeeeeeee
          clientID: "11111111-2222-3333-4444-555555555555"
          tenantId: "66666666-7777-8888-9999-000000000000"
          usePodIdentity: "false"
          useVMManagedIdentity: "false"
          useWorkloadIdentity: "true"
        objects:
          - objectName: "my-tls-cert"
            objectType: secret

# ----------------------------------------------------------
#  Storage Configuration
# ----------------------------------------------------------
storage:
  persistentVolumeClaims:
    FileOutputDirectory:
      enabled: true
      claimName: my-pvc-name
      mountPath: /rpifileoutputdir
    Plugins:
      enabled: false
      claimName: realtimeplugins
      mountPath: /app/plugins
    DataManagementUploadDirectory:
      enabled: false
      claimName: rpdmuploaddirectory
      mountPath: /rpdmuploaddirectory
# ----------------------------------------------------------
#  Persistent Volumes
# ----------------------------------------------------------
  # Azure Blob Storage
  persistentVolumes:  
    # Azure File Share
    - name: rpifileoutputdirfs  # Logical name of the PersistentVolume (PV)
      capacity: 10Gi            # Maximum storage size allocated to this volume
      accessModes: 
        - ReadWriteMany         # Allows multiple pods/nodes to read and write simultaneously
      storageClassName: azurefile-csi  # StorageClass that provisions Azure File via CSI driver
      reclaimPolicy: Retain     # Keeps the underlying storage even after PVC is deleted
      mountOptions:
        - -o allow_other        # Allows other users inside the container to access the mounted volume
        - --file-cache-timeout-in-seconds=120  # Sets file cache timeout to 120 seconds
      csi:
        driver: file.csi.azure.com   # Azure File CSI driver
        # Must be unique per storage account + file share across the cluster
         # <resourceGroup>#<storageAccount>#<fileShareName>
        volumeHandle: "my-rgName#mysaName#myfileShareName"
        volumeAttributes:
          storageaccount: "mysaName"   # Azure Storage Account name (required)
          shareName: "myfileShareName"         # Azure File Share name (required)
          clientID: "00000000-0000-0000-0000-0000000000"  # Managed Identity Client ID used for authentication
          # Specify if the storage account is NOT in the AKS managed resource group (MC_*)
          resourcegroup: "CE-Platform"
          # tenantID: $IDENTITY_TENANT only if workload identity and AKS cluster are in different Azure AD tenants
          # subscriptionid: $SUBSCRIPTION only if storage account is in a different subscription
          subscriptionid: "00000000-0000-0000-0000-0000000000"
      pvc:
        claimName: rpifileoutputdir  # Name of the PersistentVolumeClaim (PVC) that will bind to this PV

#    - name: rpifileoutputdir   # Logical name of the PersistentVolume (PV)
#      capacity: 10Gi           # Maximum storage capacity allocated to this volume
#      accessModes:
#        - ReadWriteMany        # Allows multiple pods/nodes to mount with read/write access
#      storageClassName: blob-fuse  # StorageClass using Azure Blob CSI driver (BlobFuse)
#      reclaimPolicy: Retain    # Keeps the underlying Blob container after PVC deletion
#      mountOptions:
#        - -o allow_other       # Allows all users in the container to access the mounted filesystem
#        - --file-cache-timeout-in-seconds=120  # Sets local file cache timeout to 120 seconds
#      csi:
#        driver: blob.csi.azure.com  # Azure Blob Storage CSI driver
#        # Must be unique per container across the cluster
#        volumeHandle: my-rgName-mysaName-myContainerName
#        volumeAttributes:
#          storageAccount: mysaName  # Azure Storage Account name
#          containerName: myContainerName  # Azure Blob container name
#          # Managed Identity Client ID used for authentication
#          clientID: 00000000-0000-0000-0000-0000000000
#          resourcegroup: my-rgName
#          # subscriptionid: if storage account is in a different subscription
#          subscriptionid: 00000000-0000-0000-0000-0000000000
#      pvc:
#        claimName: pvc-blob   # Name of the PersistentVolumeClaim (PVC) that binds to this PV
#      annotations:
#        pv.kubernetes.io/provisioned-by: blob.csi.azure.com
#        helm.sh/resource-policy: keep

# ============================================================
#  REALTIME API
# ============================================================

realtimeapi:
  enabled: true
  replicas: 1

  # Per-service pod metadata (merged after customAnnotations/customLabels)
  podAnnotations: {}
  podLabels: {}

  # RPI client identifier
  rpiClientID: 00000000-0000-0000-0000-000000000000

  # Authentication mode
  authentication:
    type: basic                           # basic | oauth
    basic:
      standard: false
      forms: true
      listenerQueue: true
      recommendations: true
    oauth:
      databaseName: RPIRealtimeCore
      accessTokenLifetimeSeconds: 360
      refreshTokenLifetimeSeconds: 360

  # CORS origins allowed
  CORSOrigins: ["*"]

  # Cache provider
  cacheProvider:
    enabled: true
    provider: mongodb                     # mongodb | azureredis | redis | inMemorySql | googlebigtable
    mongodb:
      connectionString: mongodb://<my_username>:<my_password>@myserver.mongodb.net:27017/Pulse?authSource=admin&ssl=true
      databaseName: <my-realtime-cache-db>
      collectionName: <my-realtime-cache-collection>
    redis:
      type: internal                      # internal (chart-managed) | external (BYO)
      redisSettings:
        connectionString: "my-redis-host:6379,password=<your-password>,abortConnect=False"
    inMemorySql:
      server_host: <my-cache-database-server-host>
      database_name: <my-cache-database-name>
      username: <my-cache-database-username>
      password: <my-cache-database-password>
    googlebigtable:
      projectId: <my-bigtable-project-id>
      instanceId: <my-bigtable-instance-id>

  # Queue provider
  queueProvider:
    enabled: true
    provider: amazonsqs                   # amazonsqs | azureservicebus | googlepubsub | azureeventhubs | rabbitmq | azurestorage | amazonmsk
    queueNames:
      formQueuePath: RPIWebFormSubmission
      eventsQueuePath: RPIWebEvents
      cacheOutputQueuePath: RPIWebCacheData
      recommendationsQueuePath: RPIWebRecommendations
      listenerQueuePath: RPIQueueListener
      callbackServiceQueuePath: RPICallbackApiQueue
    amazonsqs:
      credentialsType: accessKey
    azureservicebus:
      connectionstring: Endpoint=sb://<my-namespace>.servicebus.windows.net/;SharedAccessKeyName=<my-policy>;SharedAccessKey=<my-key>
    azurestorage:
      connectionString: DefaultEndpointsProtocol=https;AccountName=myAccoutName;AccountKey=myAccountAccessKey;EndpointSuffix=core.windows.net
      storageAccountName: myStorageAccountName
      useAzureIdentityAuthentication: false
    googlepubsub:
      projectId: <my-google-project-id>
    azureeventhubs:
      connectionstring: Endpoint=sb://<my-namespace>.servicebus.windows.net/;SharedAccessKeyName=<my-policy>;SharedAccessKey=<my-key>;EntityPath=<my-hub>
      eventHubName: RPIQueueListener
      NamespaceName: my_eventhub_namespace_name
      PartitionIds: ["0"]
    rabbitmq:
      type: internal                      # internal (chart-managed) | external (BYO)
    amazonmsk:
      region: <my-aws-region>
      accessKeyId: <my-aws-iam-access-key>
      secretAccessKey: <my-aws-iam-secret-access-key>
      bootstrapServers: <my-server1.c2.kafka.us-east-1.amazonaws.com:9198>

  # Custom plugins
  customPlugins:
    enabled: false

  # Pod resources
  resources:
    requests:
      cpu: 500m
      memory: 3Gi
    limits:
      memory: 3Gi

  # Horizontal pod autoscaling
  autoscaling:
    enabled: true


# ============================================================
