# ============================================================
# REDPOINT RPI v7.7 — COMPLETE VALUES REFERENCE
# ============================================================
# This file shows EVERY configurable value including internal
# defaults from _defaults.tpl merged with values.yaml.
# Use this as a reference to see what you can override.
#
# You only need to include values you want to change in your
# overrides file. Everything else uses the defaults shown here.
#
# Use the Helm Assistant Web UI to generate your overrides:
# https://rpi-helm-assistant.redpointcdp.com
# ============================================================

# ==========================================================
#  GLOBAL
# ==========================================================

global:
  deployment:
    mode: standard
    platform: amazon
    images:
      registry: rg1acrpub.azurecr.io/docker/redpointglobal/releases
      tag: 7.7.20260220.1524
      imagePullPolicy: Always
      imagePullSecret:
        enabled: true
        name: redpoint-rpi
      net_utils: rg1acrpub.azurecr.io/docker/redpointglobal/releases/net-utils:latest
    podTimezone: ''

# ==========================================================
#  RESOURCES
# ==========================================================

resources:
  requests:
    cpu: 50m
    memory: 256Mi
  limits:
    memory: 3Gi

# ==========================================================
#  PODANTIAFFINITY
# ==========================================================

podAntiAffinity:
  enabled: true
  type: preferred
  weight: 100
  topologyKey: kubernetes.io/hostname

# ==========================================================
#  CUSTOMCACERTS
# ==========================================================

customCACerts:
  enabled: false
  source: configMap
  name: ''
  mountPath: /usr/local/share/ca-certificates/custom

# ==========================================================
#  COMMONANNOTATIONS
# ==========================================================

commonAnnotations: {}

# ==========================================================
#  SERVICEACCOUNTANNOTATIONS
# ==========================================================

serviceAccountAnnotations: {}

# ==========================================================
#  SERVICEANNOTATIONS
# ==========================================================

serviceAnnotations: {}

# ==========================================================
#  SECURITYCONTEXT
# ==========================================================

securityContext:
  enabled: true
  runAsUser: 7777
  runAsGroup: 7777
  fsGroup: 7777
  runAsNonRoot: true
  readOnlyRootFilesystem: true
  privileged: false
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL
  supplementalGroups:
  - 1000
  - 4000
  - 5000

# ==========================================================
#  LIVENESSPROBE
# ==========================================================

livenessProbe:
  enabled: true
  httpGet:
    path: /health/live
    port: 8080
    scheme: HTTP
  initialDelaySeconds: 60
  periodSeconds: 15
  timeoutSeconds: 3
  failureThreshold: 3
  successThreshold: 1

# ==========================================================
#  READINESSPROBE
# ==========================================================

readinessProbe:
  enabled: true
  httpGet:
    path: /health/ready
    port: 8080
    scheme: HTTP
  initialDelaySeconds: 20
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 5
  successThreshold: 1

# ==========================================================
#  STARTUPPROBE
# ==========================================================

startupProbe:
  enabled: true
  httpGet:
    path: /health/live
    port: 8080
    scheme: HTTP
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 2
  failureThreshold: 35
  successThreshold: 1

# ==========================================================
#  TOPOLOGYSPREADCONSTRAINTS
# ==========================================================

topologySpreadConstraints:
  enabled: true
  maxSkew: 1
  topologyKey: kubernetes.io/hostname
  whenUnsatisfiable: ScheduleAnyway

# ==========================================================
#  DATABASES
# ==========================================================

databases:
  operational:
    provider: sqlserver
    server_host: <my-database-server-host>
    server_username: <my-database-server-username>
    server_password: <my-database-server-password>
    pulse_database_name: <my-pulse-database-name>
    pulse_logging_database_name: <my-logging-database-name>
    encrypt: true
  datawarehouse:
    bigquery:
      enabled: false
      connections:
      - name: gbq-tenant1
        projectId: gbq-tenant1
        sqlDialect: 1
        OAuthMechanism: 0
        credentialsType: serviceAccount
        serviceAccountEmail: gbq-tenant1@my-project.iam.gserviceaccount.com
        configMapName: gbq-tenant1
        keyName: gbq-tenant1.json
        ConfigMapFilePath: /app/google-creds
        allowLargeResults: 0
        largeResultsDataSetId: _bqodbc_temp_tables
        largeResultsTempTableExpirationTime: '3600000'
    snowflake:
      enabled: false
      credentialsType: snowflake_jwt
      secretName: snowflake-creds
      mountPath: /app/snowflake-creds
      # For sdk provider: set to the SecretProviderClass name to mount the
      # private key via CSI inline volume instead of a K8s Secret.
      secretProviderClassName: ""
      keys:
      - keyName: my-snowflake-rsakey.p8

# ==========================================================
#  CLOUDIDENTITY
# ==========================================================

cloudIdentity:
  enabled: false
  serviceAccount:
    mode: per-service
    name: redpoint-rpi
  azure:
    managedIdentityClientId: your-workload-identity-client-id
    tenantId: your-azure-tenant-id
  google:
    serviceAccountEmail: my-google-svs-account@my-project.iam.gserviceaccount.com
    projectId: your_google_project_id
    configMapName: my-google-svs-account
    keyName: my-google-svs-account.json
    configMapFilePath: /app/google-creds
  amazon:
    roleArn: arn:aws:iam::my-aws-account-id:role/my-role-name
    region: us-east-1
    useAccessKeys: false
    accessKeyId: ''
    secretAccessKey: ''

# ==========================================================
#  SECRETSMANAGEMENT
# ==========================================================

secretsManagement:
  provider: kubernetes
  kubernetes:
    autoCreateSecrets: true
    secretName: redpoint-rpi-secrets
  sdk:
    azure:
      vaultUri: https://myvault.vault.azure.net/
      configurationReloadIntervalSeconds: 30
      useADTokenForDatabaseConnection: true
    amazon:
      secretTagKey: ''
    google:
      projectId: ''
  csi:
    secretName: redpoint-rpi-secrets
    secretProviderClasses:
    - name: my-secret-class-1
      provider: azure
      secretObjects:
      - secretName: secret1
        type: kubernetes.io/tls
        data:
        - key: tls.key
          objectName: my-tls-certificate
      parameters:
        keyvaultName: key_vault_name
        resourceGroup: resource_group_name
        subscriptionId: subscription_id
        clientID: your_managed_identity_client_id
        tenantId: azure_tenant_id
        usePodIdentity: 'false'
        useVMManagedIdentity: 'false'
        useWorkloadIdentity: 'true'
      objects:
      - objectName: my-tls-certificate
        objectType: secret
    - name: my-secret-class-2
      provider: azure
      secretObjects:
      - secretName: secret2
        type: Opaque
        data:
        - key: ConnectionString_Logging_Database
          objectName: V7-ConnectionString-LoggingDatabase
      parameters:
        keyvaultName: key_vault_name
        resourceGroup: resource_group_name
        subscriptionId: subscription_id
        clientID: your_managed_identity_client_id
        tenantId: azure_tenant_id
        usePodIdentity: 'false'
        useVMManagedIdentity: 'false'
        useWorkloadIdentity: 'true'
        syncSecret: 'true'
        enable-secret-rotation: 'true'
      objects:
      - objectName: V7-ConnectionString-Operations
        objectType: secret

# ==========================================================
#  STORAGE
# ==========================================================

storage:
  storageClass:
    enabled: false
    name: redpoint-rpi
    provisioner: ''
    reclaimPolicy: Delete
    volumeBindingMode: Immediate
    mountOptions: []
    parameters: {}
  persistentVolumeClaims:
    FileOutputDirectory:
      enabled: false
      claimName: rpifileoutputdir
      mountPath: /rpifileoutputdir
    Plugins:
      enabled: false
      claimName: realtimeplugins
      mountPath: /app/plugins
    DataManagementUploadDirectory:
      enabled: false
      claimName: rpdmuploaddirectory
      mountPath: /rpdmuploaddirectory
  persistentVolumes: []

# ==========================================================
#  REALTIMEAPI
# ==========================================================

realtimeapi:
  podAnnotations: {}
  podLabels: {}
  multitenant: false
  name: rpi-realtimeapi
  type: deployment
  rollout:
    autoPromotionEnabled: true
    revisionHistoryLimit: 3
  serviceAccount:
    enabled: true
  authentication:
    type: basic
    basic:
      standard: false
      forms: true
      listenerQueue: true
      recommendations: true
    oauth:
      databaseName: RPIRealtimeCore
      accessTokenLifetimeSeconds: 360
      refreshTokenLifetimeSeconds: 360
  enableHelpPages: true
  enableEventListening: true
  realtimeProcessingEnabled: true
  ThresholdBetweenSiteVisitsMinutes: 120
  ThresholdBetweenPageVisitsMinutes: 1
  CacheWebFormData: false
  decisionCacheDuration: 60
  enableAuditMetricsInHeaders: true
  cacheOutputQueueEnabled: true
  RealtimeServerCookieEnabled: false
  RealtimeServerCookieName: rg-visitor
  RealtimeServerCookieExpires: 60
  RealtimeServerCookieDomain: ''
  RealtimeServerCookieHttpOnly: false
  CacheOutputCollectIPAddress: true
  HashVisitorID: false
  EventListeningLocalCacheDuration: 60
  dataMaps:
    visitorProfile:
      DaysToPersist: 365
      CompressData: true
    visitorHistory:
      DaysToPersist: 365
      CompressData: true
    nonVisitorData:
      DaysToPersist: 365
      CompressData: true
    productRecommendation:
      DaysToPersist: 365
      CompressData: true
    offerHistory:
      DaysToPersist: 365
      CompressData: true
    messageHistory:
      DaysToPersist: 365
      CompressData: true
  idValidation:
    enableVisitorIDValidation: true
    visitorID:
      minimumLength: 1
      maximumLength: 36
      enableLetters: true
      enableNumbers: true
      permittedCharacters:
      - '-'
      - _
      - /
      - .
      - '@'
      - '#'
      - '&'
      - '?'
    enableDeviceIDValidation: true
    deviceID:
      minimumLength: 1
      maximumLength: 36
      enableLetters: true
      enableNumbers: true
      permittedCharacters:
      - '-'
      - _
      - /
      - .
      - '@'
      - '#'
      - '&'
      - '?'
  service:
    port: 80
  customMetrics:
    enabled: false
    prometheus_scrape: true
  terminationGracePeriodSeconds: 120
  logging:
    realtimeagent:
      default: Error
      database: Error
      rpiTrace: Error
      rpiError: Error
      console: Error
    realtimeapi:
      default: Error
      endpoint: Error
      shared: Error
      plugins: Error
      other: Error
      console: 'false'
  autoscaling:
    enabled: false
    type: hpa
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 80
  podDisruptionBudget:
    enabled: false
    minAvailable: 1
  resources:
    enabled: true
  queueProvider:
    amazonsqs:
      visibilityTimeout: '301'
      credentialsType: accessKey
    azurestorage:
      sendVisibilityTimeout: 1
      receiveVisibilityTimeout: 1
      connectionString: DefaultEndpointsProtocol=https;AccountName=myAccoutName;AccountKey=myAccountAccessKey;EndpointSuffix=core.windows.net
      storageAccountName: myStorageAccountName
      useAzureIdentityAuthentication: false
    azureeventhubs:
      SendMessageBatchSize: 200
      ReceiveMessageBatchSize: 200
      connectionstring: Endpoint=sb://<my-namespace>.servicebus.windows.net/;SharedAccessKeyName=<my-policy>;SharedAccessKey=<my-key>;EntityPath=<my-hub>
      eventHubName: RPIQueueListener
      NamespaceName: my_eventhub_namespace_name
      PartitionIds:
      - '0'
    amazonmsk:
      Acks: None
      CompressionType: Snappy
      MaxRetryAttempt: 10
      BatchSize: '1000000'
      LingerTime: 0
      UseAwsMsk: 'True'
      region: <my-aws-region>
      accessKeyId: <my-aws-iam-access-key>
      secretAccessKey: <my-aws-iam-secret-access-key>
      bootstrapServers: <my-server1.c2.kafka.us-east-1.amazonaws.com:9198>
    rabbitmq:
      rabbitmqSettings:
        hostname: rpi-realtimeapi-rabbitmq
        username: redpointrpi
        virtualhost: /
        resources:
          enabled: true
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 1
            memory: 1Gi
        volumeClaimTemplates:
          enabled: true
          storage: 100Gi
        volumes:
          enabled: false
          claimName: rpi-realtimeapi-rabbitmq-data
        podDisruptionBudget:
          enabled: false
          minAvailable: 1
      type: internal
    enabled: true
    provider: ''
    queueNames:
      formQueuePath: RPIWebFormSubmission
      eventsQueuePath: RPIWebEvents
      cacheOutputQueuePath: RPIWebCacheData
      recommendationsQueuePath: RPIWebRecommendations
      listenerQueuePath: RPIQueueListener
      callbackServiceQueuePath: RPICallbackApiQueue
    azureservicebus:
      connectionstring: Endpoint=sb://<my-namespace>.servicebus.windows.net/;SharedAccessKeyName=<my-policy>;SharedAccessKey=<my-key>
    googlepubsub:
      projectId: <my-google-project-id>
  cacheProvider:
    redis:
      redisSettings:
        resources:
          enabled: true
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            memory: 3Gi
        volumeClaimTemplates:
          enabled: true
          storage: 50Gi
        podDisruptionBudget:
          enabled: false
          minAvailable: 1
        connectionString: my-redis-host:6379,password=<your-password>,abortConnect=False
      type: internal
    enabled: true
    provider: ''
    mongodb:
      connectionString: mongodb://<my_username>:<my_password>@myserver.mongodb.net:27017/Pulse?authSource=admin&ssl=true
      databaseName: <my-realtime-cache-db>
      collectionName: <my-realtime-cache-collection>
    inMemorySql:
      server_host: <my-cache-database-server-host>
      database_name: <my-cache-database-name>
      username: <my-cache-database-username>
      password: <my-cache-database-password>
    googlebigtable:
      projectId: <my-bigtable-project-id>
      instanceId: <my-bigtable-instance-id>
  enabled: true
  replicas: 1
  rpiClientID: 00000000-0000-0000-0000-000000000000
  CORSOrigins:
  - '*'
  customPlugins:
    enabled: false

