# ============================================================
# REDPOINT INTERACTION (RPI) — User Configuration
# ============================================================
# Only set the values you need to customize. All internal
# defaults (health probes, security contexts, logging levels,
# service ports, rollout strategies, etc.) are managed by the
# chart via _defaults.tpl.
#
# For advanced tuning, use the `advanced:` block at the bottom.
# ============================================================

# ==========================
# Global Settings
# ==========================
global:
  deployment:
    # Deployment mode: standard (default) or demo
    # Demo mode deploys embedded MSSQL + MongoDB containers
    mode: standard
    # Cloud environment: azure, amazon, google, selfhosted
    platform: amazon

    images:
      repository: rg1acrpub.azurecr.io/docker/redpointglobal/releases
      # RPI version: <major.minor>.<year>-<MMDD>-<HHMM>
      tag: "7.7.20260220.1524"
      imagePullPolicy: Always
      imagePullSecret:
        enabled: true
        name: redpoint-rpi
    # Optional: set the pod's timezone (e.g., "America/New_York"); leave empty to use default UTC
    podTimezone: "" # 

# ==========================
# Operational Database
# ==========================
databases:
  operational:
    # Supported: sqlserver, postgresql, sqlserveronvm
    provider: sqlserver
    server_host: <my-database-server-host>
    server_username: <my-database-server-username>
    server_password: <my-database-server-password>
    pulse_database_name: <my-pulse-database-name>
    pulse_logging_database_name: <my-logging-database-name>
    encrypt: true

  # ==========================
  # Data Warehouse Providers
  # ==========================
  datawarehouse:

    # Redshift
    redshift:
      enabled: true
      connections:
        - name: rsh-tenant1
          server: redshift-tenant1.endpoint.aws
          port: 5439
          database: db_tenant1
          username: user1
          password: pass1
      # - name: rsh-tenant2
      #   server: redshift-tenant2.endpoint.aws
      #   port: 5439
      #   database: db_tenant2
      #   username: user2
      #   password: pass2

    # BigQuery
    bigquery:
      enabled: false
      connections:
        - name: gbq-tenant1
          projectId: gbq-tenant1
          sqlDialect: 1
          OAuthMechanism: 0
          credentialsType: serviceAccount
          serviceAccountEmail: gbq-tenant1@my-project.iam.gserviceaccount.com
          configMapName: gbq-tenant1
          keyName: gbq-tenant1.json
          ConfigMapFilePath: /app/google-creds
          allowLargeResults: 0
          largeResultsDataSetId: _bqodbc_temp_tables
          largeResultsTempTableExpirationTime: "3600000"

    # Snowflake
    snowflake:
      enabled: false
      # Supported: snowflake_jwt
      credentialsType: snowflake_jwt
      ConfigMapName: snowflake-creds
      keyName: my-snowflake-rsakey.p8
      ConfigMapFilePath: /app/snowflake-creds

    # Databricks
    databricks:
      enabled: false
      connections:
        - name: dbx-tenant1
          host: my-host.2.azuredatabricks.net
          port: 443
          httpPath: /sql/1.0/warehouses/c546e1e69e8d2ac9
          username: token
          password: my_databricks_token
          schema: my_schema_name
          authMechanism: 3

# ============================================================
# Cloud Identity
# ============================================================
# Pod-to-cloud authentication. Required for sdk and csi secrets modes.
# The authentication mechanism is derived from global.deployment.platform:
#   azure  -> Azure Workload Identity (ServiceAccount annotation + pod label)
#   google -> GCP Workload Identity (ServiceAccount annotation)
#   amazon -> IRSA (ServiceAccount annotation + env vars)
# ============================================================
cloudIdentity:
  enabled: true
  # ServiceAccount mode:
  #   create: true  -> one shared SA used by all services
  #   create: false -> each service creates its own SA (for per-service identity federation)
  # Both modes use the same cloud identity values below for annotations.
  serviceAccount:
    create: false
    name: redpoint-rpi
  # --- Azure Workload Identity ---
  azure:
    managedIdentityClientId: your-workload-identity-client-id
    tenantId: your-azure-tenant-id
  # --- Google Cloud Workload Identity ---
  google:
    serviceAccountEmail: my-google-svs-account@my-project.iam.gserviceaccount.com
    projectId: your_google_project_id
    # ConfigMap containing the service account JSON credentials file
    configMapName: my-google-svs-account
    keyName: my-google-svs-account.json
    configMapFilePath: /app/google-creds
  # --- Amazon IRSA / Access Keys ---
  amazon:
    roleArn: arn:aws:iam::my-aws-account-id:role/my-role-name
    region: us-east-1
    # Set to true to use static access keys instead of IRSA
    useAccessKeys: false
    accessKeyId: ""
    secretAccessKey: ""

# ============================================================
#  SECRETS MANAGEMENT
# ============================================================
# How secrets are provided to pods:
#   kubernetes -> Chart creates K8s Secret from values (or user pre-creates)
#   sdk        -> App reads directly from cloud vault at runtime (requires cloudIdentity)
#   csi        -> CSI driver syncs cloud vault to K8s Secret (requires cloudIdentity)
# ============================================================
secretsManagement:
  # kubernetes | sdk | csi
  provider: kubernetes
  # --------------------------------------------------------
  # Kubernetes secrets (provider: kubernetes)
  # --------------------------------------------------------
  kubernetes:
    autoCreateSecrets: true
    secretName: redpoint-rpi-secrets
  # --------------------------------------------------------
  # SDK - App reads from cloud vault directly (provider: sdk)
  # --------------------------------------------------------
  sdk:
    azure:
      vaultUri: https://myvault.vault.azure.net/
      configurationReloadIntervalSeconds: 30
      useADTokenForDatabaseConnection: true
    amazon:
      secretTagKey: ""
    google:
      projectId: ""
  # --------------------------------------------------------
  # CSI - CSI driver syncs vault to K8s Secret (provider: csi)
  # Pods consume secrets via secretKeyRef (same as kubernetes mode)
  # --------------------------------------------------------
  csi:
    # The K8s secret name created by the CSI driver
    secretName: redpoint-rpi-secrets
    # SecretProviderClass definitions
    secretProviderClasses:
    # ----------------------------------------------------
    # Example: TLS Certificate from Azure Key Vault
    # ----------------------------------------------------
    - name: my_secret_class_1
      provider: azure
      secretObjects:
        - secretName: secret1
          type: kubernetes.io/tls
          data:
            - key: tls.key
              objectName: cert-mpulserpi-v7-providence-org
      parameters:
        keyvaultName: key_vault_name
        resourceGroup: resource_group_name
        subscriptionId: subscription_id
        clientID: your_managed_identity_client_id
        tenantId: azure_tenant_id
        usePodIdentity: "false"
        useVMManagedIdentity: "false"
        useWorkloadIdentity: "true"
      objects:
        - objectName: "cert-mpulserpi-v7-providence-org"
          objectType: secret
    # ----------------------------------------------------
    # Example: Database Connection String
    # ----------------------------------------------------
    - name: my_secret_class_2
      provider: azure
      secretObjects:
        - secretName: secret2
          type: Opaque
          data:
            - key: ConnectionString_Logging_Database
              objectName: V7-ConnectionString-LoggingDatabase
      parameters:
        keyvaultName: key_vault_name
        resourceGroup: resource_group_name
        subscriptionId: subscription_id
        clientID: your_managed_identity_client_id
        tenantId: azure_tenant_id
        usePodIdentity: "false"
        useVMManagedIdentity: "false"
        useWorkloadIdentity: "true"
        syncSecret: "true"
        enable-secret-rotation: "true"
      objects:
        - objectName: "V7-ConnectionString-Operations"
          objectType: secret

# ==========================
# Storage
# ==========================
storage:
  persistentVolumeClaims:
    FileOutputDirectory:
      enabled: false
      claimName: rpifileoutputdir
      mountPath: /rpifileoutputdir
    Plugins:
      enabled: false
      claimName: realtimeplugins
      mountPath: /app/plugins
    DataManagementUploadDirectory:
      enabled: false
      claimName: rpdmuploaddirectory
      mountPath: /rpdmuploaddirectory

  # Create PV + PVC pairs (for CSI-backed storage)
  persistentVolumes: []
  # persistentVolumes:
  #   - name: rpi-blob-storage
  #     capacity: 100Gi
  #     accessModes: [ReadWriteMany]
  #     storageClassName: blob-fuse
  #     reclaimPolicy: Retain
  #     mountOptions:
  #       - -o allow_other
  #       - --file-cache-timeout-in-seconds=120
  #     csi:
  #       driver: blob.csi.azure.com
  #       volumeHandle: unique-volume-handle
  #       volumeAttributes:
  #         containerName: rpi-data
  #         storageAccount: mystorageaccount
  #     pvc:
  #       claimName: rpi-blob-pvc

# ==========================
# Realtime API
# ==========================
realtimeapi:
  enabled: true
  replicas: 1
  rpiClientID: 00000000-0000-0000-0000-000000000000
  authentication:
    # Supported: basic, oauth
    type: basic
    basic:
      standard: false
      forms: true
      listenerQueue: true
      recommendations: true
    oauth:
      databaseName: RPIRealtimeCore
      accessTokenLifetimeSeconds: 360
      refreshTokenLifetimeSeconds: 360
  CORSOrigins: ["*"]

  # Real-Time Cache Provider
  cacheProvider:
    enabled: true
    # Supported: mongodb, azureredis, redis, inMemorySql, googlebigtable
    provider: mongodb
    mongodb:
      connectionString: mongodb://<my_username>:<my_password>@myserver.mongodb.net:27017/Pulse?authSource=admin&ssl=true
      databaseName: <my-realtime-cache-db>
      collectionName: <my-realtime-cache-collection>
    redis:
      # internal: chart-managed Redis | external: BYO Redis
      type: internal
      redisSettings:
        # Required if type=external
        connectionString: "my-redis-host:6379,password=<your-password>,abortConnect=False"
    inMemorySql:
      server_host: <my-cache-database-server-host>
      database_name: <my-cache-database-name>
      username: <my-cache-database-username>
      password: <my-cache-database-password>
    googlebigtable:
      projectId: <my-bigtable-project-id>
      instanceId: <my-bigtable-instance-id>

  # Real-Time Queue Provider
  queueProvider:
    enabled: true
    # Supported: amazonsqs, azureservicebus, googlepubsub, azureeventhubs, rabbitmq, azurestorage, amazonmsk
    provider: amazonsqs
    queueNames:
      formQueuePath: RPIWebFormSubmission
      eventsQueuePath: RPIWebEvents
      cacheOutputQueuePath: RPIWebCacheData
      recommendationsQueuePath: RPIWebRecommendations
      listenerQueuePath: RPIQueueListener
      callbackServiceQueuePath: RPICallbackApiQueue
    amazonsqs:
      # Supported: accessKey (configure keys under cloudIdentity.amazonSettings)
      credentialsType: accessKey
    azureservicebus:
      connectionstring: Endpoint=sb://<my-namespace>.servicebus.windows.net/;SharedAccessKeyName=<my-policy>;SharedAccessKey=<my-key>
    azurestorage:
      connectionString: DefaultEndpointsProtocol=https;AccountName=myAccoutName;AccountKey=myAccountAccessKey;EndpointSuffix=core.windows.net
      storageAccountName: myStorageAccountName
      useAzureIdentityAuthentication: false
    googlepubsub:
      projectId: <my-google-project-id>
    azureeventhubs:
      connectionstring: Endpoint=sb://<my-namespace>.servicebus.windows.net/;SharedAccessKeyName=<my-policy>;SharedAccessKey=<my-key>;EntityPath=<my-hub>
      eventHubName: RPIQueueListener
      NamespaceName: my_eventhub_namespace_name
      PartitionIds:
        - "0"
    rabbitmq:
      # internal: chart-managed RabbitMQ | external: BYO RabbitMQ
      type: internal
    amazonmsk:
      region: <my-aws-region>
      accessKeyId: <my-aws-iam-access-key>
      secretAccessKey: <my-aws-iam-secret-access-key>
      bootstrapServers: <my-server1.c2.kafka.us-east-1.amazonaws.com:9198>

  # Custom Realtime plugins (see docs/plugins.md for examples)
  customPlugins:
    enabled: false
    # list: []

  resources:
    requests:
      cpu: 500m
      memory: 3Gi
    limits:
      memory: 3Gi
  autoscaling:
    enabled: true

# ==========================
# Callback API
# ==========================
callbackapi:
  enabled: true
  replicas: 1
  channelLabel: SendGrid
  # Enable multitenancy for per-client instances
  multitenancy:
    enabled: false
  instances:
    - name: "tenant1"
      replicas: 1
  #  - name: "client2"
  #    replicas: 1
  resources:
    requests:
      cpu: 500m
      memory: 3Gi
    limits:
      memory: 3Gi
  autoscaling:
    enabled: true

# ==========================
# Execution Service
# ==========================
executionservice:
  enabled: true
  replicas: 1
  enableRPIAuthentication: true
  # Internal cache for execution state
  internalCache:
    enabled: true
    # Supported: default, filesystem, azureblob
    provider: filesystem
    # Redis settings (when provider=default or for state caching)
    redisSettings:
      # internal: chart-managed Redis | external: BYO Redis
      type: internal
      # Required if type=external
      connectionString: "my-redis-host:6379,password=<your-password>,abortConnect=False"
    # Azure Blob settings (when provider=azureblob)
    azureStorageSettings:
      accountName: my_storage_account_name
      containerName: rpi
      connectionString: DefaultEndpointsProtocol=https;AccountName=<myAccoutName;AccountKey=<myAccountAccessKey;EndpointSuffix=core.windows.net
      useCloudIdentity: false
  resources:
    requests:
      cpu: 500m
      memory: 3Gi
    limits:
      memory: 3Gi
  autoscaling:
    enabled: false
    # Supported: hpa, keda (KEDA is recommended for execution service)
    # type: hpa

# ==========================
# Interaction API
# ==========================
interactionapi:
  enabled: true
  replicas: 1
  enableRPIAuthentication: true
  resources:
    requests:
      cpu: 500m
      memory: 3Gi
    limits:
      memory: 3Gi
  autoscaling:
    enabled: true

# ==========================
# Integration API
# ==========================
integrationapi:
  enabled: true
  replicas: 1
  enableRPIAuthentication: true
  # Credentials (required if Smart Activation is enabled)
  username: admin@noemail.com
  password: my_Super_Strong_Pwd
  resources:
    requests:
      cpu: 500m
      memory: 3Gi
    limits:
      memory: 3Gi
  autoscaling:
    enabled: true

# ==========================
# Node Manager
# ==========================
nodemanager:
  enabled: true
  replicas: 1
  enableRPIAuthentication: true
  resources:
    requests:
      cpu: 500m
      memory: 3Gi
    limits:
      memory: 3Gi
  autoscaling:
    enabled: true

# ==========================
# Deployment API
# ==========================
deploymentapi:
  enabled: true
  replicas: 1
  # Use exported tenant template files for new tenant creation
  templateTenant:
    useTemplateFiles: false
    templateTenantFilesPath: "/tmp/templatetenantfiles"
    volumeClaimName: templatetenantfiles
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      memory: 1Gi

# ==========================
# Queue Reader
# ==========================
queuereader:
  enabled: true
  replicas: 1
  realtimeConfiguration:
    # Enable distributed processing for high-volume transactions
    isDistributed: false
    internalCache:
      provider: redis
      # internal: chart-managed Redis | external: BYO Redis
      type: internal
      redisSettings:
        # Required if type=external
        connectionString: "my-redis-host:6379,password=<your-password>,abortConnect=False"
    distributedQueue:
      provider: rabbitmq
      # internal: chart-managed RabbitMQ | external: BYO RabbitMQ
      type: internal
      rabbitmqSettings:
        hostname: "rpi-queuereader-rabbitmq"
        username: redpointrpi
        password: my_Super_Strong_Pwd
    # RPI client IDs for this cluster
    tenantIds:
      - 00000000-0000-0000-0000-000000000000
  errorQueuePath: listenerQueueError 
  nonActiveQueuePath: listenerQueueNonActive
  resources:
    requests:
      cpu: 500m
      memory: 3Gi
    limits:
      memory: 3Gi
  autoscaling:
    enabled: true

# ==========================
# Rebrandly (URL Shortener)
# ==========================
rebrandly:
  enabled: false
  apiKey: my_rebrandly_api_key
  autoCreateSecrets: true
  secretName: rpi-rebrandly
  redisSettings:
    # internal: chart-managed Redis | external: BYO Redis
    type: internal
    # External Redis settings (if type=external)
    hostname: rpi-rebrandly-cache
    username: my_redis_username
    password: my_redis_password
    useAzureCredentials: false
    port: 6379
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      memory: 4Gi

# ==========================
# Diagnostics Mode
# ==========================
diagnosticsMode:
  copytoAzureBlob:
    enabled: false
    accountName: <yourstorageaccount>
    accessKey: <yourstorageaccount-access-key>
    containerName: <yourstorageaccount-container-name>
    blobServiceEndpoint: https://yourstorage.blob.core.windows.net
    enableCdn: false
    UseDataLakeStorageGen2: false
  copytoSftp:
    enabled: false
    sftpHost: <your-sftp-host>
    sftpUsername: <your-sftp-username>
    sftpPassword: <your-sftp-password>
    sftpPort: "22"

# ==========================
# Microsoft Entra ID Authentication
# ==========================
MicrosoftEntraID:
  enabled: false
  interaction_client_id: 00000000-0000-0000-0000-000000000000
  interaction_api_id: 00000000-0000-0000-0000-000000000000
  tenant_id: 00000000-0000-0000-0000-000000000000

# ==========================
# OpenID Connect Providers
# ==========================
OpenIdProviders:
  enabled: false
  # Supported: keycloak, Okta
  name: Keycloak
  authorizationHost: https://login.microsoftonline.com/00000000-0000-0000-0000-000000000000/v2.0
  clientID: 00000000-0000-0000-0000-000000000000
  audience: api://00000000-0000-0000-0000-000000000000
  redirectURL: https://rpi-interactionapi.example.com
  enableRefreshTokens: true
  validateIssuer: false
  validateAudience: true
  logoutIdTokenParameter: id_token_hint
  customScopes:
    - api://00000000-0000-0000-0000-000000000000/Interaction.Clients
  supportsUserManagement: false

# ==========================
# SMTP Settings
# ==========================
SMTPSettings:
  SMTP_SenderAddress: noreply-rpi@example.com
  SMTP_SenderName: "Redpoint Global"
  SMTP_Address: your_smtp_host
  SMTP_Port: 587
  EnableSSL: true
  UseCredentials: true
  SMTP_Username: your_smtp_server_username
  SMTP_Password: your_smtp_server_password

# ============================================================
#  INGRESS
# ============================================================

ingress:
  controller:
    enabled: true                         # false if supplying your own controller
  mode: public                            # public | private
  certificateSource: kubernetes           # kubernetes | acm
  # TLS entries (rendered when certificateSource=kubernetes)
  # Add entries with explicit hosts lists for multi-cert setups
  tls:
    - secretName: ingress-tls
    # - secretName: certsecrets             # additional cert for FQDN hosts
    #   hosts:
    #     - mpulse.example.com
  domain: example.com
  subnetName: <my-ingress-vpc-subnet-name>  # required if mode=private
  certificateArn: your_acm_certificate_arn  # required if certificateSource=acm
  privateLink:
    azure:
      enabled: false
  # Service hostnames — subdomains are prepended to domain,
  # values containing a dot are used as FQDNs (e.g., mpulse.example.com)
  hosts:
    config: rpi-deploymentapi
    client: rpi-interactionapi
    integration: rpi-integrationapi
    realtime: rpi-realtimeapi
    callbackapi: rpi-callbackapi            # or: mpulse.example.com (FQDN)
    queuereader: rpi-queuereader
    rabbitmqconsole: rpi-rabbitmq-console
    smartactivation: rpi-smartActivation

# ==========================
# Network Policy
# ==========================
networkPolicy:
  enabled: false

# ==========================
# Service Mesh
# ==========================
serviceMesh:
  enabled: false
  # Supported: linkerd
  provider: linkerd
  # Linkerd Server CRDs for L7 traffic policy
  servers: []
  # servers:
  #   - name: realtimeapi
  #     podSelector:
  #       app.kubernetes.io/name: rpi-realtimeapi
