# customAnnotations:
#   my-custom-annotation: "my-value"
customAnnotations: {}

# ==========================
# Post-Install Automation
# ==========================
# Automates license activation, cluster DB install, and optional tenant creation.
# Runs as a Helm post-install hook (and ArgoCD PostSync).
postInstall:
  enabled: false
  # Use an existing K8s secret instead of inline values
  # Keys: activation-key, admin-password, admin-username, admin-email
  # existingSecret: ""
  activationKey: ""
  systemName: ""
  adminUsername: "coreuser"
  adminPassword: ""
  adminEmail: ""
  tenant:
    enabled: false
    name: ""
    # existingSecret: ""  # Keys: dw-server, dw-database, dw-username, dw-password
    dataWarehouse:
      provider: SQLServer
      server: ""
      database: ""
      username: ""
      password: ""
  waitTimeout: 360
  backoffLimit: 3

# ==========================
# Pre-flight Validation
# ==========================
# Validates configuration before deployment:
