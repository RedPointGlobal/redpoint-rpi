# ============================================================
# REDPOINT INTERACTION (RPI) — User Configuration
# ============================================================
# Only set the values you need to customize. All internal
# defaults (health probes, security contexts, logging levels,
# service ports, rollout strategies, etc.) are managed by the
# chart via _defaults.tpl.
#
# For advanced tuning, use the `advanced:` block at the bottom.
# ============================================================

# ==========================
# Global Settings
# ==========================
global:
  deployment:
    # Cloud environment: azure, amazon, google, selfhosted
    platform: amazon

    images:
      interactionapi: rg1acrpub.azurecr.io/docker/redpointglobal/releases/rpi-interactionapi
      integrationapi: rg1acrpub.azurecr.io/docker/redpointglobal/releases/rpi-integrationapi
      executionservice: rg1acrpub.azurecr.io/docker/redpointglobal/releases/rpi-executionservice
      nodemanager: rg1acrpub.azurecr.io/docker/redpointglobal/releases/rpi-nodemanager
      callbackapi: rg1acrpub.azurecr.io/docker/redpointglobal/releases/rpi-callbackapi
      deploymentapi: rg1acrpub.azurecr.io/docker/redpointglobal/releases/rpi-deploymentapi
      realtimeapi: rg1acrpub.azurecr.io/docker/redpointglobal/releases/rpi-realtimeapi
      queuereader: rg1acrpub.azurecr.io/docker/redpointglobal/releases/rpi-queuereader
      rabbitmq: rg1acrpub.azurecr.io/docker/redpointglobal/releases/rabbitmq
      rediscache: rg1acrpub.azurecr.io/docker/redpointglobal/releases/rediscache
      rebrandly: rg1acrpub.azurecr.io/docker/redpointglobal/releases/rebrandly
      ingress_controller: rg1acrpub.azurecr.io/docker/redpointglobal/releases/nginx-ingress-controller
      net_utils: rg1acrpub.azurecr.io/docker/redpointglobal/releases/net-utils:latest
      cdpauthservices: rg1acrpub.azurecr.io/docker/redpointglobal/releases/cdp-authservice
      cdpinitservice: rg1acrpub.azurecr.io/docker/redpointglobal/releases/cdp-init
      cdpservicesapi: rg1acrpub.azurecr.io/docker/redpointglobal/releases/cdp-servicesapi
      cdpuiservice: rg1acrpub.azurecr.io/docker/redpointglobal/releases/cdp-ui
      cdpsocketio: rg1acrpub.azurecr.io/docker/redpointglobal/releases/cdp-socketio
      cdpmessageq: rg1acrpub.azurecr.io/docker/redpointglobal/releases/cdp-messageq
      cdpmaintenanceservice: rg1acrpub.azurecr.io/docker/redpointglobal/releases/cdp-maintenance
      keycloak: rg1acrpub.azurecr.io/docker/redpointglobal/releases/keycloak
      # RPI version: <major.minor>.<year>-<MMDD>-<HHMM>
      tag: "7.7.20260220.1524"
      imagePullSecret:
        enabled: true
        name: redpoint-rpi

# ==========================
# Operational Database
# ==========================
databases:
  operational:
    # Supported: sqlserver, postgresql, sqlserveronvm
    provider: sqlserver
    server_host: <my-database-server-host>
    server_username: <my-database-server-username>
    server_password: <my-database-server-password>
    pulse_database_name: <my-pulse-database-name>
    pulse_logging_database_name: <my-logging-database-name>

  # ==========================
  # Data Warehouse Providers
  # ==========================
  datawarehouse:

    # Redshift
    redshift:
      enabled: true
      connections:
        - name: rsh-tenant1
          server: redshift-tenant1.endpoint.aws
          port: 5439
          database: db_tenant1
          username: user1
          password: pass1
      # - name: rsh-tenant2
      #   server: redshift-tenant2.endpoint.aws
      #   port: 5439
      #   database: db_tenant2
      #   username: user2
      #   password: pass2

    # BigQuery
    bigquery:
      enabled: false
      connections:
        - name: gbq-tenant1
          projectId: gbq-tenant1
          sqlDialect: 1
          OAuthMechanism: 0
          credentialsType: serviceAccount
          serviceAccountEmail: gbq-tenant1@my-project.iam.gserviceaccount.com
          configMapName: gbq-tenant1
          keyName: gbq-tenant1.json
          ConfigMapFilePath: /app/google-creds
          allowLargeResults: 0
          largeResultsDataSetId: _bqodbc_temp_tables
          largeResultsTempTableExpirationTime: "3600000"

    # Snowflake
    snowflake:
      enabled: false
      # Supported: password, snowflake_jwt
      credentialsType: password
      ConfigMapName: snowflake-creds
      keyName: my-snowflake-rsakey.p8
      ConfigMapFilePath: /app/snowflake-creds

    # Databricks
    databricks:
      enabled: false
      connections:
        - name: dbx-tenant1
          host: my-host.2.azuredatabricks.net
          port: 443
          httpPath: /sql/1.0/warehouses/c546e1e69e8d2ac9
          username: token
          password: my_databricks_token
          schema: my_schema_name
          authMechanism: 3

# ==========================
# Cloud Identity & Secrets Management
# ==========================
cloudIdentity:
  enabled: false
  # Supported: Azure, Google, Amazon
  provider: Amazon
  secretsManagement:
    enabled: false
    # Supported: kubernetes, keyvault, awssecretsmanager
    secretsProvider: kubernetes
    autoCreateSecrets: true
    secretName: redpoint-rpi-secrets
    UseForConfigPasswords: true
    UseForAppSettings: true
    ConfigurationReloadIntervalSeconds: 30
  azureSettings:
    # Supported: workloadIdentity
    credentialsType: workloadIdentity
    managedIdentityClientId: your_managed_identity_client_id
    UseADTokenForDatabaseConnection: false
    vaultUri: https://myvault.vault.azure.net/
    appSettingsVaultUri: https://myvault.vault.azure.net/
  googleSettings:
    credentialsType: serviceAccount
    configMapName: my-google-svs-account
    keyName: my-google-svs-account.json
    ConfigMapFilePath: /app/google-creds
    serviceAccountEmail: my-google-svs-account@my-project.iam.gserviceaccount.com
    projectId: your_google_project_id
  amazonSettings:
    # Supported: podIdentity, accessKey, iamRole
    credentialsType: accessKey
    accessKeyId: <my-aws-iam-access-key>
    secretAccessKey: <my-aws-iam-secret-access-key>
    roleArn: arn:aws:iam::my-aws-account-id:role/my-role-name
    webIdentityTokenFile: /var/run/secrets/eks.amazonaws.com/serviceaccount/token
    stsRegionalEndpoints: regional
    region: us-east-1
    secretsManagerSettings:
      secretTagKey: rpi-app
      credentialSecretName: aws-sm-access-keys

# ==========================
# Storage
# ==========================
storage:
  persistentVolumeClaims:
    FileOutputDirectory:
      enabled: false
      claimName: rpifileoutputdir
      mountPath: /rpifileoutputdir
    Plugins:
      enabled: false
      claimName: realtimeplugins
      mountPath: /app/plugins
    DataManagementUploadDirectory:
      enabled: false
      claimName: rpdmuploaddirectory
      mountPath: /rpdmuploaddirectory

# ==========================
# Realtime API
# ==========================
realtimeapi:
  enabled: true
  replicas: 1
  rpiClientID: 00000000-0000-0000-0000-000000000000
  authentication:
    # Supported: basic, oauth
    type: basic
    basic:
      standard: false
      forms: true
      listenerQueue: true
      recommendations: true
    oauth:
      databaseName: RPIRealtimeCore
      accessTokenLifetimeSeconds: 360
      refreshTokenLifetimeSeconds: 360
  CORSOrigins: ["*"]

  # Real-Time Cache Provider
  cacheProvider:
    enabled: true
    # Supported: mongodb, azureredis, redis, inMemorySql, googlebigtable
    provider: mongodb
    mongodb:
      connectionString: mongodb://<my_username>:<my_password>@myserver.mongodb.net:27017/Pulse?authSource=admin&ssl=true
      databaseName: <my-realtime-cache-db>
      collectionName: <my-realtime-cache-collection>
    redis:
      # internal: chart-managed Redis | external: BYO Redis
      type: internal
      redisSettings:
        # Required if type=external
        connectionString: "my-redis-host:6379,password=<your-password>,abortConnect=False"
    inMemorySql:
      server_host: <my-cache-database-server-host>
      database_name: <my-cache-database-name>
      username: <my-cache-database-username>
      password: <my-cache-database-password>
    googlebigtable:
      projectId: <my-bigtable-project-id>
      instanceId: <my-bigtable-instance-id>

  # Real-Time Queue Provider
  queueProvider:
    enabled: true
    # Supported: amazonsqs, azureservicebus, googlepubsub, azureeventhubs, rabbitmq, azurestorage, amazonmsk
    provider: amazonsqs
    queueNames:
      formQueuePath: RPIWebFormSubmission
      eventsQueuePath: RPIWebEvents
      cacheOutputQueuePath: RPIWebCacheData
      recommendationsQueuePath: RPIWebRecommendations
      listenerQueuePath: RPIQueueListener
      callbackServiceQueuePath: RPICallbackApiQueue
    amazonsqs:
      # Supported: accessKey (configure keys under cloudIdentity.amazonSettings)
      credentialsType: accessKey
    azureservicebus:
      connectionstring: Endpoint=sb://<my-namespace>.servicebus.windows.net/;SharedAccessKeyName=<my-policy>;SharedAccessKey=<my-key>
    azurestorage:
      connectionString: DefaultEndpointsProtocol=https;AccountName=myAccoutName;AccountKey=myAccountAccessKey;EndpointSuffix=core.windows.net
      storageAccountName: myStorageAccountName
      useAzureIdentityAuthentication: false
    googlepubsub:
      projectId: <my-google-project-id>
    azureeventhubs:
      connectionstring: Endpoint=sb://<my-namespace>.servicebus.windows.net/;SharedAccessKeyName=<my-policy>;SharedAccessKey=<my-key>;EntityPath=<my-hub>
      eventHubName: RPIQueueListener
      NamespaceName: my_eventhub_namespace_name
      PartitionIds:
        - "0"
    rabbitmq:
      # internal: chart-managed RabbitMQ | external: BYO RabbitMQ
      type: internal
    amazonmsk:
      region: <my-aws-region>
      accessKeyId: <my-aws-iam-access-key>
      secretAccessKey: <my-aws-iam-secret-access-key>
      bootstrapServers: <my-server1.c2.kafka.us-east-1.amazonaws.com:9198>

  # Custom Realtime plugins (see docs/plugins.md for examples)
  customPlugins:
    enabled: false
    # list: []

  resources:
    requests:
      cpu: 500m
      memory: 3Gi
    limits:
      memory: 3Gi
  autoscaling:
    enabled: true

# ==========================
# Callback API
# ==========================
callbackapi:
  enabled: true
  replicas: 1
  channelLabel: SendGrid
  # Enable multitenancy for per-client instances
  multitenancy:
    enabled: false
  instances:
    - name: "tenant1"
      replicas: 1
  #  - name: "client2"
  #    replicas: 1
  resources:
    requests:
      cpu: 500m
      memory: 3Gi
    limits:
      memory: 3Gi
  autoscaling:
    enabled: true

# ==========================
# Execution Service
# ==========================
executionservice:
  enabled: true
  replicas: 1
  enableRPIAuthentication: true
  # Internal cache for execution state
  internalCache:
    enabled: true
    # Supported: default, filesystem, azureblob
    provider: filesystem
    # Redis settings (when provider=default or for state caching)
    redisSettings:
      # internal: chart-managed Redis | external: BYO Redis
      type: internal
      # Required if type=external
      connectionString: "my-redis-host:6379,password=<your-password>,abortConnect=False"
    # Azure Blob settings (when provider=azureblob)
    azureStorageSettings:
      accountName: my_storage_account_name
      containerName: rpi
      connectionString: DefaultEndpointsProtocol=https;AccountName=<myAccoutName;AccountKey=<myAccountAccessKey;EndpointSuffix=core.windows.net
      useCloudIdentity: false
  resources:
    requests:
      cpu: 500m
      memory: 3Gi
    limits:
      memory: 3Gi
  autoscaling:
    enabled: false
    # Supported: hpa, keda (KEDA is recommended for execution service)
    # type: hpa

# ==========================
# Interaction API
# ==========================
interactionapi:
  enabled: true
  replicas: 1
  enableRPIAuthentication: true
  resources:
    requests:
      cpu: 500m
      memory: 3Gi
    limits:
      memory: 3Gi
  autoscaling:
    enabled: true

# ==========================
# Integration API
# ==========================
integrationapi:
  enabled: true
  replicas: 1
  enableRPIAuthentication: true
  # Credentials (required if Smart Activation is enabled)
  username: admin@noemail.com
  password: my_Super_Strong_Pwd
  resources:
    requests:
      cpu: 500m
      memory: 3Gi
    limits:
      memory: 3Gi
  autoscaling:
    enabled: true

# ==========================
# Node Manager
# ==========================
nodemanager:
  enabled: true
  replicas: 1
  enableRPIAuthentication: true
  resources:
    requests:
      cpu: 500m
      memory: 3Gi
    limits:
      memory: 3Gi
  autoscaling:
    enabled: true

# ==========================
# Deployment API
# ==========================
deploymentapi:
  enabled: true
  replicas: 1
  # Use exported tenant template files for new tenant creation
  templateTenant:
    useTemplateFiles: false
    templateTenantFilesPath: "/tmp/templatetenantfiles"
    volumeClaimName: templatetenantfiles
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      memory: 1Gi

# ==========================
# Queue Reader
# ==========================
queuereader:
  enabled: true
  replicas: 1
  realtimeConfiguration:
    # Enable distributed processing for high-volume transactions
    isDistributed: false
    distributedCache:
      provider: redis
      # internal: chart-managed Redis | external: BYO Redis
      type: internal
      redisSettings:
        # Required if type=external
        connectionString: "my-redis-host:6379,password=<your-password>,abortConnect=False"
    distributedQueue:
      provider: rabbitmq
      # internal: chart-managed RabbitMQ | external: BYO RabbitMQ
      type: internal
      rabbitmqSettings:
        hostname: "rpi-queuereader-rabbitmq"
        username: redpointrpi
        password: my_Super_Strong_Pwd
    # RPI client IDs for this cluster
    tenantIds:
      - 00000000-0000-0000-0000-000000000000
  resources:
    requests:
      cpu: 500m
      memory: 3Gi
    limits:
      memory: 3Gi
  autoscaling:
    enabled: true

# ==========================
# Rebrandly (URL Shortener)
# ==========================
rebrandly:
  enabled: false
  apiKey: my_rebrandly_api_key
  autoCreateSecrets: true
  secretName: rpi-rebrandly
  redisSettings:
    # internal: chart-managed Redis | external: BYO Redis
    type: internal
    # External Redis settings (if type=external)
    hostname: rpi-rebrandly-cache
    username: my_redis_username
    password: my_redis_password
    useAzureCredentials: false
    port: 6379
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      memory: 4Gi

# ==========================
# Diagnostics Mode
# ==========================
diagnosticsMode:
  copytoAzureBlob:
    enabled: false
    accountName: <yourstorageaccount>
    accessKey: <yourstorageaccount-access-key>
    containerName: <yourstorageaccount-container-name>
    blobServiceEndpoint: https://yourstorage.blob.core.windows.net
    enableCdn: false
    UseDataLakeStorageGen2: false
  copytoSftp:
    enabled: false
    sftpHost: <your-sftp-host>
    sftpUsername: <your-sftp-username>
    sftpPassword: <your-sftp-password>
    sftpPort: "22"

# ==========================
# Microsoft Entra ID Authentication
# ==========================
MicrosoftEntraID:
  enabled: false
  interaction_client_id: 00000000-0000-0000-0000-000000000000
  interaction_api_id: 00000000-0000-0000-0000-000000000000
  tenant_id: 00000000-0000-0000-0000-000000000000

# ==========================
# OpenID Connect Providers
# ==========================
OpenIdProviders:
  enabled: false
  # Supported: keycloak, Okta
  name: Keycloak
  authorizationHost: https://login.microsoftonline.com/00000000-0000-0000-0000-000000000000/v2.0
  clientID: 00000000-0000-0000-0000-000000000000
  audience: api://00000000-0000-0000-0000-000000000000
  redirectURL: https://rpi-interactionapi.example.com
  enableRefreshTokens: true
  validateIssuer: false
  validateAudience: true
  logoutIdTokenParameter: id_token_hint
  customScopes:
    - api://00000000-0000-0000-0000-000000000000/Interaction.Clients
  supportsUserManagement: false

# ==========================
# SMTP Settings
# ==========================
SMTPSettings:
  SMTP_SenderAddress: noreply-rpi@example.com
  SMTP_SenderName: "Redpoint Global"
  SMTP_Address: your_smtp_host
  SMTP_Port: 587
  EnableSSL: true
  UseCredentials: true
  SMTP_Username: your_smtp_server_username
  SMTP_Password: your_smtp_server_password

# ==========================
# Ingress
# ==========================
ingress:
  controller:
    # Set to false if supplying your own ingress controller
    enabled: true
  # Exposure mode: public or private
  mode: public
  # TLS certificate source: kubernetes or acm
  certificateSource: kubernetes
  tlsSecretName: ingress-tls
  domain: example.com
  # Required if mode=private
  subnetName: <my-ingress-vpc-subnet-name>
  # Required if certificateSource=acm
  certificateArn: your_acm_certificate_arn
  # Azure Private Link (private ingress on Azure)
  privateLink:
    azure:
      enabled: false
  # Service hostnames (prepended to domain)
  hosts:
    config: rpi-deploymentapi
    client: rpi-interactionapi
    integration: rpi-integrationapi
    realtime: rpi-realtimeapi
    callbackapi: rpi-callbackapi
    queuereader: rpi-queuereader
    rabbitmqconsole: rpi-rabbitmq-console
    smartactivation: rpi-smartActivation

# ==========================
# Network Policy
# ==========================
networkPolicy:
  enabled: false

# ==========================
# Node Scheduling
# ==========================
nodeSelector:
  enabled: false
  key: app
  value: redpoint-rpi

tolerations:
  enabled: false
  effect: NoSchedule
  key: app
  operator: Equal
  value: redpoint-rpi

# ==========================
# Redpoint AI
# ==========================
redpointAI:
  enabled: false
  naturalLanguage:
    ApiKey: <my-openai-key>
    ApiBase: https://example.openai.azure.com/
    ApiVersion: 2023-07-01-preview
    ChatGptEngine: gpt-5.1
    ChatGptTemp: 0.5
  cognitiveSearch:
    SearchEndpoint: https://example.search.windows.net
    SearchKey: <my-cognitivesearch-key>
    VectorSearchProfile: vector-profile-000000000000
    VectorSearchConfig: vector-config-000000000000
  modelStorage:
    ConnectionString: DefaultEndpointsProtocol=https;AccountName=my_account_name;AccountKey=my_account_access_key
    EmbeddingsModel: text-embedding-ada-002
    ModelDimensions: 1536
    ContainerName: my_blob_container_name
    BlobFolder: my_blob_container_folder_name

# ==========================
# Smart Activation
# ==========================
smartActivation:
  enabled: false
  autoCreateSecrets: true
  secretName: rpi-smartactivation

# Auth Service (Smart Activation)
authservice:
  replicas: 1
  default_username: admin@noemail.com
  default_password: my_Super_Strong_Pwd
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      memory: 2Gi

# Keycloak (Smart Activation)
keycloak:
  replicas: 1
  hostname: keycloak
  username: admin@noemail.com
  password: my_Super_Strong_Pwd
  database_name: keycloak
  realm_name: redpoint-mercury
  realm_client_id: rpi-service
  realm_client_secret: <my-realm-client-secret>
  resources:
    requests:
      cpu: 500m
      memory: 3Gi
    limits:
      memory: 3Gi

# Reporting Service
reportingservice:
  sigma:
    enabled: false
    api_url: https://api.us.azure.sigmacomputing.com
    client_id: 48dd1982ab835ff53177e9cbd7fb5608b1db8c56491a040f2f0843a3bfc6b440
    client_secret: my_sigma_client_secret

# Init Service (Smart Activation)
initservice:
  replicas: 1
  database:
    operational:
      name: smart_activation_db
      connection_string: mongodb+srv://<my_username>:<my_password>@<my_hostname>/?retryWrites=true&w=majority
  resources:
    requests:
      cpu: 500m
      memory: 3Gi
    limits:
      memory: 3Gi

# Message Queue (Smart Activation)
messageq:
  replicas: 1
  username: redpointrpi
  resources:
    requests:
      cpu: 500m
      memory: 3Gi
    limits:
      memory: 3Gi

# Maintenance Service (Smart Activation)
maintenanceservice:
  replicas: 1
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      memory: 2Gi

# Services API (Smart Activation)
servicesapi:
  replicas: 1
  sso_enabled: true
  resources:
    requests:
      cpu: 500m
      memory: 3Gi
    limits:
      memory: 3Gi

# Socket.io (Smart Activation)
socketio:
  replicas: 1
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      memory: 2Gi

# UI Service (Smart Activation)
uiservice:
  replicas: 1
  resources:
    requests:
      cpu: 500m
      memory: 3Gi
    limits:
      memory: 3Gi

# CDP Cache (Smart Activation)
cdpcache:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      memory: 2Gi

# ==========================
# Custom Labels and Annotations
# ==========================
# customLabels:
#   environment: "prod"
#   team: "marketing"
customLabels: {}

# customAnnotations:
#   my-custom-annotation: "my-value"
customAnnotations: {}

# ============================================================
# ADVANCED CONFIGURATION
# ============================================================
# Override any internal default by nesting the component path
# under `advanced`. Most users should NOT modify these.
#
# Example — override execution service job timeout:
#   advanced:
#     executionservice:
#       jobExecution:
#         taskTimeout: 120
#
# Example — override health probe timing:
#   advanced:
#     livenessProbe:
#       periodSeconds: 30
#
# Example — override realtime data map retention:
#   advanced:
#     realtimeapi:
#       dataMaps:
#         visitorProfile:
#           DaysToPersist: 180
#
# See docs/advanced-configuration.md for all available keys.
# ============================================================
advanced: {}
