{{- if eq (include "rpi.telemetry.databaseMetrics" .) "true" }}
{{- $col := ((($.Values.observability).telemetry).otel).collector | default dict -}}
{{- $res := $col.resources | default dict -}}
# Shared OpenTelemetry Collector. The DB-touching RPI services export
# OTLP metrics here; it re-exposes them as Prometheus on :8889 for the
# observability service to scrape. Metrics-only pipeline (otlp ->
# prometheus): the native SqlClient db.client.operation.duration metrics
# arrive on the OTLP metrics stream, so no traces / spanmetrics needed.
apiVersion: v1
kind: ConfigMap
metadata:
  name: rpi-observability-otel-collector
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" "rpi-observability-otel-collector" "component" "telemetry") | nindent 4 }}
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
    processors:
      memory_limiter:
        check_interval: 5s
        limit_mib: 300
        spike_limit_mib: 75
      batch:
        send_batch_size: 1000
        timeout: 10s
    exporters:
      prometheus:
        endpoint: 0.0.0.0:8889
        add_metric_suffixes: true
        resource_to_telemetry_conversion:
          enabled: true
    service:
      telemetry:
        logs:
          level: warn
      pipelines:
        metrics:
          receivers:  [otlp]
          processors: [memory_limiter, batch]
          exporters:  [prometheus]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rpi-observability-otel-collector
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" "rpi-observability-otel-collector" "component" "telemetry") | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rpi-observability-otel-collector
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rpi-observability-otel-collector
    spec:
      {{- if .Values.global.deployment.images.imagePullSecret.enabled }}
      imagePullSecrets:
      - name: {{ .Values.global.deployment.images.imagePullSecret.name }}
      {{- end }}
      containers:
      - name: otel-collector
        image: {{ include "rpi.otel.collector.image" . }}
        args: ["--config=/etc/otelcol/config.yaml"]
        ports:
        - name: otlp
          containerPort: 4317
          protocol: TCP
        - name: prometheus
          containerPort: 8889
          protocol: TCP
        volumeMounts:
        - name: otel-collector-config
          mountPath: /etc/otelcol
          readOnly: true
        resources:
          requests:
            {{- if $res.requests }}
            {{- toYaml $res.requests | nindent 12 }}
            {{- else }}
            cpu: 100m
            memory: 256Mi
            {{- end }}
          limits:
            {{- if $res.limits }}
            {{- toYaml $res.limits | nindent 12 }}
            {{- else }}
            cpu: 500m
            memory: 512Mi
            {{- end }}
      volumes:
      - name: otel-collector-config
        configMap:
          name: rpi-observability-otel-collector
      {{- if .Values.nodeSelector.enabled }}
      nodeSelector:
        {{ .Values.nodeSelector.key }}: {{ .Values.nodeSelector.value }}
      {{- end }}
      {{- if .Values.tolerations.enabled }}
      tolerations:
        - effect: NoSchedule
          key: {{ .Values.nodeSelector.key }}
          operator: Equal
          value: {{ .Values.nodeSelector.value }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: rpi-observability-otel-collector
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" "rpi-observability-otel-collector" "component" "telemetry") | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/name: rpi-observability-otel-collector
  ports:
  - name: otlp
    port: 4317
    targetPort: 4317
    protocol: TCP
  - name: prometheus
    port: 8889
    targetPort: 8889
    protocol: TCP
{{- end }}
