          {{- if $secCtx.enabled }}
          securityContext:
            privileged: {{ $secCtx.privileged }}
            allowPrivilegeEscalation: {{ $secCtx.allowPrivilegeEscalation }}
            readOnlyRootFilesystem: {{ $secCtx.readOnlyRootFilesystem }}
            capabilities:
              drop:
              {{- range $secCtx.capabilities.drop }}
