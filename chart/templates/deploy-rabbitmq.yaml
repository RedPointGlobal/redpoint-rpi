              {{- if $rtCfg.queueProvider.rabbitmq.rabbitmqSettings.resources.limits.cpu }}
              cpu: {{ $rtCfg.queueProvider.rabbitmq.rabbitmqSettings.resources.limits.cpu | quote }}
              {{- end }}
              {{- if $rtCfg.queueProvider.rabbitmq.rabbitmqSettings.resources.limits.memory }}
