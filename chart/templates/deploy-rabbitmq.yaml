            {{- end }}
            {{- if $rtCfg.queueProvider.rabbitmq.rabbitmqSettings.resources.requests }}
            requests:
              {{- if $rtCfg.queueProvider.rabbitmq.rabbitmqSettings.resources.requests.cpu | quote }}
              cpu: {{ $rtCfg.queueProvider.rabbitmq.rabbitmqSettings.resources.requests.cpu }}
              {{- end }}
              {{- if $rtCfg.queueProvider.rabbitmq.rabbitmqSettings.resources.requests.memory }}
              memory: {{ $rtCfg.queueProvider.rabbitmq.rabbitmqSettings.resources.requests.memory }}
              {{- end }}
            {{- end }}
          {{- end }}
          env:
            - name: RABBITMQ_DEFAULT_USER
              value: {{ $rtCfg.queueProvider.rabbitmq.rabbitmqSettings.username | quote }}
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.cloudIdentity.secretsManagement.secretName | quote }}
                  key: RealtimeAPI_RabbitMQ_Password
            - name: RABBITMQ_DEFAULT_VHOST
              value: {{ $rtCfg.queueProvider.rabbitmq.rabbitmqSettings.virtualhost | quote }}
            - name: RABBITMQ_CONFIG_FILE
              value: "/config/rabbitmq.conf"
          volumeMounts:
            {{- if $rtCfg.queueProvider.rabbitmq.rabbitmqSettings.volumeClaimTemplates.enabled }}
            - name: {{ $RealtimeapiMQ }}-data
              mountPath: /data
            {{- end }}
            {{- if not $rtCfg.queueProvider.rabbitmq.rabbitmqSettings.volumeClaimTemplates.enabled }}
            - name: {{ $RealtimeapiMQ }}-data
              mountPath: /data
            {{- end }}
            - name: {{ $RealtimeapiMQ }}-config
              mountPath: /config
          livenessProbe:
            exec:
              command:
              - "rabbitmq-diagnostics"
              - "-q"
