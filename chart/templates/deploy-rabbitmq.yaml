{{- $rtCfg := fromYaml (include "rpi.merged.realtimeapi" .) -}}
{{- $qrCfg := fromYaml (include "rpi.merged.queuereader" .) -}}
{{- $secCtx := fromYaml (include "rpi.merged.securityContext" .) -}}
{{- $QueueReaderMQ := "rpi-queuereader-rabbitmq" -}}
{{- $RealtimeapiMQ := "rpi-realtimeapi-rabbitmq" -}}

{{- if $qrCfg.podDisruptionBudget.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ $QueueReaderMQ }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" $QueueReaderMQ "component" "messaging") | nindent 4 }}
spec:
  maxUnavailable: {{ $qrCfg.podDisruptionBudget.maxUnavailable }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $QueueReaderMQ }}
{{- end }}

---
{{- if $qrCfg.enabled }}
{{- if $qrCfg.realtimeConfiguration.isDistributed }}
{{- if eq $qrCfg.realtimeConfiguration.distributedQueue.provider "rabbitmq" }}
{{- if eq $qrCfg.realtimeConfiguration.distributedQueue.type "internal" }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $QueueReaderMQ }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" $QueueReaderMQ "component" "messaging") | nindent 4 }}
data:
  rabbitmq.conf: |
    # Default RabbitMQ configuration
    listeners.tcp.default = 5672
    management.listener.port = 15672
    loopback_users.guest = false

---
apiVersion: v1
kind: Service
metadata:
  name: {{ $QueueReaderMQ }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" $QueueReaderMQ "component" "messaging") | nindent 4 }}
spec:
  clusterIP: None
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
    - name: management
      port: 15672
      targetPort: 15672
  selector:
    app.kubernetes.io/name: {{ $QueueReaderMQ }}

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $QueueReaderMQ }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" $QueueReaderMQ "component" "messaging") | nindent 4 }}
    app.kubernetes.io/version: {{ .Values.global.deployment.images.tag | quote }}
spec:
  serviceName: {{ $QueueReaderMQ }}
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Retain
    whenScaled: Retain
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $QueueReaderMQ }}
  template:
    metadata:
      labels:
        {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" $QueueReaderMQ "component" "messaging") | nindent 8 }}
        app.kubernetes.io/version: {{ .Values.global.deployment.images.tag | quote }}
    spec:
      terminationGracePeriodSeconds: 90
      {{- if .Values.global.deployment.images.imagePullSecret.enabled }}
      imagePullSecrets:
        - name: {{ .Values.global.deployment.images.imagePullSecret.name }}
      {{- end }}
      affinity:
        podAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: ["rpi-queuereader"]
                topologyKey: "kubernetes.io/hostname"
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: {{ $QueueReaderMQ }}
                topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: {{ $QueueReaderMQ }}
      {{- if .Values.nodeSelector.enabled }}
      nodeSelector:
        {{ .Values.nodeSelector.key }}: {{ .Values.nodeSelector.value }}
      {{- end }}
      {{- if .Values.tolerations.enabled }}
      tolerations:
        - effect: NoSchedule
          key: {{ .Values.nodeSelector.key }}
          operator: Equal
          value: {{ .Values.nodeSelector.value }}
      {{- end }}
      containers:
        - name: {{ $QueueReaderMQ }}
          image: {{ .Values.global.deployment.images.rabbitmq }}:{{ .Values.global.deployment.images.tag }}
          imagePullPolicy: {{  .Values.global.deployment.images.imagePullPolicy | default "IfNotPresent" }}
          ports:
            - name: amqp
              containerPort: 5672
              protocol: TCP
            - name: management
              containerPort: 15672
              protocol: TCP
          {{- if $qrCfg.realtimeConfiguration.distributedQueue.rabbitmqSettings.resources.enabled }}
          resources:
            {{- if $qrCfg.realtimeConfiguration.distributedQueue.rabbitmqSettings.resources.limits }}
            limits:
              {{- if $qrCfg.realtimeConfiguration.distributedQueue.rabbitmqSettings.resources.limits.cpu }}
              cpu: {{ $qrCfg.realtimeConfiguration.distributedQueue.rabbitmqSettings.resources.limits.cpu | quote }}
              {{- end }}
              {{- if $qrCfg.realtimeConfiguration.distributedQueue.rabbitmqSettings.resources.limits.memory }}
              memory: {{ $qrCfg.realtimeConfiguration.distributedQueue.rabbitmqSettings.resources.limits.memory }}
              {{- end }}
            {{- end }}
            {{- if $qrCfg.realtimeConfiguration.distributedQueue.rabbitmqSettings.resources.requests }}
            requests:
              {{- if $qrCfg.realtimeConfiguration.distributedQueue.rabbitmqSettings.resources.requests.cpu | quote }}
              cpu: {{ $qrCfg.realtimeConfiguration.distributedQueue.rabbitmqSettings.resources.requests.cpu }}
              {{- end }}
              {{- if $qrCfg.realtimeConfiguration.distributedQueue.rabbitmqSettings.resources.requests.memory }}
              memory: {{ $qrCfg.realtimeConfiguration.distributedQueue.rabbitmqSettings.resources.requests.memory }}
              {{- end }}
            {{- end }}
          {{- end }}
          env:
            - name: RABBITMQ_DEFAULT_USER
              value: {{ $qrCfg.realtimeConfiguration.distributedQueue.rabbitmqSettings.username | quote }}
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.cloudIdentity.secretsManagement.secretName | quote }}
                  key: QueueService_RabbitMQ_Password
            - name: RABBITMQ_DEFAULT_VHOST
              value: {{ $qrCfg.realtimeConfiguration.distributedQueue.rabbitmqSettings.virtualhost | quote }}
            - name: RABBITMQ_CONFIG_FILE
              value: "/config/rabbitmq.conf"
          volumeMounts:
            {{- if $qrCfg.realtimeConfiguration.distributedQueue.rabbitmqSettings.volumeClaimTemplates.enabled }}
            - name: {{ $QueueReaderMQ }}-data
              mountPath: /data
            {{- end }}
            {{- if $qrCfg.realtimeConfiguration.distributedQueue.rabbitmqSettings.volumes.enabled }}
            - name: {{ $QueueReaderMQ }}-data
              mountPath: /data
            {{- end }}
            {{- if not $qrCfg.realtimeConfiguration.distributedQueue.rabbitmqSettings.volumeClaimTemplates.enabled }}
            - name: {{ $QueueReaderMQ }}-data
              mountPath: /data
            {{- end }}
            - name: {{ $QueueReaderMQ }}-config
              mountPath: /config
          livenessProbe:
            exec:
              command:
              - "rabbitmq-diagnostics"
              - "-q"
              - "ping"
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          {{- if $secCtx.enabled }}
          securityContext:
            privileged: {{ $secCtx.privileged }}
            allowPrivilegeEscalation: {{ $secCtx.allowPrivilegeEscalation }}
            readOnlyRootFilesystem: {{ $secCtx.readOnlyRootFilesystem }}
            capabilities:
              drop:
              {{- range $secCtx.capabilities.drop }}
                - {{ . }}
              {{- end }}
          {{- end }}
      {{- if $secCtx.enabled }}
      securityContext:
        runAsUser: {{ $secCtx.runAsUser }}
        runAsGroup: {{ $secCtx.runAsGroup }}
        runAsNonRoot: {{ $secCtx.runAsNonRoot }}
      {{- end }}
      volumes:
        - name: {{ $QueueReaderMQ }}-config
          configMap:
            name: {{ $QueueReaderMQ }}-config
        {{- if not $qrCfg.realtimeConfiguration.distributedQueue.rabbitmqSettings.volumeClaimTemplates.enabled }}
        - name: {{ $QueueReaderMQ }}-data
          emptyDir: {}
        {{- end }}
        {{- if $qrCfg.realtimeConfiguration.distributedQueue.rabbitmqSettings.volumes.enabled }}
        - name: {{ $QueueReaderMQ }}-data
          persistentVolumeClaim:
            claimName: {{ $qrCfg.realtimeConfiguration.distributedQueue.rabbitmqSettings.volumes.claimName }}
        {{- end }}
  {{- if $qrCfg.realtimeConfiguration.distributedQueue.rabbitmqSettings.volumeClaimTemplates.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: {{ $QueueReaderMQ }}-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ $qrCfg.realtimeConfiguration.distributedQueue.rabbitmqSettings.volumeClaimTemplates.storage | quote }}
  {{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}

---
{{- if eq $rtCfg.queueProvider.provider "rabbitmq" }}
{{- if eq $rtCfg.queueProvider.rabbitmq.type "internal" }}
{{- if $rtCfg.queueProvider.rabbitmq.rabbitmqSettings.podDisruptionBudget.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ $RealtimeapiMQ }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" $RealtimeapiMQ  "component" "messaging") | nindent 4 }}
spec:
  maxUnavailable: {{ $rtCfg.podDisruptionBudget.maxUnavailable }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $RealtimeapiMQ }}
{{- end }}
{{- end }}
{{- end }}

---
{{- if $rtCfg.enabled }}
{{- if eq $rtCfg.queueProvider.provider "rabbitmq" }}
{{- if eq $rtCfg.queueProvider.rabbitmq.type "internal" }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $RealtimeapiMQ }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" $RealtimeapiMQ  "component" "messaging") | nindent 4 }}
data:
  rabbitmq.conf: |
    # Default RabbitMQ configuration
    listeners.tcp.default = 5672
    management.listener.port = 15672
    loopback_users.guest = false

