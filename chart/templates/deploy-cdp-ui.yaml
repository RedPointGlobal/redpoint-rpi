{{- $cfg := fromYaml (include "rpi.merged.uiservice" .) -}}
{{- $name := "cdp-ui" -}}

{{- if .Values.smartActivation.enabled }}
{{- if ne (.Values.cloudIdentity.serviceAccount.mode | default "per-service") "shared" }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "smartactivation.componentLabels" (dict "root" . "name" $name "component" "frontend") | nindent 4 }}
  {{- $annotations := include "rpi.cloudidentity.saAnnotations" . | trim }}
  {{- if $annotations }}
  annotations:
    {{- $annotations | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}

---
{{- if .Values.smartActivation.enabled }}
{{- if $cfg.podDisruptionBudget.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "smartactivation.componentLabels" (dict "root" . "name" $name "component" "frontend") | nindent 4 }}
spec:
  minAvailable: {{ $cfg.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $name }}
{{- end }}
{{- end }}

---
{{- if .Values.smartActivation.enabled }}
{{- if eq $cfg.type "rollout" }}
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}-preview
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "smartactivation.componentLabels" (dict "root" . "name" $name "component" "frontend") | nindent 4 }}
spec:
  ports:
  - name: http
    port: {{ $cfg.service.port }}
    protocol: TCP
    targetPort: 8080
  selector:
    app.kubernetes.io/name: {{ $name }}
{{- end }}
{{- end }}

---
{{- if .Values.smartActivation.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "smartactivation.componentLabels" (dict "root" . "name" $name "component" "frontend") | nindent 4 }}
spec:
  ports:
  - name: http
    port: {{ $cfg.service.port }}
    protocol: TCP
    targetPort: 8080
  selector:
    app.kubernetes.io/name: {{ $name }}

---
{{- if eq $cfg.type "rollout" }}
apiVersion: argoproj.io/v1alpha1
kind: Rollout
{{- end }}
{{- if eq $cfg.type "deployment" }}
apiVersion: apps/v1
kind: Deployment
{{- end }}
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "smartactivation.componentLabels" (dict "root" . "name" $name "component" "frontend") | nindent 4 }}
    app.kubernetes.io/version: {{ .Values.global.deployment.images.tag | quote }}
  {{- with .Values.customAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ $cfg.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $name }}
  {{- if eq $cfg.type "rollout" }}
  strategy:
    blueGreen:
      activeService: {{ $name }}
      previewService: {{ $name }}-preview
      autoPromotionEnabled: {{ $cfg.rollout.autoPromotionEnabled }}
  revisionHistoryLimit: {{ $cfg.rollout.revisionHistoryLimit }}
  {{- end }}
  template:
    metadata:
      labels:
        {{- include "smartactivation.componentLabels" (dict "root" . "name" $name "component" "frontend") | nindent 8 }}
        app.kubernetes.io/version: {{ .Values.global.deployment.images.tag | quote }}
        {{- with .Values.customLabels }}
        {{- toYaml . | nindent 8 }} 
        {{- end }}
      {{- with .Values.customAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- if .Values.global.deployment.images.imagePullSecret.enabled }}
      imagePullSecrets:
      - name: {{ .Values.global.deployment.images.imagePullSecret.name }}
      {{- end }}
      serviceAccountName: {{ include "rpi.serviceAccountName" (dict "root" . "name" $name) }}
      {{- include "rpi.pod.securityContext" (dict "sc" $cfg.securityContext "noSupplementalGroups" true) | nindent 6 }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: {{ $name }}
                topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: {{ $name }}
      containers:
      - name: {{ $name }}
        image: {{ .Values.global.deployment.images.repository }}/{{ $name }}:{{ .Values.global.deployment.images.tag }}
        imagePullPolicy: {{  .Values.global.deployment.images.imagePullPolicy | default "IfNotPresent" }}
        {{- if $cfg.resources.enabled }}
        resources:
          {{- if and $cfg.resources.limits (ne $cfg.resources.limits.enabled false) }}
          limits:
            {{- with $cfg.resources.limits.cpu }}
            cpu: {{ . }}
            {{- end }}
            {{- with $cfg.resources.limits.memory }}
            memory: {{ . }}
            {{- end }}
          {{- end }}
          {{- if and $cfg.resources.requests (ne $cfg.resources.requests.enabled false) }}
          requests:
            {{- with $cfg.resources.requests.cpu }}
            cpu: {{ . }}
            {{- end }}
            {{- with $cfg.resources.requests.memory }}
            memory: {{ . }}
            {{- end }}
        {{- end }}
        {{- end }}
        ports: 
        - containerPort: 8080 
        {{- include "rpi.container.securityContext" (dict "sc" $cfg.securityContext) | nindent 8 }}
        env: 
        {{- if .Values.global.deployment.podTimezone }}
        - name: TZ
          value: {{ .Values.global.deployment.podTimezone | quote }}
        {{- end }}
        - name: MONGODB_CONNECTION_STRING
          valueFrom:
            secretKeyRef:
              name: {{ include "rpi.secrets.secretName" . | quote }}
              key: CDP_Mongo_ConnectionString
        {{- with (include "rpi.cloudidentity.envvars" . | trim) }}{{- . | nindent 8 }}{{- end }}
        volumeMounts:
          - name: tempstore
            mountPath: /tmp
      volumes:
        - name: tempstore
          emptyDir: {}
      {{- if .Values.nodeSelector.enabled }}
      nodeSelector:
        {{ .Values.nodeSelector.key }}: {{ .Values.nodeSelector.value }}
      {{- end }}
      {{- if .Values.tolerations.enabled }}
      tolerations:
        - effect: NoSchedule
          key: {{ .Values.nodeSelector.key }}
          operator: Equal
          value: {{ .Values.nodeSelector.value }}
      {{- end }}
{{- end }}

