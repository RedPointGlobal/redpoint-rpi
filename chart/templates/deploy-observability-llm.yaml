{{- if not (include "rpi.observability.enabled" .) -}}{{- /* observability disabled */ -}}
{{- else if ne (lower (default "local" (((.Values.observability | default dict).intelligence | default dict).provider))) "local" -}}{{- /* a cloud provider is active; no in-cluster serving layer */ -}}
{{- else if not ((((((.Values.observability | default dict).intelligence | default dict).local | default dict).deployment | default dict).enabled | default false)) -}}{{- /* local deployment disabled (operator self-hosts) */ -}}
{{- else -}}

{{- $cfg := .Values.observability | default dict -}}
{{- $intel := $cfg.intelligence | default dict -}}
{{- $local := $intel.local | default dict -}}
{{- $deploy := $local.deployment | default dict -}}
{{- $svc := $deploy.service | default dict -}}
{{- $name := "rpi-observability-llm" -}}
{{- $port := int ($svc.port | default 8000) -}}

{{- $image := $deploy.image | default (include "rpi.image" (dict "root" . "name" "rpi-observability-llm")) -}}

{{- $defaultResources := dict
      "requests" (dict "cpu" "4" "memory" "6Gi")
      "limits"   (dict "cpu" "8" "memory" "12Gi") -}}
{{- $resources := $deploy.resources | default $defaultResources -}}

{{- if hasKey $deploy "replicas" -}}
{{- fail "observability.intelligence.local.deployment.replicas is not configurable; v1 serving is single-instance. Multi-replica is a v2 concern." -}}
{{- end -}}

---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" $name "component" "intelligence") | nindent 4 }}
  {{- $svcAnnotations := include "rpi.mergedAnnotations" (dict "root" . "type" "service") | trim }}
  {{- if $svcAnnotations }}
  annotations:
    {{- $svcAnnotations | nindent 4 }}
  {{- end }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ $port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "redpoint-rpi.selectorLabels" (dict "root" . "name" $name) | nindent 4 }}

---
{{- include "rpi.block.serviceAccount" (dict "root" . "name" $name "cfg" $deploy) }}

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" $name "component" "intelligence") | nindent 4 }}
spec:
  serviceName: {{ $name }}
  replicas: 1
  selector:
    matchLabels:
      {{- include "redpoint-rpi.selectorLabels" (dict "root" . "name" $name) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" $name "component" "intelligence") | nindent 8 }}
      {{- $podAnnotations := include "rpi.mergedAnnotations" (dict "root" . "type" "pod") | trim }}
      {{- if $podAnnotations }}
      annotations:
        {{- $podAnnotations | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "rpi.serviceAccountName" (dict "root" . "name" $name "cfg" $deploy) }}
      {{- if .Values.global.deployment.images.imagePullSecret.enabled }}
      imagePullSecrets:
        - name: {{ .Values.global.deployment.images.imagePullSecret.name }}
      {{- end }}
      {{- include "rpi.block.scheduling" (dict "root" . "name" $name "cfg" $deploy "topo" (dict "enabled" false)) | nindent 6 }}
      securityContext:
        fsGroup: 7777
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: server
          image: {{ $image | quote }}
          imagePullPolicy: {{ $deploy.imagePullPolicy | default .Values.global.deployment.images.imagePullPolicy | default "IfNotPresent" }}
          {{- with $deploy.extraArgs }}
          args:
            {{- range . }}
            - {{ . | quote }}
            {{- end }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ $port }}
              protocol: TCP
          {{- with $resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          startupProbe:
            httpGet:
              path: /v1/models
              port: http
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /v1/models
              port: http
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 4
          livenessProbe:
            httpGet:
              path: /v1/models
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 4
{{- end -}}
