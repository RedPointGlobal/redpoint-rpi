{{- $rtCfg := fromYaml (include "rpi.merged.realtimeapi" .) -}}
{{- $execCfg := fromYaml (include "rpi.merged.executionservice" .) -}}
{{- $qrCfg := fromYaml (include "rpi.merged.queuereader" .) -}}
{{- $rbCfg := fromYaml (include "rpi.merged.rebrandly" .) -}}
{{- $secCtx := fromYaml (include "rpi.merged.securityContext" .) -}}
{{- $QueueReadercacheName := "rpi-queuereader-cache" -}}
{{- $ExecutioncacheName := "rpi-executionservice-cache" -}}

{{- if $qrCfg.realtimeConfiguration.isDistributed }}
{{- if eq $qrCfg.realtimeConfiguration.distributedCache.provider "redis" }}
{{- if eq $qrCfg.realtimeConfiguration.distributedCache.type "internal" }}
{{- if $qrCfg.realtimeConfiguration.distributedCache.redisSettings.podDisruptionBudget.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ $QueueReadercacheName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" $QueueReadercacheName "component" "cache") | nindent 4 }}
spec:
  maxUnavailable: {{ $qrCfg.realtimeConfiguration.distributedCache.redisSettings.podDisruptionBudget.maxUnavailable }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $QueueReadercacheName }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}

---
{{- if $qrCfg.realtimeConfiguration.isDistributed }}
{{- if eq $qrCfg.realtimeConfiguration.distributedCache.provider "redis" }}
{{- if eq $qrCfg.realtimeConfiguration.distributedCache.type "internal" }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $QueueReadercacheName }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" $QueueReadercacheName "component" "cache") | nindent 4 }}
data:
  redis.conf: |
    # Memory (pod limit = 3048Mi ≈ 3.0Gi)
    maxmemory 2300mb
    maxmemory-policy allkeys-lfu
    maxmemory-samples 10

    appendonly yes
    appendfsync everysec
    aof-use-rdb-preamble yes
    aof-rewrite-incremental-fsync yes
    # disable RDB snapshots for a pure cache
    save ""                           

    # Safety / Ops
    stop-writes-on-bgsave-error no
    supervised no                    

    # Networking / timeouts
    bind 0.0.0.0
    port 6379
    {{- if eq .Values.cloudIdentity.secretsManagement.secretsProvider "kubernetes" }}
    protected-mode yes
    {{- end }}
    timeout 300
    tcp-keepalive 60
    tcp-backlog 511

    maxclients 2000

---
apiVersion: v1
kind: Service
metadata:
  name: {{ $QueueReadercacheName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" $QueueReadercacheName "component" "cache") | nindent 4 }}
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: {{ $QueueReadercacheName }}
  ports:
    - name: redis
      port: 6379
      targetPort: 6379

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $QueueReadercacheName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" $QueueReadercacheName "component" "cache") | nindent 4 }}

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $QueueReadercacheName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" $QueueReadercacheName "component" "cache") | nindent 4 }}
spec:
  serviceName: {{ $QueueReadercacheName }}
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Retain
    whenScaled: Retain
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $QueueReadercacheName }}
  template:
    metadata:
      labels:
        {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" $QueueReadercacheName "component" "cache") | nindent 8 }}
        app.kubernetes.io/version: {{ .Values.global.deployment.images.tag | quote }}
    spec:
      {{- if .Values.global.deployment.images.imagePullSecret.enabled }}
      imagePullSecrets:
        - name: {{ .Values.global.deployment.images.imagePullSecret.name }}
      {{- end }}
      affinity:
        podAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: ["rpi-queuereader"]
                topologyKey: "kubernetes.io/hostname"
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: {{ $QueueReadercacheName }}
                topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: {{ $QueueReadercacheName }}
      {{- if .Values.nodeSelector.enabled }}
      nodeSelector:
        {{ .Values.nodeSelector.key }}: {{ .Values.nodeSelector.value }}
      {{- end }}
      {{- if .Values.tolerations.enabled }}
      tolerations:
        - effect: NoSchedule
          key: {{ .Values.nodeSelector.key }}
          operator: Equal
          value: {{ .Values.nodeSelector.value }}
      {{- end }}
      terminationGracePeriodSeconds: 120
      containers:
        - name: {{ $QueueReadercacheName }}
          image: {{ .Values.global.deployment.images.rediscache }}:{{ .Values.global.deployment.images.tag }}
          imagePullPolicy: {{ .Values.global.deployment.images.imagePullPolicy | default "IfNotPresent" }}
          ports:
            - containerPort: 6379
              name: redis
          {{- if eq .Values.cloudIdentity.secretsManagement.secretsProvider "kubernetes" }}
          command: ["redis-server", "/usr/local/etc/redis/redis.conf", "--requirepass", "$(REDIS_PASSWORD)"]
          {{- end }}
          {{- if eq .Values.cloudIdentity.secretsManagement.secretsProvider "keyvault" }}
          command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
          {{- end }}
          {{- if eq .Values.cloudIdentity.secretsManagement.secretsProvider "awssecretsmanager" }}
          command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
          {{- end }}
          env:
          {{- if eq .Values.cloudIdentity.secretsManagement.secretsProvider "kubernetes" }}
          - name: REDIS_PASSWORD
            valueFrom:
              secretKeyRef:
                name: {{ .Values.cloudIdentity.secretsManagement.secretName | quote }}
                key: QueueService_RedisCache_Password
          {{- end }}
          volumeMounts:
            {{- if $qrCfg.realtimeConfiguration.distributedCache.redisSettings.volumeClaimTemplates.enabled }}
            - name: {{ $QueueReadercacheName }}-data
              mountPath: /data
            {{- end }}
            {{- if not $qrCfg.realtimeConfiguration.distributedCache.redisSettings.volumeClaimTemplates.enabled }}
            - name: {{ $QueueReadercacheName }}-data
              mountPath: /data
            {{- end }}
            - name: {{ $QueueReadercacheName }}-config
              mountPath: /usr/local/etc/redis
          {{- if $qrCfg.realtimeConfiguration.distributedCache.redisSettings.resources.enabled }}
          resources:
            {{- if $qrCfg.realtimeConfiguration.distributedCache.redisSettings.resources.limits }}
            limits:
              {{- if $qrCfg.realtimeConfiguration.distributedCache.redisSettings.resources.limits.cpu }}
              cpu: {{ $qrCfg.realtimeConfiguration.distributedCache.redisSettings.resources.limits.cpu | quote }}
              {{- end }}
              {{- if $qrCfg.realtimeConfiguration.distributedCache.redisSettings.resources.limits.memory }}
              memory: {{ $qrCfg.realtimeConfiguration.distributedCache.redisSettings.resources.limits.memory }}
              {{- end }}
            {{- end }}
            {{- if $qrCfg.realtimeConfiguration.distributedCache.redisSettings.resources.requests }}
            requests:
              {{- if $qrCfg.realtimeConfiguration.distributedCache.redisSettings.resources.requests.cpu | quote }}
              cpu: {{ $qrCfg.realtimeConfiguration.distributedCache.redisSettings.resources.requests.cpu }}
              {{- end }}
              {{- if $qrCfg.realtimeConfiguration.distributedCache.redisSettings.resources.requests.memory }}
              memory: {{ $qrCfg.realtimeConfiguration.distributedCache.redisSettings.resources.requests.memory }}
              {{- end }}
            {{- end }}
          {{- end }}
          readinessProbe:
            exec:
              {{- if eq .Values.cloudIdentity.secretsManagement.secretsProvider "kubernetes" }}
              command: ["sh", "-c", "redis-cli -a \"$REDIS_PASSWORD\" ping | grep PONG"]
              {{- end }}
              {{- if eq .Values.cloudIdentity.secretsManagement.secretsProvider "keyvault" }}
              command: ["sh", "-c", "redis-cli ping | grep PONG"]
              {{- end }}
              {{- if eq .Values.cloudIdentity.secretsManagement.secretsProvider "awssecretsmanager" }}
              command: ["sh", "-c", "redis-cli ping | grep PONG"]
              {{- end }}
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            exec:
              {{- if eq .Values.cloudIdentity.secretsManagement.secretsProvider "kubernetes" }}
              command: ["sh", "-c", "redis-cli -a \"$REDIS_PASSWORD\" ping | grep PONG"]
              {{- end }}
              {{- if eq .Values.cloudIdentity.secretsManagement.secretsProvider "keyvault" }}
              command: ["sh", "-c", "redis-cli ping | grep PONG"]
              {{- end }}
              {{- if eq .Values.cloudIdentity.secretsManagement.secretsProvider "awssecretsmanager" }}
              command: ["sh", "-c", "redis-cli ping | grep PONG"]
              {{- end }}
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          {{- if $secCtx.enabled }}
          securityContext:
            privileged: {{ $secCtx.privileged }}
            allowPrivilegeEscalation: {{ $secCtx.allowPrivilegeEscalation }}
            readOnlyRootFilesystem: {{ $secCtx.readOnlyRootFilesystem }}
            capabilities:
              drop:
              {{- range $secCtx.capabilities.drop }}
                - {{ . }}
              {{- end }}
          {{- end }}
      {{- if $secCtx.enabled }}
      securityContext:
        runAsUser: {{ $secCtx.runAsUser }}
        runAsGroup: {{ $secCtx.runAsGroup }}
        fsGroup: {{ $secCtx.fsGroup }}
        runAsNonRoot: {{ $secCtx.runAsNonRoot }}
        supplementalGroups:
          {{- with $secCtx.supplementalGroups }}
          {{- toYaml . | nindent 10 }}
          {{- end }}
      {{- end }}
      volumes:
        - name: {{ $QueueReadercacheName }}-config
          configMap:
            name: {{ $QueueReadercacheName }}-config
        {{- if not $qrCfg.realtimeConfiguration.distributedCache.redisSettings.volumeClaimTemplates.enabled }}
        - name: rpi-executionservice-cache-data
          emptyDir: {}
        {{- end }}
  {{- if $qrCfg.realtimeConfiguration.distributedCache.redisSettings.volumeClaimTemplates.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: {{ $QueueReadercacheName }}-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ $qrCfg.realtimeConfiguration.distributedCache.redisSettings.volumeClaimTemplates.storage | quote }}
  {{- end }}
{{- end }}
{{- end }}
{{- end }}

---
{{- if $execCfg.enabled }}
{{- if eq $execCfg.internalCache.type "internal" }}
{{- if $execCfg.internalCache.redisSettings.podDisruptionBudget.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ $ExecutioncacheName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" $ExecutioncacheName "component" "cache") | nindent 4 }}
spec:
  maxUnavailable: {{ $execCfg.internalCache.redisSettings.podDisruptionBudget.maxUnavailable }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $ExecutioncacheName }}
{{- end }}
{{- end }}
{{- end }}

---
{{- if $execCfg.enabled }}
{{- if $execCfg.internalCache.enabled }}
{{- if eq $execCfg.internalCache.provider "default" }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $ExecutioncacheName }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" $ExecutioncacheName "component" "cache") | nindent 4 }}
data:
  redis.conf: |
    # Memory (pod limit = 3048Mi ≈ 3.0Gi)
    maxmemory 2300mb
    maxmemory-policy allkeys-lfu
    maxmemory-samples 10

    appendonly yes
    appendfsync everysec
    aof-use-rdb-preamble yes
    aof-rewrite-incremental-fsync yes
    # disable RDB snapshots for a pure cache
    save ""                           

    # Safety / Ops
    stop-writes-on-bgsave-error no
    supervised no                    

    # Networking / timeouts
