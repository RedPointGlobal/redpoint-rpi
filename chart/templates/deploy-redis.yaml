    port 6379
    {{- if eq .Values.cloudIdentity.secretsManagement.secretsProvider "kubernetes" }}
    protected-mode yes
    {{- end }}
    timeout 300
    tcp-keepalive 60
    tcp-backlog 511

    maxclients 2000

