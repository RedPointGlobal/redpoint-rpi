apiVersion: v1
kind: Service
metadata:
  name: {{ $ExecutioncacheName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" $ExecutioncacheName "component" "cache") | nindent 4 }}
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: {{ $ExecutioncacheName }}
  ports:
    - name: redis
      port: 6379
      targetPort: 6379

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $ExecutioncacheName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" $ExecutioncacheName "component" "cache") | nindent 4 }}
    
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $ExecutioncacheName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" $ExecutioncacheName "component" "cache") | nindent 4 }}
    app.kubernetes.io/version: {{ .Values.global.deployment.images.tag | quote }}
spec:
  serviceName: {{ $ExecutioncacheName }}
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Retain
    whenScaled: Retain
  replicas: {{ $execCfg.internalCache.redisSettings.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $ExecutioncacheName }}
  template:
    metadata:
      labels:
        {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" $ExecutioncacheName "component" "cache") | nindent 8 }}
        app.kubernetes.io/version: {{ .Values.global.deployment.images.tag | quote }}
    spec:
      {{- if .Values.global.deployment.images.imagePullSecret.enabled }}
      imagePullSecrets:
        - name: {{ .Values.global.deployment.images.imagePullSecret.name }}
      {{- end }}
      affinity:
        podAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: ["rpi-executionservice"]
                topologyKey: "kubernetes.io/hostname"
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: {{ $ExecutioncacheName }}
                topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: {{ $ExecutioncacheName }}
      {{- if .Values.nodeSelector.enabled }}
      nodeSelector:
        {{ .Values.nodeSelector.key }}: {{ .Values.nodeSelector.value }}
      {{- end }}
      {{- if .Values.tolerations.enabled }}
      tolerations:
        - effect: NoSchedule
          key: {{ .Values.nodeSelector.key }}
          operator: Equal
          value: {{ .Values.nodeSelector.value }}
      {{- end }}
      containers:
        - name: {{ $ExecutioncacheName }}
          image: {{ .Values.global.deployment.images.rediscache }}:{{ .Values.global.deployment.images.tag }}
          imagePullPolicy: {{ .Values.global.deployment.images.imagePullPolicy | default "IfNotPresent" }}
          ports:
            - containerPort: 6379
              name: redis
          {{- if eq .Values.cloudIdentity.secretsManagement.secretsProvider "kubernetes" }}
          command: ["redis-server", "/usr/local/etc/redis/redis.conf", "--requirepass", "$(REDIS_PASSWORD)"]
          {{- end }}
          {{- if eq .Values.cloudIdentity.secretsManagement.secretsProvider "keyvault" }}
          command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
          {{- end }}
          {{- if eq .Values.cloudIdentity.secretsManagement.secretsProvider "awssecretsmanager" }}
          command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
          {{- end }}
          env:
          {{- if eq .Values.cloudIdentity.secretsManagement.secretsProvider "kubernetes" }}
          - name: REDIS_PASSWORD
            valueFrom:
              secretKeyRef:
                name: {{ .Values.cloudIdentity.secretsManagement.secretName | quote }}
                key: ExecutionService_RedisCache_Password
          {{- end }}
          volumeMounts:
            {{- if $execCfg.internalCache.redisSettings.volumeClaimTemplates.enabled }}
            - name: {{ $ExecutioncacheName }}-data
              mountPath: /data
            {{- end }}
            {{- if not $execCfg.internalCache.redisSettings.volumeClaimTemplates.enabled }}
            - name: {{ $ExecutioncacheName }}-data
              mountPath: /data
            {{- end }}
            - name: {{ $ExecutioncacheName }}-config
              mountPath: /usr/local/etc/redis
          {{- if $execCfg.internalCache.redisSettings.resources.enabled }}
          resources:
            {{- if $execCfg.internalCache.redisSettings.resources.limits }}
            limits:
              {{- if $execCfg.internalCache.redisSettings.resources.limits.cpu }}
              cpu: {{ $execCfg.internalCache.redisSettings.resources.limits.cpu | quote }}
              {{- end }}
              {{- if $execCfg.internalCache.redisSettings.resources.limits.memory }}
              memory: {{ $execCfg.internalCache.redisSettings.resources.limits.memory }}
              {{- end }}
            {{- end }}
            {{- if $execCfg.internalCache.redisSettings.resources.requests }}
            requests:
              {{- if $execCfg.internalCache.redisSettings.resources.requests.cpu | quote }}
              cpu: {{ $execCfg.internalCache.redisSettings.resources.requests.cpu }}
              {{- end }}
              {{- if $execCfg.internalCache.redisSettings.resources.requests.memory }}
              memory: {{ $execCfg.internalCache.redisSettings.resources.requests.memory }}
              {{- end }}
            {{- end }}
          {{- end }}
          readinessProbe:
            exec:
              {{- if eq .Values.cloudIdentity.secretsManagement.secretsProvider "kubernetes" }}
              command: ["sh", "-c", "redis-cli -a \"$REDIS_PASSWORD\" ping | grep PONG"]
              {{- end }}
              {{- if eq .Values.cloudIdentity.secretsManagement.secretsProvider "keyvault" }}
              command: ["sh", "-c", "redis-cli ping | grep PONG"]
              {{- end }}
              {{- if eq .Values.cloudIdentity.secretsManagement.secretsProvider "awssecretsmanager" }}
              command: ["sh", "-c", "redis-cli ping | grep PONG"]
              {{- end }}
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            exec:
              {{- if eq .Values.cloudIdentity.secretsManagement.secretsProvider "kubernetes" }}
              command: ["sh", "-c", "redis-cli -a \"$REDIS_PASSWORD\" ping | grep PONG"]
              {{- end }}
              {{- if eq .Values.cloudIdentity.secretsManagement.secretsProvider "keyvault" }}
              command: ["sh", "-c", "redis-cli ping | grep PONG"]
              {{- end }}
              {{- if eq .Values.cloudIdentity.secretsManagement.secretsProvider "awssecretsmanager" }}
