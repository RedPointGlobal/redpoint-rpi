---
{{/* Shared ServiceAccount — created when mode=shared */}}
{{- if eq (.Values.cloudIdentity.serviceAccount.mode | default "per-service") "shared" }}
{{- $rtCfg := fromYaml (include "rpi.merged.service" (dict "root" . "name" "realtimeapi")) -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.cloudIdentity.serviceAccount.name | default "redpoint-rpi" | quote }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" (.Values.cloudIdentity.serviceAccount.name | default "redpoint-rpi") "component" "identity") | nindent 4 }}
  {{- $saAnnotations := include "rpi.mergedAnnotations" (dict "root" . "type" "serviceAccount") | trim }}
  {{- $ciAnnotations := include "rpi.cloudidentity.saAnnotations" . | trim }}
  {{- $mongoIamArn := "" }}
  {{- if eq (($rtCfg.cacheProvider).mongodb.authMechanism | default "default") "iamRole" }}
  {{- $mongoIamArn = ($rtCfg.cacheProvider).mongodb.roleArn | default "" }}
  {{- end }}
  {{- if or $saAnnotations $ciAnnotations $mongoIamArn }}
  annotations:
    {{- if $mongoIamArn }}
    eks.amazonaws.com/role-arn: {{ $mongoIamArn | quote }}
    {{- end }}
    {{- if $saAnnotations }}
    {{- $saAnnotations | nindent 4 }}
    {{- end }}
    {{- if $ciAnnotations }}
    {{- $ciAnnotations | nindent 4 }}
    {{- end }}
  {{- end }}
{{- end }}
