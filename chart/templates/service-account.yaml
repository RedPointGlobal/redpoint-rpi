---
{{/* Shared ServiceAccount — created when mode=shared or mode=both */}}
{{- if or (eq (.Values.cloudIdentity.serviceAccount.mode | default "per-service") "shared") (eq (.Values.cloudIdentity.serviceAccount.mode | default "per-service") "both") }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.cloudIdentity.serviceAccount.name | default "redpoint-rpi" | quote }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" (.Values.cloudIdentity.serviceAccount.name | default "redpoint-rpi") "component" "identity") | nindent 4 }}
  {{- $annotations := include "rpi.cloudidentity.saAnnotations" . | trim }}
  {{- if $annotations }}
  annotations:
    {{- $annotations | nindent 4 }}
  {{- end }}
{{- end }}
