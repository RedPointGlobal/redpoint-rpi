---
{{/* Shared ServiceAccount — created when cloudIdentity.serviceAccount.create=true */}}
{{- if .Values.cloudIdentity.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.cloudIdentity.serviceAccount.name | default "redpoint-rpi" | quote }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" (.Values.cloudIdentity.serviceAccount.name | default "redpoint-rpi") "component" "identity") | nindent 4 }}
  {{- $annotations := include "rpi.cloudidentity.saAnnotations" . }}
  {{- if $annotations }}
  annotations:
    {{- $annotations | nindent 4 }}
  {{- end }}
{{- end }}
