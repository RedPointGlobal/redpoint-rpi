{{- $rtCfg := fromYaml (include "rpi.merged.realtimeapi" .) -}}
{{- $execCfg := fromYaml (include "rpi.merged.executionservice" .) -}}
{{- $qrCfg := fromYaml (include "rpi.merged.queuereader" .) -}}
{{- $iaCfg := fromYaml (include "rpi.merged.interactionapi" .) -}}
{{- $intCfg := fromYaml (include "rpi.merged.integrationapi" .) -}}
{{- $rbCfg := fromYaml (include "rpi.merged.rebrandly" .) -}}
{{- $diag := fromYaml (include "rpi.merged.diagnosticsMode" .) -}}
# ========================== sqlserver
{{- if eq .Values.cloudIdentity.secretsManagement.secretsProvider "kubernetes" }}
{{- if .Values.cloudIdentity.secretsManagement.autoCreateSecrets }}
{{- $QueueServiceRedisPassword := randAlphaNum 16 -}}
{{- $QueueServiceRabbitMQ := randAlphaNum 16 -}}
{{- $ExecutionServiceRedisPassword := randAlphaNum 16 -}}
{{- $RealtimeAPIRedisPassword := randAlphaNum 16 -}}
{{- $RealtimeAPIRabbitMQ := randAlphaNum 16 -}}
{{- $realtimeAPIKey := randAlphaNum 16 -}}
{{- $CDPDefaultPassword := randAlphaNum 16 -}}
{{- $CDPKeycloakAdminPassword := randAlphaNum 16 -}}
{{- $KeycloakClientSecret := randAlphaNum 16 -}}
{{- $CDPRabbitMQPassword := randAlphaNum 16 -}}
{{- $CDPRabbitMQErlangCookie := randAlphaNum 16 -}}

{{- $secretName := .Values.cloudIdentity.secretsManagement.secretName | default "redpoint-rpi-secrets" -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- if not (and $existing.metadata $existing.metadata.name) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.cloudIdentity.secretsManagement.secretName | quote }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" $secretName "component" "secrets") | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
data:
  # SQL Server (Can be AzureSQL, Google CloudSQL, Amazon RDS)
  {{- if eq .Values.databases.operational.provider "sqlserver" }}
  ConnectionString_Logging_Database: {{ printf "Server=tcp:%s,1433;Database=%s;User ID=%s;Password=%s;Encrypt=True;TrustServerCertificate=True;Connection Timeout=30;" .Values.databases.operational.server_host .Values.databases.operational.pulse_logging_database_name .Values.databases.operational.server_username .Values.databases.operational.server_password | b64enc }}
  ConnectionString_Operations_Database: {{ printf "Server=tcp:%s,1433;Database=%s;User ID=%s;Password=%s;Encrypt=True;TrustServerCertificate=True;Connection Timeout=30;" .Values.databases.operational.server_host .Values.databases.operational.pulse_database_name .Values.databases.operational.server_username .Values.databases.operational.server_password | b64enc }}
  {{- end }}

  # PostgreSQL (Can be AzureSQL, Google CloudSQL, Amazon RDS)
  {{- if eq .Values.databases.operational.provider "postgresql" }}
  ConnectionString_Logging_Database: {{ printf "PostgreSQL:Server=%s;Database=%s;User Id=%s;Password=%s;" .Values.databases.operational.server_host .Values.databases.operational.pulse_logging_database_name .Values.databases.operational.server_username .Values.databases.operational.server_password | b64enc }}
  ConnectionString_Operations_Database: {{ printf "PostgreSQL:Server=%s;Database=%s;User Id=%s;Password=%s;" .Values.databases.operational.server_host .Values.databases.operational.pulse_database_name .Values.databases.operational.server_username .Values.databases.operational.server_password | b64enc }}
  {{- end }}

  # SQL Server on VM (Non-encrypted connection string)
  {{- if not .Values.databases.operational.encrypt | default false }}
  {{- if eq .Values.databases.operational.provider "sqlserveronvm" }}
  ConnectionString_Logging_Database: {{ printf "Server=%s,1433;Database=%s;uid=%s;pwd=%s;ConnectRetryCount=12;ConnectRetryInterval=10;TrustServerCertificate=True;" .Values.databases.operational.server_host .Values.databases.operational.pulse_logging_database_name .Values.databases.operational.server_username .Values.databases.operational.server_password | b64enc }}
  ConnectionString_Operations_Database: {{ printf "Server=%s,1433;Database=%s;uid=%s;pwd=%s;ConnectRetryCount=12;ConnectRetryInterval=10;TrustServerCertificate=True;" .Values.databases.operational.server_host .Values.databases.operational.pulse_database_name .Values.databases.operational.server_username .Values.databases.operational.server_password | b64enc }}
  {{- end }}
  {{- end }}

  # SQL Server on VM (encrypted connection string)
  {{- if .Values.databases.operational.encrypt | default false }}
  {{- if eq .Values.databases.operational.provider "sqlserveronvm" }}
  ConnectionString_Logging_Database: {{ printf "Server=%s,1433;Database=%s;uid=%s;pwd=%s;ConnectRetryCount=12;ConnectRetryInterval=10;Encrypt=True;TrustServerCertificate=True;" .Values.databases.operational.server_host .Values.databases.operational.pulse_logging_database_name .Values.databases.operational.server_username .Values.databases.operational.server_password | b64enc }}
  ConnectionString_Operations_Database: {{ printf "Server=%s,1433;Database=%s;uid=%s;pwd=%s;ConnectRetryCount=12;ConnectRetryInterval=10;Encrypt=True;TrustServerCertificate=True;" .Values.databases.operational.server_host .Values.databases.operational.pulse_database_name .Values.databases.operational.server_username .Values.databases.operational.server_password | b64enc }}
  {{- end }}
  {{- end }}

  {{- if eq $rtCfg.authentication.type "oauth" }}
  ConnectionString_RealtimeApi_OAuth: {{ printf "Server=tcp:%s,1433;Database=%s;User ID=%s;Password=%s;Encrypt=True;TrustServerCertificate=True;Connection Timeout=30;" .Values.databases.operational.server_host $rtCfg.authentication.oauth.databaseName .Values.databases.operational.server_username .Values.databases.operational.server_password | b64enc }}
  {{- end }}

  Operations_Database_Server_Password: {{ .Values.databases.operational.server_password | b64enc }}
  {{- if $rtCfg.cacheProvider.enabled }}
  {{- if eq $rtCfg.cacheProvider.provider "mongodb" }}
  RealtimeAPI_MongoCache_ConnectionString: {{ $rtCfg.cacheProvider.mongodb.connectionString | b64enc }}
  {{- end }}
  {{- end }}

  {{- if eq $rtCfg.cacheProvider.provider "redis" }}
  {{- if eq .Values.cloudIdentity.secretsManagement.secretsProvider "kubernetes" }}
  RealtimeAPI_RedisCache_ConnectionString: {{ $rtCfg.cacheProvider.redis.redisSettings.connectionString | b64enc }}
  RealtimeAPI_RedisCache_Password: {{ $RealtimeAPIRedisPassword | b64enc }}
  {{- end }}
  {{- end }}

  {{- if $rtCfg.cacheProvider.enabled }}
  {{- if eq $rtCfg.cacheProvider.provider "inMemorySql" }}
  RealtimeAPI_inMemorySql_ConnectionString: {{ printf "Data Source=%s;Initial Catalog=%s;uid=%s;pwd=%s;TrustServerCertificate=True" $rtCfg.cacheProvider.inMemorySql.server_host $rtCfg.cacheProvider.inMemorySql.database_name $rtCfg.cacheProvider.inMemorySql.username $rtCfg.cacheProvider.inMemorySql.password | b64enc }}
  {{- end }}
  {{- end }}

  {{- if $rtCfg.queueProvider.enabled }}
  {{- if eq $rtCfg.queueProvider.amazonsqs.credentialsType "accessKey" }}
  RealtimeAPI_QueueSettings_AccessKey: {{ .Values.cloudIdentity.amazonSettings.accessKeyId | b64enc }}
  RealtimeAPI_QueueSettings_SecretKey: {{ .Values.cloudIdentity.amazonSettings.secretAccessKey | b64enc }}
  {{- end }}
  {{- end }}

  {{- if $rtCfg.enabled }}
  {{- if eq $rtCfg.authentication.type "basic" }}
  RealtimeAPI_Auth_Token: {{ $realtimeAPIKey | b64enc }}
  {{- end }}
  {{- end }}

  {{- if $rtCfg.queueProvider.enabled }}
  {{- if eq $rtCfg.queueProvider.provider "azureservicebus" }}
  RealtimeAPI_ServiceBus_ConnectionString: {{ $rtCfg.queueProvider.azureservicebus.connectionstring | b64enc }}
  {{- end }}
  {{- end }}

  {{- if $rtCfg.queueProvider.enabled }}
  {{- if eq $rtCfg.queueProvider.provider "azureeventhubs" }}
  RealtimeAPI_EventHub_ConnectionString: {{ $rtCfg.queueProvider.azureeventhubs.connectionstring | b64enc }}
  {{- end }}
  {{- end }}

  {{- if .Values.redpointAI.enabled }}
  RPI_NLP_SEARCH_KEY: {{ .Values.redpointAI.cognitiveSearch.SearchKey | b64enc }}
  RPI_NLP_API_KEY: {{ .Values.redpointAI.naturalLanguage.ApiKey | b64enc }}
  RPI_NLP_MODEL_CONNECTION_STRING: {{ .Values.redpointAI.modelStorage.ConnectionString | b64enc }}
  {{- end }}

  {{- if .Values.SMTPSettings.UseCredentials }}
  SMTP_Password: {{ .Values.SMTPSettings.SMTP_Password | b64enc }}
  {{- end }}
  {{- if $qrCfg.realtimeConfiguration.isDistributed }}
  {{- if eq $qrCfg.realtimeConfiguration.distributedCache.provider "redis" }}
  {{- if eq $qrCfg.realtimeConfiguration.distributedCache.type "internal" }}
  QueueService_RedisCache_ConnectionString: {{ printf "rpi-queuereader-cache:6379,password=%s,abortConnect=False" $QueueServiceRedisPassword | b64enc }}
  QueueService_RedisCache_Password: {{ $QueueServiceRedisPassword | b64enc }}
  QueueService_RabbitMQ_Password: {{ $QueueServiceRabbitMQ | b64enc }}
  {{- end }}
  {{- end }}
  {{- end }}

  {{- if $execCfg.internalCache.enabled }}
  {{- if eq $execCfg.internalCache.type "internal" }}
  ExecutionService_RedisCache_ConnectionString: {{ printf "rpi-executionservice-cache:6379,password=%s,abortConnect=False" $ExecutionServiceRedisPassword | b64enc }}
  ExecutionService_RedisCache_Password: {{ $ExecutionServiceRedisPassword | b64enc }}
  {{- end }}
  {{- end }}

  {{- if $execCfg.internalCache.enabled }}
  {{- if eq $execCfg.internalCache.type "external" }}
  ExecutionService_RedisCache_ConnectionString: {{ $execCfg.internalCache.redisSettings.connectionString | b64enc }}
  {{- end }}
  {{- end }}

  {{- if eq $rtCfg.queueProvider.provider "rabbitmq" }}
  {{- if eq $rtCfg.queueProvider.rabbitmq.type "internal" }}
  RealtimeAPI_RabbitMQ_Password: {{ $RealtimeAPIRabbitMQ | b64enc }}
  {{- end }}
  {{- end }}

  {{- if $diag.copytoAzureBlob.enabled }}
  CopyToAzureBlobAccessKey: {{ $diag.copytoAzureBlob.accessKey | b64enc }}
  {{- end }}

  {{- if $diag.copytoSftp.enabled }}
  CopyToSFTPSecureFTPPassword: {{ $diag.copytoSftp.sftpPassword | b64enc }}
  {{- end }}

  {{- if .Values.smartActivation.enabled }}
  CDP_Default_Password: {{ $CDPDefaultPassword | b64enc }}
  CDP_Keycloak_Admin_Password: {{ $CDPKeycloakAdminPassword | b64enc }}
  CDP_Mongo_ConnectionString: {{ .Values.initservice.database.operational.connection_string | b64enc }}
  CDP_Integration_Password: {{ $intCfg.password | b64enc }}
  CDP_RabbitMQ_Password: {{ $CDPRabbitMQPassword | b64enc }}
  CDP_RabbitMQ_ErlangCookie: {{ $CDPRabbitMQErlangCookie | b64enc }}
  {{- end }}

  {{- if .Values.smartActivation.enabled }}
  {{- if .Values.reportingservice.sigma.enabled }}
  CDP_SIGMA_Client_Secret: {{ .Values.reportingservice.sigma.client_secret | b64enc }}
  {{- end }}
  {{- end }}

  {{- if .Values.smartActivation.enabled }}
  {{- if eq .Values.OpenIdProviders.name "keycloak" }}
  {{- if $iaCfg.useExternalUserManagement }}
  CDP_Keycloak_Client_Secret: {{ $KeycloakClientSecret | b64enc }}
  {{- end }}
  {{- end }}
  {{- end }}

  {{- if $rtCfg.queueProvider.enabled }}
  {{- if eq $rtCfg.queueProvider.provider "azurestorage" }}
  RealtimeAPI_AzureStorage_ConnectionString: {{ $rtCfg.queueProvider.azurestorage.connectionString | b64enc }}
  {{- end }}
  {{- end }}
type: Opaque
{{- end }}
{{- end }}
{{- end }}

---
{{- if $rbCfg.enabled }}
{{- if $rbCfg.autoCreateSecrets }}
{{- $secretName := $rbCfg.secretName | default "rpi-rebrandly" -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- if not (and $existing.metadata $existing.metadata.name) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "smartactivation.componentLabels" (dict "root" . "name" $secretName "component" "secret") | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
  Rebrandly_RedisPassword: {{ randAlphaNum 16 | b64enc }}
  Rebrandly_ApiKey: {{ $rbCfg.apiKey | b64enc }}
{{- end }}
{{- end }}
{{- end }}

---
{{- if .Values.smartActivation.enabled }}
{{- if .Values.smartActivation.autoCreateSecrets }}
{{- $secretName := .Values.smartActivation.secretName | default "rpi-smartactivation" -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- if not (and $existing.metadata $existing.metadata.name) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "smartactivation.componentLabels" (dict "root" . "name" $secretName "component" "secret") | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
  CDP_Default_Password: {{ randAlphaNum 16 | b64enc }}
  CDP_Keycloak_Admin_Password: {{ randAlphaNum 16 | b64enc }}
  CDP_Integration_Password: {{ randAlphaNum 16 | b64enc }}
  CDP_RabbitMQ_Password: {{ randAlphaNum 16 | b64enc }}
  CDP_Keycloak_Client_Secret: {{ randAlphaNum 16 | b64enc }}
  CDP_Mongo_ConnectionString: {{ .Values.initservice.database.operational.connection_string | b64enc }}
  CDP_SIGMA_Client_Secret: {{ .Values.reportingservice.sigma.client_secret | b64enc }}
{{- end }}
{{- end }}
{{- end }}
