{{- $rtCfg := fromYaml (include "rpi.merged.service" (dict "root" . "name" "realtimeapi")) -}}
{{- $execCfg := fromYaml (include "rpi.merged.service" (dict "root" . "name" "executionservice")) -}}
{{- $qrCfg := fromYaml (include "rpi.merged.service" (dict "root" . "name" "queuereader")) -}}
{{- $iaCfg := fromYaml (include "rpi.merged.service" (dict "root" . "name" "interactionapi")) -}}
{{- $intCfg := fromYaml (include "rpi.merged.service" (dict "root" . "name" "integrationapi")) -}}
{{- $rbCfg := fromYaml (include "rpi.merged.service" (dict "root" . "name" "rebrandly")) -}}
{{- $diag := fromYaml (include "rpi.merged.diagnosticsMode" .) -}}

{{/*
  Application Secret (kubernetes provider)
  =========================================
  The chart does NOT create the application secret. Users must create it
  before deploying using one of:
    - CLI:    rpihelmcli secrets -f overrides.yaml -n <namespace>
    - Manual: kubectl create secret generic <secretName> ...
    - Pipeline: apply secrets.yaml generated by the CLI
  The secret name is configured via secretsManagement.kubernetes.secretName.
  Sensitive values must NEVER be stored in the overrides file.
*/}}

---
{{/*
  Passwords for chart-managed Redis and RabbitMQ. Set to the release
  namespace so the secret is deterministic across syncs (Helm and Argo
  produce the same value every time). Acceptable because these services
  are reachable only over the in-cluster Service network.
*/}}
{{- $internalSecretName := "rpi-internal-services" -}}
{{- $internalPassword := .Release.Namespace -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $internalSecretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" $internalSecretName "component" "secrets") | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
  {{- if $qrCfg.realtimeConfiguration.isDistributed }}
  QueueService_RedisCache_Password: {{ $internalPassword | b64enc }}
  QueueService_RedisCache_ConnectionString: {{ printf "rpi-queuereader-cache.%s.svc.cluster.local.:6379,password=%s,abortConnect=False" .Release.Namespace $internalPassword | b64enc }}
  QueueService_RabbitMQ_Password: {{ $internalPassword | b64enc }}
  {{- end }}
  {{- if and $rtCfg.enabled (or (eq ($rtCfg.cacheProvider.provider | default "") "redis") (eq ($rtCfg.cacheProvider.provider | default "") "azureredis")) (eq ($rtCfg.cacheProvider.redis.redisSettings.type | default "internal") "internal") }}
  RealtimeAPI_RedisCache_Password: {{ $internalPassword | b64enc }}
  {{- end }}
  {{- if and $rtCfg.enabled (eq ($rtCfg.queueProvider.provider | default "") "rabbitmq") (eq ($rtCfg.queueProvider.rabbitmq.rabbitmqSettings.type | default "internal") "internal") }}
  RealtimeAPI_RabbitMQ_Password: {{ $internalPassword | b64enc }}
  {{- end }}
  {{- if $rbCfg.enabled }}
  Rebrandly_RedisPassword: {{ $internalPassword | b64enc }}
  {{- end }}

---
{{- $SQLPassword := randAlphaNum 16 }}
{{- $MongoPassword := randAlphaNum 16 }}
{{- if eq (.Values.global.deployment.mode | default "standard") "demo" }}
apiVersion: v1
kind: Secret
metadata:
  name: rpi-demo-mode
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" "rpi-demo-mode" "component" "database") | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
  DEMOMode_SQL_Password: {{ $SQLPassword | b64enc }}
  DEMOMode_Mongo_Password: {{ $MongoPassword | b64enc }}
  DEMOMode_Mongo_ConnectionString: {{ printf "mongodb://rpirealtime:%s@rpi-demo-mongodb:27017/rpirealtime" $MongoPassword | b64enc }}
{{- end }}
