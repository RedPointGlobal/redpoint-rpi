{{/*
  Smoke Test Deployments
  Lightweight validation pods that verify storage mounts and CSI secret mounts
  are working correctly. Each entry needs only a name, type, and mount target.
  Security context, imagePullSecrets, and workload identity labels are inherited
  from chart globals. All other fields are optional per-entry overrides.

  Two types:
    pvc       — Mounts a PersistentVolumeClaim and writes a test file in a loop
    csiSecret — Mounts a CSI SecretProviderClass volume and sleeps

  Enabled via: smokeTests.enabled: true
*/}}
{{- $secCtx := fromYaml (include "rpi.merged.securityContext" .) -}}
{{- range (.Values.smokeTests).deployments }}
{{- if ne (.enabled | toString) "false" }}
{{- $name := .name }}
{{- $containerName := .containerName | default $name }}
{{- $volumeName := .volumeName | default $name }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ $name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $name }}
  strategy:
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
    type: RollingUpdate
  template:
    metadata:
      annotations:
        {{- if eq (.type | default "pvc") "csiSecret" }}
        container.apparmor.security.beta.kubernetes.io/{{ $containerName }}: runtime/default
        {{- end }}
        {{- with .podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        app.kubernetes.io/name: {{ $name }}
        {{- with (include "rpi.cloudidentity.podLabels" $ | trim) }}{{- . | nindent 8 }}{{- end }}
    spec:
      {{- with .serviceAccountName }}
      serviceAccountName: {{ . | quote }}
      {{- end }}
      {{- include "rpi.pod.securityContext" (dict "sc" $secCtx) | nindent 6 }}
      {{- if .nodeSelector }}
      nodeSelector:
        {{- toYaml .nodeSelector | nindent 8 }}
      {{- else if $.Values.nodeSelector.enabled }}
      nodeSelector:
        {{ $.Values.nodeSelector.key }}: {{ $.Values.nodeSelector.value }}
      {{- end }}
      {{- if $.Values.tolerations.enabled }}
      tolerations:
        - effect: NoSchedule
          key: {{ $.Values.nodeSelector.key }}
          operator: Equal
          value: {{ $.Values.nodeSelector.value }}
      {{- end }}
      containers:
        - name: {{ $containerName }}
          image: {{ .image | default $.Values.global.deployment.images.net_utils }}
          imagePullPolicy: "Always"
          {{- if $secCtx.enabled }}
          securityContext:
            allowPrivilegeEscalation: false
            appArmorProfile:
              type: RuntimeDefault
          {{- end }}
          {{- if .command }}
          command:
            {{- toYaml .command | nindent 12 }}
          {{- else if eq (.type | default "pvc") "pvc" }}
          command:
            - /bin/sh
            - -c
            - |
              while true; do echo $(date) >> {{ .mountPath }}/outfile; sleep 1; done
          {{- else }}
          command:
            - /bin/sh
            - -c
            - |
              while true; do sleep 30; done
          {{- end }}
          {{- with .args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: {{ $volumeName }}
              mountPath: {{ .mountPath }}
              {{- if eq (.type | default "pvc") "csiSecret" }}
              readOnly: true
              {{- end }}
          resources:
            {{- if eq (.type | default "pvc") "csiSecret" }}
            requests:
              memory: 250Mi
              cpu: 64m
            limits:
              memory: 750Mi
              cpu: 256m
            {{- else }}
            requests:
              memory: 512Mi
              cpu: 500m
            limits:
              memory: "1024Mi"
              cpu: "1000m"
            {{- end }}
      volumes:
        {{- if eq (.type | default "pvc") "pvc" }}
        - name: {{ $volumeName }}
          persistentVolumeClaim:
            claimName: {{ .claimName }}
        {{- else }}
        - name: {{ $volumeName }}
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: {{ .secretProviderClass | quote }}
        {{- end }}
{{- end }}
{{- end }}