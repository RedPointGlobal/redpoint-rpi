{{- $cfg := fromYaml (include "rpi.merged.postInstall" .) -}}
{{- $secCtx := fromYaml (include "rpi.merged.securityContext" .) -}}
{{- $deploymentapiCfg := fromYaml (include "rpi.merged.service" (dict "root" . "name" "deploymentapi")) -}}
{{- $tagSanitized := .Values.global.deployment.images.tag | replace "." "-" | lower | trunc 40 -}}
{{- $name := printf "rpi-postinstall-%s" $tagSanitized -}}

{{- if $cfg.enabled }}
{{- if $deploymentapiCfg.enabled }}
---
{{- if not $cfg.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: rpi-postinstall-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" $name "component" "postinstall") | nindent 4 }}
  annotations:
    helm.sh/hook: post-install
    helm.sh/hook-weight: "-1"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
    {{- with .Values.customAnnotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
type: Opaque
stringData:
  activation-key: {{ $cfg.activationKey | quote }}
  admin-password: {{ $cfg.adminPassword | quote }}
  admin-username: {{ $cfg.adminUsername | quote }}
  admin-email: {{ $cfg.adminEmail | quote }}
  {{- if $cfg.tenant.enabled }}
  dw-server: {{ $cfg.tenant.dataWarehouse.server | quote }}
  dw-database: {{ $cfg.tenant.dataWarehouse.database | quote }}
  dw-username: {{ $cfg.tenant.dataWarehouse.username | quote }}
  dw-password: {{ $cfg.tenant.dataWarehouse.password | quote }}
  {{- end }}
{{- end }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" $name "component" "postinstall") | nindent 4 }}
    app.kubernetes.io/version: {{ .Values.global.deployment.images.tag | quote }}
    {{- with .Values.customLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  annotations:
    helm.sh/hook: post-install
    helm.sh/hook-weight: "0"
    helm.sh/hook-delete-policy: before-hook-creation
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    {{- with .Values.customAnnotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  backoffLimit: {{ $cfg.backoffLimit }}
  ttlSecondsAfterFinished: 3600
  activeDeadlineSeconds: {{ add (mul (atoi (toString $cfg.waitTimeout)) 3) 300 }}
  template:
    metadata:
      labels:
        {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" $name "component" "postinstall") | nindent 8 }}
        app.kubernetes.io/version: {{ .Values.global.deployment.images.tag | quote }}
        {{- with .Values.customLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        {{- with .Values.customAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- if .Values.global.deployment.images.imagePullSecret.enabled }}
      imagePullSecrets:
      - name: {{ .Values.global.deployment.images.imagePullSecret.name }}
      {{- end }}
      restartPolicy: Never
      {{- include "rpi.pod.securityContext" (dict "sc" $secCtx "noSupplementalGroups" true) | nindent 6 }}
      containers:
      - name: postinstall
        image: {{ printf "%s/net-utils:latest" .Values.global.deployment.images.registry }}
        imagePullPolicy: {{ .Values.global.deployment.images.imagePullPolicy | default "IfNotPresent" }}
        {{- include "rpi.container.securityContext" (dict "sc" $secCtx) | nindent 8 }}
        env:
        - name: ACTIVATION_KEY
          valueFrom:
            secretKeyRef:
              name: {{ $cfg.existingSecret | default "rpi-postinstall-secrets" }}
              key: activation-key
        - name: ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ $cfg.existingSecret | default "rpi-postinstall-secrets" }}
              key: admin-password
        - name: ADMIN_USERNAME
          valueFrom:
            secretKeyRef:
              name: {{ $cfg.existingSecret | default "rpi-postinstall-secrets" }}
              key: admin-username
        - name: ADMIN_EMAIL
          valueFrom:
            secretKeyRef:
              name: {{ $cfg.existingSecret | default "rpi-postinstall-secrets" }}
              key: admin-email
        {{- if $cfg.tenant.enabled }}
        - name: DW_SERVER
          valueFrom:
            secretKeyRef:
              name: {{ $cfg.tenant.existingSecret | default ($cfg.existingSecret | default "rpi-postinstall-secrets") }}
              key: dw-server
        - name: DW_DATABASE
          valueFrom:
            secretKeyRef:
              name: {{ $cfg.tenant.existingSecret | default ($cfg.existingSecret | default "rpi-postinstall-secrets") }}
              key: dw-database
        - name: DW_USERNAME
          valueFrom:
            secretKeyRef:
              name: {{ $cfg.tenant.existingSecret | default ($cfg.existingSecret | default "rpi-postinstall-secrets") }}
              key: dw-username
        - name: DW_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ $cfg.tenant.existingSecret | default ($cfg.existingSecret | default "rpi-postinstall-secrets") }}
              key: dw-password
        {{- end }}
        command:
        - /bin/sh
        - -c
        - |
          set -e

          API_HOST="{{ $cfg.deploymentapiHost }}"
          API_PORT="{{ $cfg.deploymentapiPort }}"
          BASE_URL="http://${API_HOST}:${API_PORT}"
          WAIT_TIMEOUT="{{ $cfg.waitTimeout }}"
          POLL_INTERVAL="{{ $cfg.pollIntervalSeconds }}"
          MAX_READY_WAIT="{{ $cfg.maxReadyWaitSeconds }}"

          # -----------------------------------------------
          # Wait for Deployment API to become ready
          # -----------------------------------------------
          echo "Waiting for rpi-deploymentapi to become ready..."
          WAITED=0
          while true; do
            CODE=$(curl -s -o /dev/null -w '%{http_code}' --connect-timeout 5 --max-time 10 "${BASE_URL}/health/ready" 2>/dev/null || echo "000")
            if [ "${CODE}" = "200" ]; then
              echo "rpi-deploymentapi is ready"
              break
            fi
            WAITED=$((WAITED + ${POLL_INTERVAL}))
            if [ "${WAITED}" -ge ${MAX_READY_WAIT} ]; then
              echo "ERROR: rpi-deploymentapi not ready after ${WAITED}s (HTTP ${CODE})"
              exit 1
            fi
            echo "Not ready yet (HTTP ${CODE}), retrying in ${POLL_INTERVAL}s..."
            sleep ${POLL_INTERVAL}
          done

          # Helper: wait for deployment status to reach LastRunComplete
          wait_for_complete() {
            local LABEL=$1
            local TIMEOUT=$((WAIT_TIMEOUT + 60))
            local ELAPSED=0
            echo "Waiting for ${LABEL} to complete..."
            while [ ${ELAPSED} -lt ${TIMEOUT} ]; do
              sleep ${POLL_INTERVAL}
              ELAPSED=$((ELAPSED + ${POLL_INTERVAL}))
              STATUS_RESPONSE=$(curl -s --connect-timeout 5 --max-time 10 \
                -H 'accept: text/plain' \
                "${BASE_URL}/api/deployment/status" 2>/dev/null || echo "")
              if echo "${STATUS_RESPONSE}" | grep -q '"LastRunComplete"'; then
                echo "${LABEL} completed successfully"
                echo "${STATUS_RESPONSE}"
                return 0
              fi
              if echo "${STATUS_RESPONSE}" | grep -q '"LastRunFailed"'; then
                echo "ERROR: ${LABEL} failed"
                echo "${STATUS_RESPONSE}"
                return 1
              fi
            done
            echo "ERROR: ${LABEL} timed out after ${TIMEOUT}s"
            return 1
          }

          # -----------------------------------------------
          # Step 1: Activate License
          # -----------------------------------------------
          echo ""
          echo "============================================"
          echo "  Step 1: License Activation"
          echo "============================================"

          # Check if already activated
          LICENSE_STATUS=$(curl -s --connect-timeout 5 --max-time 10 \
            -H 'accept: application/json' \
            "${BASE_URL}/api/licensing/status" 2>/dev/null || echo "")

          if echo "${LICENSE_STATUS}" | grep -qi '"isActivated":true\|"IsActivated":true'; then
            echo "License is already activated — skipping"
          else
            echo "Activating license..."
            SYSTEM_NAME="{{ $cfg.systemName }}"
            ACTIVATE_RESPONSE=$(curl -s -w '\n%{http_code}' --connect-timeout 10 --max-time 30 \
              -X POST "${BASE_URL}/api/licensing/activatelicense" \
              -H 'Accept: application/json' \
              -H 'Content-Type: application/json' \
              -d "{
                \"ActivationKey\": \"${ACTIVATION_KEY}\",
                \"SystemName\": \"${SYSTEM_NAME}\"
              }" 2>/dev/null || echo "000")
            CODE=$(echo "${ACTIVATE_RESPONSE}" | tail -1)
            BODY=$(echo "${ACTIVATE_RESPONSE}" | sed '$d')
            echo "${BODY}"
            if [ "${CODE}" -lt 200 ] || [ "${CODE}" -ge 300 ]; then
              echo "ERROR: License activation failed (HTTP ${CODE})"
              exit 1
            fi
            echo "License activated successfully"
          fi

          # -----------------------------------------------
          # Step 2: Install Cluster Databases
          # -----------------------------------------------
          echo ""
          echo "============================================"
          echo "  Step 2: Install Cluster Databases"
          echo "============================================"

          # Check if already installed
          DEPLOY_STATUS=$(curl -s --connect-timeout 5 --max-time 10 \
            -H 'accept: text/plain' \
            "${BASE_URL}/api/deployment/status" 2>/dev/null || echo "")

          if echo "${DEPLOY_STATUS}" | grep -q '"LastRunComplete"'; then
            echo "Cluster databases already installed — skipping"
          else
            echo "Installing cluster databases..."
            INSTALL_RESPONSE=$(curl -s -w '\n%{http_code}' --connect-timeout 10 \
              --max-time $((WAIT_TIMEOUT + 60)) \
              -X POST "${BASE_URL}/api/deployment/installcluster?waitTimeoutSeconds=${WAIT_TIMEOUT}" \
              -H 'accept: text/plain' \
              -H 'Content-Type: application/json' \
              -d "{
                \"UseExistingDatabases\": false,
                \"CoreUserInitialPassword\": \"${ADMIN_PASSWORD}\",
                \"SystemAdministrator\": {
                  \"Username\": \"${ADMIN_USERNAME}\",
                  \"EmailAddress\": \"${ADMIN_EMAIL}\"
                }
              }" 2>/dev/null || echo "000")
            CODE=$(echo "${INSTALL_RESPONSE}" | tail -1)
            BODY=$(echo "${INSTALL_RESPONSE}" | sed '$d')
            echo "${BODY}"
            if [ "${CODE}" -lt 200 ] || [ "${CODE}" -ge 300 ]; then
              echo "ERROR: Cluster database install failed (HTTP ${CODE})"
              exit 1
            fi
            wait_for_complete "Cluster database install"
          fi

          {{- if $cfg.tenant.enabled }}
          # -----------------------------------------------
          # Step 3: Add Tenant
          # -----------------------------------------------
          echo ""
          echo "============================================"
          echo "  Step 3: Add Tenant '{{ $cfg.tenant.name }}'"
          echo "============================================"

          echo "Adding tenant..."
          TENANT_RESPONSE=$(curl -s -w '\n%{http_code}' --connect-timeout 10 \
            --max-time $((WAIT_TIMEOUT + 60)) \
            -X POST "${BASE_URL}/api/deployment/addclient?waitTimeoutSeconds=${WAIT_TIMEOUT}" \
            -H 'accept: text/plain' \
            -H 'Content-Type: application/json' \
            -d "{
              \"Name\": \"{{ $cfg.tenant.name }}\",
              \"Description\": \"{{ $cfg.tenant.name }}\",
              \"ClientID\": \"00000000-0000-0000-0000-000000000000\",
              \"UseExistingDatabases\": false,
              \"DatabaseSuffix\": \"{{ $cfg.tenant.name }}\",
              \"DataWarehouse\": {
                \"ConnectionParameters\": {
                  \"Provider\": \"{{ $cfg.tenant.dataWarehouse.provider }}\",
                  \"UseDatabaseAgent\": false,
                  \"Server\": \"${DW_SERVER}\",
                  \"DatabaseName\": \"${DW_DATABASE}\",
                  \"IsUsingCredentials\": true,
                  \"Username\": \"${DW_USERNAME}\",
                  \"Password\": \"${DW_PASSWORD}\",
                  \"SQLServerSettings\": {
                    \"Encrypt\": true,
                    \"TrustServerCertificate\": true
                  }
                },
                \"DeploymentSettings\": {
                  \"DatabaseMode\": \"SQL\",
                  \"DatabaseSchema\": \"dbo\"
                }
              },
              \"TemplateTenant\": \"NoTemplateTenant\",
              \"StartupConfiguration\": {
                \"Users\": [\"${ADMIN_USERNAME}\"],
                \"FileOutput\": {\"UseGlobalSettings\": true}
              }
            }" 2>/dev/null || echo "000")
          CODE=$(echo "${TENANT_RESPONSE}" | tail -1)
          BODY=$(echo "${TENANT_RESPONSE}" | sed '$d')
          echo "${BODY}"
          if [ "${CODE}" -lt 200 ] || [ "${CODE}" -ge 300 ]; then
            echo "ERROR: Add tenant failed (HTTP ${CODE})"
            exit 1
          fi
          wait_for_complete "Add tenant"
          {{- end }}

          echo ""
          echo "============================================"
          echo "  Post-install completed successfully!"
          echo "============================================"
        resources:
          requests:
            cpu: {{ $cfg.resources.requests.cpu }}
            memory: {{ $cfg.resources.requests.memory }}
          limits:
            cpu: {{ $cfg.resources.limits.cpu }}
            memory: {{ $cfg.resources.limits.memory }}
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir: {}
      {{- if .Values.nodeSelector.enabled }}
      nodeSelector:
        {{ .Values.nodeSelector.key }}: {{ .Values.nodeSelector.value }}
      {{- end }}
      {{- if .Values.tolerations.enabled }}
      tolerations:
        - effect: NoSchedule
          key: {{ .Values.nodeSelector.key }}
          operator: Equal
          value: {{ .Values.nodeSelector.value }}
      {{- end }}
{{- end }}
{{- end }}
