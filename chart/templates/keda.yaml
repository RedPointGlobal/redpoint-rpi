{{- $cfg := fromYaml (include "rpi.merged.service" (dict "root" . "name" "executionservice")) -}}
{{- if $cfg.autoscaling.enabled }}
{{- if eq $cfg.autoscaling.type "keda" }}
{{- if $cfg.autoscaling.kedaScaledObject.useTriggerAuthentication }}
apiVersion: keda.sh/v1alpha1
kind: TriggerAuthentication
metadata:
  name: rpi-executionservice
  namespace: {{ .Release.Namespace }}
spec:
  podIdentity:
      provider: azure-workload
      identityId: {{ .Values.cloudIdentity.azure.managedIdentityClientId }}
{{- end }}
{{- end }}
{{- end }}
---
{{- if $cfg.autoscaling.enabled }}
{{- if eq $cfg.autoscaling.type "keda" }}
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: rpi-executionservice
  namespace: {{ .Release.Namespace }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: rpi-executionservice
  fallback:
    failureThreshold: {{ $cfg.autoscaling.kedaScaledObject.fallback.failureThreshold }} 
    replicas: {{ $cfg.autoscaling.kedaScaledObject.fallback.replicas }}
  advanced:
    horizontalPodAutoscalerConfig:
      behavior:
        scaleUp:
          stabilizationWindowSeconds: {{ $cfg.autoscaling.kedaScaledObject.behavior.scaleUp.stabilizationWindowSeconds }} 
          policies:
            - type: {{ $cfg.autoscaling.kedaScaledObject.behavior.scaleUp.policies.type }} 
              value: {{ $cfg.autoscaling.kedaScaledObject.behavior.scaleUp.policies.value }}
              periodSeconds: {{ $cfg.autoscaling.kedaScaledObject.behavior.scaleUp.policies.periodSeconds }}
        scaleDown:
          stabilizationWindowSeconds: {{ $cfg.autoscaling.kedaScaledObject.behavior.scaleDown.stabilizationWindowSeconds }} 
          policies:
            - type: {{ $cfg.autoscaling.kedaScaledObject.behavior.scaleDown.policies.type }} 
              value: {{ $cfg.autoscaling.kedaScaledObject.behavior.scaleDown.policies.value }}
              periodSeconds: {{ $cfg.autoscaling.kedaScaledObject.behavior.scaleDown.policies.periodSeconds }}
  triggers:
    - type: prometheus
      metadata:
        serverAddress: {{ $cfg.autoscaling.kedaScaledObject.serverAddress | quote }}
        metricName: {{ $cfg.autoscaling.kedaScaledObject.metricName | quote }}
        query: {{ $cfg.autoscaling.kedaScaledObject.query | quote }}
        threshold: {{ $cfg.autoscaling.kedaScaledObject.threshold | quote }}
      {{- if $cfg.autoscaling.kedaScaledObject.useTriggerAuthentication }}
      authenticationRef:
        name: rpi-executionservice
      {{- end }}
  pollingInterval: {{ $cfg.autoscaling.kedaScaledObject.pollingInterval }}
  minReplicaCount: {{ $cfg.autoscaling.kedaScaledObject.minReplicaCount }}
  maxReplicaCount: {{ $cfg.autoscaling.kedaScaledObject.maxReplicaCount }}
{{- end }}
{{- end }}
              