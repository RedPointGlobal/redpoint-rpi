{{- $cfg := .Values.preflight | default dict -}}
{{- $secCtx := fromYaml (include "rpi.merged.securityContext" .) -}}
{{- $enabled := $cfg.enabled | default false -}}
{{- $mode := $cfg.mode | default "test" -}}

{{- if $enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: rpi-preflight
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" "rpi-preflight" "component" "preflight") | nindent 4 }}
    app.kubernetes.io/version: {{ .Values.global.deployment.images.tag | quote }}
    {{- with .Values.customLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  annotations:
    {{- if eq $mode "test" }}
    helm.sh/hook: test
    {{- else }}
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-5"
    {{- end }}
    helm.sh/hook-delete-policy: before-hook-creation
    {{- with .Values.customAnnotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" "rpi-preflight" "component" "preflight") | nindent 8 }}
        {{- with .Values.customLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- if .Values.global.deployment.images.imagePullSecret.enabled }}
      imagePullSecrets:
      - name: {{ .Values.global.deployment.images.imagePullSecret.name }}
      {{- end }}
      restartPolicy: Never
      {{- if $secCtx.enabled }}
      securityContext:
        runAsUser: {{ $secCtx.runAsUser }}
        runAsGroup: {{ $secCtx.runAsGroup }}
        fsGroup: {{ $secCtx.fsGroup }}
        runAsNonRoot: {{ $secCtx.runAsNonRoot }}
      {{- end }}
      containers:
      - name: preflight
        image: busybox:1.36
        imagePullPolicy: IfNotPresent
        {{- if $secCtx.enabled }}
        securityContext:
          privileged: {{ $secCtx.privileged }}
          allowPrivilegeEscalation: {{ $secCtx.allowPrivilegeEscalation }}
          readOnlyRootFilesystem: {{ $secCtx.readOnlyRootFilesystem }}
          capabilities:
            drop:
            {{- range $secCtx.capabilities.drop }}
              - {{ . }}
            {{- end }}
        {{- end }}
        command:
        - /bin/sh
        - -c
        - |
          set -e
          PASS=0
          FAIL=0
          WARN=0

          pass() { PASS=$((PASS + 1)); echo "  PASS: $1"; }
          fail() { FAIL=$((FAIL + 1)); echo "  FAIL: $1"; }
          warn() { WARN=$((WARN + 1)); echo "  WARN: $1"; }

          echo "============================================"
          echo "  RPI Pre-flight Validation"
          echo "  Namespace: {{ .Release.Namespace }}"
          echo "  Version:   {{ .Values.global.deployment.images.tag }}"
          echo "============================================"
          echo ""

          # --------------------------------------------------
          # 1. DNS Resolution — Operational Database
          # --------------------------------------------------
          echo "[1/4] DNS Resolution"
          {{- $dbHost := .Values.databases.operational.server_host | default "" }}
          {{- if and (ne $dbHost "") (ne $dbHost "rpi-demo-mssql") }}
          if nslookup "{{ $dbHost }}" >/dev/null 2>&1; then
            pass "Database host '{{ $dbHost }}' resolves"
          else
            fail "Cannot resolve database host '{{ $dbHost }}' — check databases.operational.server_host"
          fi
          {{- else if eq $dbHost "rpi-demo-mssql" }}
          pass "Demo mode — database host is in-cluster (rpi-demo-mssql)"
          {{- else }}
          fail "databases.operational.server_host is not set"
          {{- end }}

          {{- $domain := .Values.ingress.domain | default "" }}
          {{- if and (ne $domain "") (ne $domain "example.com") }}
          if nslookup "{{ $domain }}" >/dev/null 2>&1; then
            pass "Ingress domain '{{ $domain }}' resolves"
          else
            warn "Ingress domain '{{ $domain }}' does not resolve yet (DNS may not be configured)"
          fi
          {{- else }}
          warn "Ingress domain not configured or is placeholder ({{ $domain }})"
          {{- end }}
          echo ""

          # --------------------------------------------------
          # 2. Database Connectivity
          # --------------------------------------------------
          echo "[2/4] Database Connectivity"
          {{- $dbProvider := .Values.databases.operational.provider | default "sqlserver" }}
          {{- $dbPort := "1433" }}
          {{- if eq $dbProvider "postgresql" }}
          {{- $dbPort = "5432" }}
          {{- end }}
          {{- if and (ne $dbHost "") (ne $dbHost "rpi-demo-mssql") }}
          if nc -z -w 5 "{{ $dbHost }}" {{ $dbPort }} 2>/dev/null; then
            pass "TCP connect to {{ $dbHost }}:{{ $dbPort }} ({{ $dbProvider }})"
          else
            fail "Cannot connect to {{ $dbHost }}:{{ $dbPort }} — check firewall rules and database availability"
          fi
          {{- else if eq $dbHost "rpi-demo-mssql" }}
          pass "Demo mode — skipping external DB connectivity check"
          {{- else }}
          fail "No database host configured"
          {{- end }}
          echo ""

          # --------------------------------------------------
          # 3. Cloud Identity Configuration
          # --------------------------------------------------
          echo "[3/4] Cloud Identity"
          {{- if .Values.cloudIdentity.enabled }}
          {{- if eq .Values.global.deployment.platform "azure" }}
          {{- if .Values.cloudIdentity.azure.managedIdentityClientId }}
          pass "Azure Workload Identity configured (clientId set)"
          {{- else }}
          fail "cloudIdentity.azure.managedIdentityClientId is empty"
          {{- end }}
          {{- else if eq .Values.global.deployment.platform "amazon" }}
          {{- if .Values.cloudIdentity.amazon.useAccessKeys }}
          pass "Amazon static access keys configured"
          {{- else if .Values.cloudIdentity.amazon.roleArn }}
          pass "Amazon IRSA configured (roleArn set)"
          {{- else }}
          fail "cloudIdentity.amazon.roleArn is empty and useAccessKeys is false"
          {{- end }}
          {{- else if eq .Values.global.deployment.platform "google" }}
          {{- if .Values.cloudIdentity.google.serviceAccountEmail }}
          pass "Google Workload Identity configured (serviceAccountEmail set)"
          {{- else }}
          fail "cloudIdentity.google.serviceAccountEmail is empty"
          {{- end }}
          {{- end }}
          {{- else }}
          {{- if or (eq .Values.secretsManagement.provider "sdk") (eq .Values.secretsManagement.provider "csi") }}
          fail "secretsManagement.provider={{ .Values.secretsManagement.provider }} requires cloudIdentity.enabled=true"
          {{- else }}
          pass "Cloud identity disabled (not required for kubernetes secrets mode)"
          {{- end }}
          {{- end }}
          echo ""

          # --------------------------------------------------
          # 4. Secrets Management
          # --------------------------------------------------
          echo "[4/4] Secrets Management"
          {{- if eq .Values.secretsManagement.provider "kubernetes" }}
          pass "Using Kubernetes-native secrets (provider: kubernetes)"
          {{- else if eq .Values.secretsManagement.provider "sdk" }}
          pass "Using SDK vault integration (provider: sdk)"
          {{- if and (eq .Values.global.deployment.platform "azure") (not .Values.secretsManagement.sdk.azure.vaultUri) }}
          fail "secretsManagement.sdk.azure.vaultUri is empty"
          {{- end }}
          {{- else if eq .Values.secretsManagement.provider "csi" }}
          pass "Using CSI driver secrets sync (provider: csi)"
          {{- else }}
          fail "Unknown secretsManagement.provider: {{ .Values.secretsManagement.provider }}"
          {{- end }}
          echo ""

          # --------------------------------------------------
          # Summary
          # --------------------------------------------------
          echo "============================================"
          echo "  Results: ${PASS} passed, ${FAIL} failed, ${WARN} warnings"
          echo "============================================"

          if [ "${FAIL}" -gt 0 ]; then
            echo ""
            echo "Pre-flight validation FAILED. Fix the issues above before deploying."
            exit 1
          fi

          echo ""
          echo "Pre-flight validation PASSED."
        resources:
          requests:
            cpu: 50m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 64Mi
      {{- if .Values.nodeSelector.enabled }}
      nodeSelector:
        {{ .Values.nodeSelector.key }}: {{ .Values.nodeSelector.value }}
      {{- end }}
      {{- if .Values.tolerations.enabled }}
      tolerations:
        - effect: NoSchedule
          key: {{ .Values.nodeSelector.key }}
          operator: Equal
          value: {{ .Values.nodeSelector.value }}
      {{- end }}
{{- end }}
