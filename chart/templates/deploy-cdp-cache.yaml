{{- $cfg := fromYaml (include "rpi.merged.service" (dict "root" . "name" "cdpcache")) -}}
{{- $name := "cdp-cache" -}}
{{- if .Values.smartActivation.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "smartactivation.componentLabels" (dict "root" . "name" $name "component" "cache") | nindent 4 }}
  {{- $saAnnotations := include "rpi.mergedAnnotations" (dict "root" . "type" "serviceAccount") | trim }}
  {{- if $saAnnotations }}
  annotations:
    {{- $saAnnotations | nindent 4 }}
  {{- end }}
{{- end }}

---
{{- if $cfg.podDisruptionBudget.enabled }}
{{- if .Values.smartActivation.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "smartactivation.componentLabels" (dict "root" . "name" $name "component" "cache") | nindent 4 }}
spec:
  minAvailable: {{ $cfg.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $name }}
{{- end }}
{{- end }}

---
{{- if .Values.smartActivation.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $name }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "smartactivation.componentLabels" (dict "root" . "name" $name "component" "cache") | nindent 4 }}
data:
  redis.conf: |
    # Persistent AOF; safer than RDB for most single-node setups
    appendonly yes
    appendfsync everysec

    # Limit max memory if you want eviction behavior — uncomment & set:
    # maxmemory 2gb
    # maxmemory-policy allkeys-lru

    # Only listen on container interface
    bind 0.0.0.0
    port 6379
    protected-mode yes

---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "smartactivation.componentLabels" (dict "root" . "name" $name "component" "cache") | nindent 4 }}
  {{- $svcAnnotations := include "rpi.mergedAnnotations" (dict "root" . "type" "service") | trim }}
  {{- if $svcAnnotations }}
  annotations:
    {{- $svcAnnotations | nindent 4 }}
  {{- end }}
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: {{ $name }}
  ports:
    - name: redis
      port: {{ $cfg.service.port }}
      targetPort: 6379
      
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "smartactivation.componentLabels" (dict "root" . "name" $name "component" "cache") | nindent 4 }}
    app.kubernetes.io/version: {{ .Values.global.deployment.images.tag | quote }}
spec:
  serviceName: {{ $name }}
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Retain
    whenScaled: Retain
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $name }}
  template:
    metadata:
      labels:
        {{- include "smartactivation.componentLabels" (dict "root" . "name" $name "component" "cache") | nindent 8 }}
        app.kubernetes.io/version: {{ .Values.global.deployment.images.tag | quote }}
        {{- with .Values.customLabels }}
        {{- toYaml . | nindent 8 }} 
        {{- end }}
    spec:
      {{- if .Values.global.deployment.images.imagePullSecret.enabled }}
      imagePullSecrets:
        - name: {{ .Values.global.deployment.images.imagePullSecret.name }}
      {{- end }}
      affinity:
        podAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: ["cdp-authservice"]
                topologyKey: "kubernetes.io/hostname"
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: {{ $name }}
                topologyKey: kubernetes.io/hostname
      {{- if .Values.nodeSelector.enabled }}
      nodeSelector:
        {{ .Values.nodeSelector.key }}: {{ .Values.nodeSelector.value }}
      {{- end }}
      {{- if .Values.tolerations.enabled }}
      tolerations:
        - effect: NoSchedule
          key: {{ .Values.nodeSelector.key }}
          operator: Equal
          value: {{ .Values.nodeSelector.value }}
      {{- end }}
      containers:
        - name: {{ $name }}
          image: {{ include "rpi.image" (dict "root" . "name" "rpi-redis") }}
          imagePullPolicy: {{ .Values.global.deployment.images.imagePullPolicy | default "IfNotPresent" }}
          ports:
            - containerPort: 6379
              name: redis
          command: ["redis-server"]
          args: ["--save", "\"\"", "--appendonly", "no"]
          env:
          {{- if .Values.global.deployment.podTimezone }}
          - name: TZ
            value: {{ .Values.global.deployment.podTimezone | quote }}
          {{- end }}
          {{- include "rpi.cdp.keyVaultEnv" . | nindent 10 }}
          volumeMounts:
            - name: {{ $name }}-data
              mountPath: /data
            - name: {{ $name }}-config
              mountPath: /usr/local/etc/redis
          {{- if $cfg.resources.enabled }}
          resources:
            {{- if and $cfg.resources.limits (ne $cfg.resources.limits.enabled false) }}
            limits:
              {{- with $cfg.resources.limits.cpu }}
              cpu: {{ . }}
              {{- end }}
              {{- with $cfg.resources.limits.memory }}
              memory: {{ . }}
              {{- end }}
            {{- end }}
            {{- if and $cfg.resources.requests (ne $cfg.resources.requests.enabled false) }}
            requests:
              {{- with $cfg.resources.requests.cpu }}
              cpu: {{ . }}
              {{- end }}
              {{- with $cfg.resources.requests.memory }}
              memory: {{ . }}
              {{- end }}
            {{- end }}
          {{- end }}
          readinessProbe:
            exec:
              command: ["sh", "-c", "redis-cli ping | grep PONG"]
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            exec:
              command: ["sh", "-c", "redis-cli ping | grep PONG"]
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          {{- include "rpi.container.securityContext" (dict "sc" $cfg.securityContext) | nindent 10 }}
      {{- include "rpi.pod.securityContext" (dict "sc" $cfg.securityContext) | nindent 6 }}
      volumes:
        - name: {{ $name }}-config
          configMap:
            name: {{ $name }}-config
  volumeClaimTemplates:
    - metadata:
        name: {{ $name }}-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ $cfg.volumeClaimTemplates.storage | quote }}
{{- end }}