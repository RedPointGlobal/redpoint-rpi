
{{- $cfg := .Values.logAnalyzer | default dict -}}
{{- if $cfg.enabled -}}
{{- $name := "rpi-loganalyzer" -}}
{{- $service := $cfg.service | default dict -}}
{{- $resources := $cfg.resources | default dict -}}
{{- $storage := $cfg.storage | default dict -}}
{{- $vct := $storage.volumeClaimTemplates | default dict -}}
{{- $secCtx := fromYaml (include "rpi.merged.securityContext" .) -}}

{{- include "rpi.block.serviceAccount" (dict "root" . "name" $name "component" "loganalyzer" "cfg" $cfg) }}

---
# Read-only RBAC for the analyzer's Infrastructure events collector.
# Lets the analyzer pod call the K8s API to capture OOMKilled,
# CrashLoopBackOff, probe failures, and pull the previous container's
# stdout when a pod just crashed. Namespace-scoped only.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" $name "component" "loganalyzer") | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  # metrics-server: live CPU + memory usage for the Pod health section.
  # Optional in the cluster -- when not installed, the snapshot just
  # omits CPU/memory and the UI shows "-" for those columns.
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" $name "component" "loganalyzer") | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $name }}
subjects:
  - kind: ServiceAccount
    name: {{ include "rpi.serviceAccountName" (dict "root" . "name" $name "cfg" $cfg) }}
    namespace: {{ .Release.Namespace }}

---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" $name "component" "loganalyzer") | nindent 4 }}
  {{- $svcAnnotations := include "rpi.mergedAnnotations" (dict "root" . "type" "service") | trim }}
  {{- if $svcAnnotations }}
  annotations:
    {{- $svcAnnotations | nindent 4 }}
  {{- end }}
spec:
  ports:
  - name: http
    port: {{ $service.port | default 80 }}
    protocol: TCP
    targetPort: ui
  selector:
    app.kubernetes.io/name: {{ $name }}

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" $name "component" "loganalyzer") | nindent 4 }}
spec:
  serviceName: {{ $name }}
  replicas: 1
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Retain
    whenScaled: Retain
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $name }}
  template:
    metadata:
      labels:
        {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" $name "component" "loganalyzer") | nindent 8 }}
        {{- with (include "rpi.cloudidentity.podLabels" (dict "root" . "svcCloudIdentity" (hasKey $cfg "cloudIdentity" | ternary $cfg.cloudIdentity false)) | trim) }}{{- . | nindent 8 }}{{- end }}
      {{- $podAnnotations := include "rpi.mergedAnnotations" (dict "root" . "type" "pod") | trim }}
      {{- if $podAnnotations }}
      annotations:
        {{- $podAnnotations | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "rpi.serviceAccountName" (dict "root" . "name" $name "cfg" $cfg) }}
      {{- if .Values.global.deployment.images.imagePullSecret.enabled }}
      imagePullSecrets:
        - name: {{ .Values.global.deployment.images.imagePullSecret.name }}
      {{- end }}
      securityContext:
        fsGroup: 7777
        fsGroupChangePolicy: OnRootMismatch
        {{- with $secCtx.pod }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      containers:
      - name: {{ $name }}
        image: {{ include "rpi.image" (dict "root" . "name" "rpi-loganalyzer") }}
        imagePullPolicy: {{ .Values.global.deployment.images.imagePullPolicy | default "IfNotPresent" }}
        ports:
        - name: ui
          containerPort: {{ $service.uiPort | default 8501 }}
          protocol: TCP
        - name: api
          containerPort: {{ $service.apiPort | default 8080 }}
          protocol: TCP
        env:
        # Downward-API: lets the K8s events collector know which
        # namespace to scope its event/pod queries to.
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        {{- include "rpi.logAnalyzer.modelEnvvars" . | nindent 8 }}
        {{- include "rpi.logAnalyzer.runtimeEnvvars" . | nindent 8 }}
        # Same SDK + cloudIdentity envvar wiring the deploymentapi (and the
        # rest of the RPI services) use. The analyzer reads KeyVault__Provider
        # to know which cloud vault to talk to in SDK mode -- same shape as
        # the .NET services, no analyzer-specific knobs.
        {{- with (include "rpi.secrets.sdk.envvars" . | trim) }}{{- . | nindent 8 }}{{- end }}
        {{- with (include "rpi.cloudidentity.envvars" . | trim) }}{{- . | nindent 8 }}{{- end }}
        {{- with (include "rpi.cloudidentity.awsAccessKeyEnvvars" . | trim) }}{{- . | nindent 8 }}{{- end }}
        {{- include "rpi.customCACerts.envVar" . | nindent 8 }}
        {{- with $resources }}
        resources:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with $secCtx.container }}
        securityContext:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        # Probes hit the FastAPI side. Streamlit is consumer-facing only.
        readinessProbe:
          httpGet:
            path: /health/ready
            port: api
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health/live
            port: api
          initialDelaySeconds: 30
          periodSeconds: 30
        volumeMounts:
        - name: {{ $name }}-data
          mountPath: /data
        {{- include "rpi.cloudidentity.googleVolumeMounts" . | nindent 8 }}
        {{- include "rpi.customCACerts.volumeMount" . | nindent 8 }}
      volumes:
      {{- if $storage.existingClaim }}
      - name: {{ $name }}-data
        persistentVolumeClaim:
          claimName: {{ $storage.existingClaim | quote }}
      {{- else if not $vct.enabled }}
      - name: {{ $name }}-data
        emptyDir: {}
      {{- end }}
      {{- include "rpi.cloudidentity.googleVolumes" . | nindent 6 }}
      {{- include "rpi.customCACerts.volume" . | nindent 6 }}
  {{- if and $vct.enabled (not $storage.existingClaim) }}
  volumeClaimTemplates:
    - metadata:
        name: {{ $name }}-data
      spec:
        accessModes:
          - {{ $vct.accessModes | default "ReadWriteOnce" }}
        {{- if $vct.storageClassName }}
        storageClassName: {{ $vct.storageClassName | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ $vct.storage | default "5Gi" | quote }}
  {{- end }}
{{- end }}
