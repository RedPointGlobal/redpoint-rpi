{{/*
  CSI Secrets Store — SecretProviderClass resources
  Generates SecretProviderClass CRDs for external secret providers
  (Azure Key Vault, AWS Secrets Manager, GCP Secret Manager, HashiCorp Vault).
  Rendered when provider is "csi" or when SecretProviderClasses are defined
  under any provider (e.g., sdk with Snowflake file mounts).
*/}}

{{- range ((.Values.secretsManagement.csi).secretProviderClasses | default list) }}
---
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ .name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" $ "name" .name "component" "secrets") | nindent 4 }}
spec:
  provider: {{ .provider }}
  {{- if or .parameters .objectsContent .objects }}
  parameters:
    {{- range $k, $v := .parameters }}
    {{ $k }}: {{ $v | quote }}
    {{- end }}
    {{- if .objectsContent }}
    objects: |
      {{- .objectsContent | nindent 6 }}
    {{- else if .objects }}
    objects: |
      array:
        {{- range .objects }}
        - |
          objectName: {{ .objectName | quote }}
          objectType: {{ .objectType | default "secret" }}
          {{- if .objectAlias }}
          objectAlias: {{ .objectAlias | quote }}
          {{- end }}
          {{- if .objectVersion }}
          objectVersion: {{ .objectVersion | quote }}
          {{- end }}
        {{- end }}
    {{- end }}
  {{- end }}
  {{- if .secretObjects }}
  secretObjects:
    {{- range .secretObjects }}
    - secretName: {{ .secretName }}
      type: {{ .type | default "Opaque" }}
      data:
        {{- range .data }}
        - objectName: {{ .objectName }}
          key: {{ .key }}
        {{- end }}
    {{- end }}
  {{- end }}
{{- end }}
