{{- $cfg := fromYaml (include "rpi.merged.queuereader" .) -}}
{{- $cfgExec := fromYaml (include "rpi.merged.executionservice" .) -}}
{{- $secCtx := fromYaml (include "rpi.merged.securityContext" .) -}}
{{- $liveness := fromYaml (include "rpi.merged.livenessProbe" .) -}}
{{- $readiness := fromYaml (include "rpi.merged.readinessProbe" .) -}}
{{- $startup := fromYaml (include "rpi.merged.startupProbe" .) -}}
{{- $topo := fromYaml (include "rpi.merged.topologySpreadConstraints" .) -}}
{{- $diag := fromYaml (include "rpi.merged.diagnosticsMode" .) -}}
{{- $execCfg := fromYaml (include "rpi.merged.executionservice" .) -}}
{{- $rtCfg := fromYaml (include "rpi.merged.realtimeapi" .) -}}
{{- $iaCfg := fromYaml (include "rpi.merged.interactionapi" .) -}}
{{- $name := "rpi-queuereader" -}}
{{- $dwEnabled := (include "redpoint.DatawarehouseProviders" .) | eq "true" -}}
{{- $dw := .Values.databases.datawarehouse | default dict -}}

{{- if $cfg.serviceAccount.enabled }}
{{- if $cfg.enabled }}
{{- if not .Values.cloudIdentity.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" $name "component" "api") | nindent 4 }}
  {{- $annotations := include "rpi.cloudidentity.saAnnotations" . }}
  {{- if $annotations }}
  annotations:
    {{- $annotations | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
{{- end }}

---
{{- if $cfg.podDisruptionBudget.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" $name "component" "worker") | nindent 4 }}
spec:
  maxUnavailable: {{ $cfg.podDisruptionBudget.maxUnavailable }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $name }}
{{- end }}


---
{{- if $cfg.enabled }}
{{- if eq $cfg.type "rollout" }}
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}-preview
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" $name "component" "worker") | nindent 4 }}
spec:
  ports:
  - name: http
    port: {{ $cfg.service.port }}
    protocol: TCP
    targetPort: 8080
  selector:
    app.kubernetes.io/name: {{ $name }}
{{- end }}
{{- end }}

---
{{- if $cfg.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" $name "component" "worker") | nindent 4 }}
spec:
  ports:
  - name: http
    port: {{ $cfg.service.port }}
    protocol: TCP
    targetPort: 8080
  selector:
    app.kubernetes.io/name: {{ $name }}

---
{{- if eq $cfg.type "rollout" }}
apiVersion: argoproj.io/v1alpha1
kind: Rollout
{{- end }}
{{- if eq $cfg.type "deployment" }}
apiVersion: apps/v1
kind: Deployment
{{- end }}
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" $name "component" "worker") | nindent 4 }}
    app.kubernetes.io/version: {{ .Values.global.deployment.images.tag | quote }}
    {{- with .Values.customLabels }}
    {{- toYaml . | nindent 4 }} 
    {{- end }}
  annotations:
    {{- with .Values.customAnnotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- if not $cfg.autoscaling.enabled }}
  replicas: {{ $cfg.replicas }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $name }}
  {{- if eq $cfg.type "rollout" }}
  strategy:
    blueGreen:
      activeService: {{ $name }}
      previewService: {{ $name }}-preview
      autoPromotionEnabled: {{ $cfg.rollout.autoPromotionEnabled }}
  revisionHistoryLimit: {{ $cfg.rollout.revisionHistoryLimit }}
  {{- end }}
  template:
    metadata:
      labels:
        {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" $name "component" "worker") | nindent 8 }}
        app.kubernetes.io/version: {{ .Values.global.deployment.images.tag | quote }}
        {{- with .Values.customLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with $cfg.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- include "rpi.cloudidentity.podLabels" . | nindent 8 }}
      annotations:
        {{- with .Values.customAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with $cfg.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- if $cfg.customMetrics.enabled }}
        prometheus.io/scrape: {{ $cfg.customMetrics.prometheus_scrape | quote }}
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
        {{- end }}
    spec:
      {{- if .Values.global.deployment.images.imagePullSecret.enabled }}
      imagePullSecrets:
      - name: {{ .Values.global.deployment.images.imagePullSecret.name }}
      {{- end }}
      terminationGracePeriodSeconds: {{ $cfg.terminationGracePeriodSeconds }}
      serviceAccountName: {{ include "rpi.serviceAccountName" (dict "root" . "name" $name) }}
      {{- if $secCtx.enabled }}
      securityContext:
        runAsUser: {{ $secCtx.runAsUser }}
        runAsGroup: {{ $secCtx.runAsGroup }}
        fsGroup: {{ $secCtx.fsGroup }}
        runAsNonRoot: {{ $secCtx.runAsNonRoot }}
        supplementalGroups:
          {{- with $secCtx.supplementalGroups }}
          {{- toYaml . | nindent 10 }}
          {{- end }}
      {{- end }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: {{ $name }}
                topologyKey: kubernetes.io/hostname
      {{- if $topo.enabled }}
      topologySpreadConstraints:
        - maxSkew: {{ $topo.maxSkew }}
          topologyKey: {{ $topo.topologyKey }}
          whenUnsatisfiable: {{ $topo.whenUnsatisfiable }}
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: {{ $name }}
      {{- end }}
      containers:
      - env:
        {{- if .Values.global.deployment.podTimezone }}
        - name: TZ
          value: {{ .Values.global.deployment.podTimezone | quote }}
        {{- end }}
        {{- if .Values.rebrandly.enabled }}
        - name: Plugins__Rebrandly__BaseUrl
          value: "http://rpi-rebrandly"
        {{- end }}
        - name: Plugins__LuxSci__SendRequestCount
          value: {{ $cfgExec.jobExecution.luxScisendRequestCount | quote }}
        {{- if .Values.OpenIdProviders.enabled }}
        {{- if eq .Values.OpenIdProviders.name "keycloak" }}
        - name: RPI__UserManagement__UseExternalUserManagement
          value: 'true'
        - name: RPI__UserManagement__Keycloak__Address
          value: "http://keycloak"
        - name: RPI__UserManagement__Keycloak__Realm
          value: redpoint-mercury
        - name: RPI__UserManagement__Keycloak__ClientId
          value: rpi-service
        - name: RPI__UserManagement__Keycloak__ClientSecret
          valueFrom:
            secretKeyRef:
              name: {{ include "rpi.secrets.secretName" . | quote }}
              key: CDP_Keycloak_Client_Secret
        {{- end }}
        {{- end }}
        - name: Logging__LogLevel__Default
          value: {{ $cfg.logging.default | quote }}
        - name: Logging__Database__LogLevel__Default
          value: {{ $cfg.logging.database | quote }}
        - name: Logging__Database__RPITrace
          value: {{ $cfg.logging.rpiTrace | quote }}
        - name: Logging__Database__RPIError
          value: {{ $cfg.logging.rpiError | quote }}
        - name: Logging__Console__LogLevel__Default
          value: {{ $cfg.logging.Console | quote }}
        - name: RPI__DateTimeSource
          value: {{ .Values.databases.operational.dateTimeSource | default "OperatingSystem" | quote }}
        - name: ODBCINI
          value: "/odbc-config/odbc.ini"
        {{- if $diag.copytoAzureBlob.enabled }}
        - name: RPI__Diagnostics__CopyToAzure__IsEnabled
          value: "true"
        - name: RPI__Diagnostics__CopyToAzure__StorageAccount
          value: {{ $diag.copytoAzureBlob.accountName | quote }}
        - name: RPI__Diagnostics__CopyToAzure__AccessKey
          valueFrom:
            secretKeyRef:
              name: {{ include "rpi.secrets.secretName" . | quote }}
              key: CopyToAzureBlobAccessKey
        - name: RPI__Diagnostics__CopyToAzure__ContainerName
          value: {{ $diag.copytoAzureBlob.containerName | quote }}
        - name: RPI__Diagnostics__CopyToAzure__BlobServiceEndpoint
          value: {{ $diag.copytoAzureBlob.blobServiceEndpoint | quote }}
        - name: RPI__Diagnostics__CopyToAzure__EnableCdn
          value: {{ $diag.copytoAzureBlob.enableCdn | quote }}
        - name: RPI__Diagnostics__CopyToAzure__AzureUseDataLakeStorageGen2
          value: {{ $diag.copytoAzureBlob.UseDataLakeStorageGen2 | quote }}
        {{- end }}
        {{- if $diag.copytoSftp.enabled }}
        - name: RPI__Diagnostics__CopyToSFTP__SecureFTPHost
          value: {{ $diag.copytoSftp.sftpHost | quote }}
        - name: RPI__Diagnostics__CopyToSFTP__SecureFTPUsername
          value: {{ $diag.copytoSftp.sftpUsername | quote }}
        - name: RPI__Diagnostics__CopyToSFTP__SecureFTPPassword
          valueFrom:
            secretKeyRef:
              name: {{ include "rpi.secrets.secretName" . | quote }}
              key: CopyToSFTPSecureFTPPassword
        - name: RPI__Diagnostics__CopyToSFTP__PortNumberNumber
          value: {{ $diag.copytoSftp.sftpPort | quote }}
        - name: RPI__Diagnostics__UseSFTP
          value: "true"
        - name: RPI__Diagnostics__CopyToSFTP__IsEnabled
          value: "true"
        {{- end }}
        {{- if $diag.dotNetTools.enabled }}
        - name: DOTNET_BUNDLE_EXTRACT_BASE_DIR
          value: {{ $diag.dotNetTools.extractionBaseDir | quote }} 
        - name: RPI__Diagnostics__UseDotNetTools__Path
          value: {{  $diag.dotNetTools.path  | quote }}
        - name: RPI__Diagnostics__UseDotNetTools__UseCounters
          value: {{ $diag.dotNetTools.useCounters | quote }}
        - name: RPI__Diagnostics__UseDotNetTools__CounterProviderList
          value: '["System.Runtime", "Microsoft.Extensions.Diagnostics.ResourceMonitoring"]'
        - name: RPI__Diagnostics__UseDotNetTools__UseGcDump
          value: {{ $diag.dotNetTools.useGcDump | quote }}
        {{- end }}
        {{- if not $rtCfg.multitenant }}
        - name: RealtimeAPIAddressOverride
          value: "http://rpi-realtimeapi"
        {{- end }}
        - name: RPI__ServiceHostName
          value: "http://rpi-interactionapi"
        - name: RPI__ServiceHostPortNumber
          value: {{ $iaCfg.service.port | quote }}
        {{- if eq .Values.databases.operational.provider "postgresql" }}
        - name: RPI_OperationalDatabaseType
          value: "PostgreSQL"
        {{- end }}
        {{- if eq .Values.global.deployment.platform "google" }}
        {{- if .Values.cloudIdentity.enabled }}
        - name: GOOGLE_APPLICATION_CREDENTIALS
          value: "{{ .Values.cloudIdentity.google.configMapFilePath }}/{{ .Values.cloudIdentity.google.keyName }}"
        {{- end }}
        {{- end }}
        {{- if eq .Values.global.deployment.platform "azure" }}
        {{- if $dwEnabled }}
        - name: GOOGLE_APPLICATION_CREDENTIALS
          value: "{{ .Values.cloudIdentity.google.configMapFilePath }}/{{ .Values.cloudIdentity.google.keyName }}"
        {{- end }}
        {{- end }}
        {{- include "rpi.secrets.sdk.envvars" . | nindent 8 }}
        {{- include "rpi.cloudidentity.envvars" . | nindent 8 }}
        {{- include "rpi.cloudidentity.awsAccessKeyEnvvars" . | nindent 8 }}
        {{- if .Values.storage.persistentVolumeClaims.FileOutputDirectory.enabled }}
        - name: RPI__FileOutput__Directory
          value: {{  .Values.storage.persistentVolumeClaims.FileOutputDirectory.mountPath | quote }}
        {{- end }}
        {{- if not (eq .Values.secretsManagement.provider "sdk") }}
        - name: CONNECTIONSTRINGS__LOGGINGDATABASE
          valueFrom:
            secretKeyRef:
              key: ConnectionString_Logging_Database
              name: {{ include "rpi.secrets.secretName" . | quote }}
        - name: CONNECTIONSTRINGS__OPERATIONALDATABASE
          valueFrom:
            secretKeyRef:
              key: ConnectionString_Operations_Database
              name: {{ include "rpi.secrets.secretName" . | quote }}
        {{- end }} 
        {{- if eq .Values.databases.operational.provider "postgresql" }}
        - name: RPI_OperationalDatabaseType
          value: "PostgreSQL"
        {{- end }}
        - name: QueueService__QueueListener__IsEnabled
          value: {{ $cfg.queueListenerEnabled | quote }}
        - name: QueueService__RealtimeConfiguration__IsCallbackServiceProcessingEnabled
          value: {{ $cfg.isCallbackServiceProcessingEnabled | quote }}
        - name: QueueService__QueueListener__QueuePath
          value: {{ $rtCfg.queueProvider.queueNames.listenerQueuePath | quote }}
        - name: QueueService__QueueListener__ThreadPoolSize
          value: {{ $cfg.threadPoolSize | quote }}
        - name: QueueService__QueueListener__TimeoutMinutes
          value: {{ $cfg.timeoutMinutes | quote }}
        - name: QueueService__QueueListener__MaxBatchSize
          value: {{ $cfg.maxBatchSize | quote }}
        - name: QueueService__QueueListener__UseMessageLocks
          value: {{ $cfg.useMessageLocks | quote }}
        - name: QueueService__RealtimeConfiguration__IsFormProcessingEnabled
          value: {{ $cfg.isFormProcessingEnabled | quote }}
        - name: QueueService__RealtimeConfiguration__IsEventProcessingEnabled
          value: {{ $cfg.isEventProcessingEnabled | quote }}
        - name: QueueService__RealtimeConfiguration__IsCacheProcessingEnabled
          value: {{ $cfg.isCacheProcessingEnabled | quote }}
        {{- range $index, $scope := $cfg.realtimeConfiguration.tenantIds }}
        - name: QueueService__RealtimeConfiguration__TenantIDs__{{ $index }}
          value: {{ $scope | quote }}
        {{- end }}
        - name: QueueService__QueueListener__NonActiveQueuePath
          value: {{ .Values.queuereader.nonActiveQueuePath | quote }}
        - name: QueueService__QueueListener__NonActiveTTLDays
          value: {{ $cfg.listenerQueueNonActiveTTLDays | quote}}
        - name: QueueService__QueueListener__ErrorQueuePath
          value: {{ .Values.queuereader.errorQueuePath | quote }}
        - name: QueueService__QueueListener__ErrorTTLDays
          value: {{ $cfg.listenerQueueErrorTTLDays | quote}}
        - name: QueueService__RealtimeConfiguration__IsDistributed
          value: {{ $cfg.realtimeConfiguration.isDistributed | quote }}
        - name: QueueService__SeedService__MemoryCacheSize
          value: {{ $cfg.seedService.memoryCacheSize | quote }}
        - name: QueueService__SeedService__MaxNumberRetries
          value: {{ $cfg.seedService.maxNumberRetries | quote }}
        - name: QueueService__SeedService__MaxRetryDelay
          value: {{ $cfg.seedService.maxRetryDelay | quote }}
        - name: QueueService__PartitionHandler__PartitionLockDuration
          value: {{ $cfg.partitionHandler.partitionLockDuration | quote }}
        - name: QueueService__PartitionHandler__OffsetPositionTTL
          value: {{ $cfg.partitionHandler.offsetPositionTTL | quote }}
        - name: QueueService__PartitionHandler__DeduplicationCacheTTL
          value: {{ $cfg.partitionHandler.deduplicationCacheTTL | quote }}
        {{- if $cfg.realtimeConfiguration.isDistributed }}
        - name: InternalCache__IsEnabled
          value: "true"
        - name: InternalCache__BackupToOpsDBInterval
          value: {{ $cfg.internalCache.backupToOpsDBInterval | quote }}
        - name: InternalCache__Provider
          value: "Redis"
        {{- end }}
        {{- if not (eq .Values.secretsManagement.provider "sdk") }}
        {{- if $cfg.realtimeConfiguration.isDistributed }}
        - name: InternalCache__RedisSettings__IPAddress
          valueFrom:
            secretKeyRef:
              name: {{ include "rpi.secrets.secretName" . | quote }}
              key: QueueService_internalCache_ConnectionString
        {{- end }}
        {{- end }}
        {{- if $cfg.realtimeConfiguration.isDistributed }}
        - name: InternalQueues__Enabled
          value: "true"
        - name: InternalQueues__HostName
          value: {{ $cfg.internalQueues.rabbitmqSettings.hostname | quote }}
        - name: InternalQueues__VirtualHost
          value: {{ $cfg.internalQueues.rabbitmqSettings.virtualhost | quote }}
        - name: InternalQueues__Username
          value: {{ $cfg.internalQueues.rabbitmqSettings.username | quote }}
        - name: InternalQueues__IsDurable
          value: "true"
        - name: InternalQueues__Port
          value: "5672"
        - name: QueueService__RealtimeConfiguration__DistributedQueue__Assembly
          value: "RedPoint.Resonance.RabbitMQAccess"
        - name: QueueService__RealtimeConfiguration__DistributedQueue__Type
          value: "RedPoint.Resonance.RabbitMQAccess.RabbitMQFactory"
        {{- end }}
        {{- if not (eq .Values.secretsManagement.provider "sdk") }}
        {{- if $cfg.realtimeConfiguration.isDistributed }}
        - name: InternalQueues__Password
          valueFrom:
            secretKeyRef:
              name: {{ include "rpi.secrets.secretName" . | quote }}
              key: QueueService_RabbitMQ_Password
        {{- end }}
        {{- end }}
        image: {{ .Values.global.deployment.images.repository }}/{{ $name }}:{{ .Values.global.deployment.images.tag }}
        imagePullPolicy: {{  .Values.global.deployment.images.imagePullPolicy | default "IfNotPresent" }}
        name: {{ $name }}
        {{- if $liveness.enabled }}
        livenessProbe:
          httpGet:
            path: {{ $liveness.httpGet.path }}
            port: {{ $liveness.httpGet.port }}
            scheme: {{ $liveness.httpGet.scheme }}
          initialDelaySeconds: {{ $liveness.initialDelaySeconds }}
          periodSeconds: {{ $liveness.periodSeconds }}
          timeoutSeconds: {{ $liveness.timeoutSeconds }}
          failureThreshold: {{ $liveness.failureThreshold }}
        {{- end }}
        {{- if $readiness.enabled }}
        readinessProbe:
          httpGet:
            path: {{ $readiness.httpGet.path }}
            port: {{ $readiness.httpGet.port }}
            scheme: {{ $readiness.httpGet.scheme }}
          initialDelaySeconds: {{ $readiness.initialDelaySeconds }}
          periodSeconds: {{ $readiness.periodSeconds }}
          failureThreshold: {{ $readiness.failureThreshold }}
          timeoutSeconds: {{ $readiness.timeoutSeconds }}
        {{- end }}
        {{- if $startup.enabled }}
        startupProbe:
          httpGet:
            path: {{ $startup.httpGet.path }}
            port: {{ $startup.httpGet.port }}
            scheme: {{ $startup.httpGet.scheme }}
          failureThreshold: {{ $startup.failureThreshold }}
          periodSeconds: {{ $startup.periodSeconds }}
          initialDelaySeconds: {{ $startup.initialDelaySeconds }}
          timeoutSeconds: {{ $startup.timeoutSeconds }}
        {{- end }}
        {{- if $dwEnabled }}
        lifecycle:
          postStart:
            exec:
              command:
                - /bin/sh
                - -c 
                - cat /app/odbc-config/odbc2.ini > /odbc-config/odbc.ini
        {{- end }}
        ports:
        - containerPort: 8080
          name: web-port
          protocol: TCP
        {{- if $secCtx.enabled }}
        securityContext:
          privileged: {{ $secCtx.privileged }}
          allowPrivilegeEscalation: {{ $secCtx.allowPrivilegeEscalation }}
          readOnlyRootFilesystem: {{ $secCtx.readOnlyRootFilesystem }}
          capabilities:
            drop:
            {{- range $secCtx.capabilities.drop }}
              - {{ . }}
            {{- end }}
        {{- end }}
        {{- if $cfg.resources.enabled }}
        resources:
          {{- if and $cfg.resources.limits (ne $cfg.resources.limits.enabled false) }}
          limits:
            {{- with $cfg.resources.limits.cpu }}
            cpu: {{ . }}
            {{- end }}
            {{- with $cfg.resources.limits.memory }}
            memory: {{ . }}
            {{- end }}
          {{- end }}
          {{- if and $cfg.resources.requests (ne $cfg.resources.requests.enabled false) }}
          requests:
            {{- with $cfg.resources.requests.cpu }}
            cpu: {{ . }}
            {{- end }}
            {{- with $cfg.resources.requests.memory }}
            memory: {{ . }}
            {{- end }}
        {{- end }}
        {{- end }}
        volumeMounts:
          - name: tempstore
            mountPath: /tmp
          {{- if $dwEnabled }}
          - name: odbc-config
            mountPath: /app/odbc-config/odbc2.ini
            subPath: odbc2.ini
          - name: odbcini
            mountPath: /odbc-config
          {{- end }}
          {{- if (($dw.bigquery | default dict).enabled | default false) }}
          {{- range .Values.databases.datawarehouse.bigquery.connections }}
          {{- if eq .credentialsType "serviceAccount" }}
          - name: {{ .configMapName | quote }}
            mountPath: {{ .ConfigMapFilePath }}/{{ .keyName }}
            subPath: {{ .keyName }}
            readOnly: true
          {{- end }}
          {{- end }}
          {{- end }}
          {{- if (($dw.snowflake | default dict).enabled | default false) }}
          {{- if eq .Values.databases.datawarehouse.snowflake.credentialsType "snowflake_jwt" }}
          - name: {{ .Values.databases.datawarehouse.snowflake.ConfigMapName }}
            mountPath: "{{ .Values.databases.datawarehouse.snowflake.ConfigMapFilePath }}/{{ .Values.databases.datawarehouse.snowflake.keyName }}"
            subPath: {{ .Values.databases.datawarehouse.snowflake.keyName }}
          {{- end }}
          {{- end }}
          {{- if .Values.storage.persistentVolumeClaims.FileOutputDirectory.enabled }}    
          - name: fileoutputdirectory
            mountPath: {{  .Values.storage.persistentVolumeClaims.FileOutputDirectory.mountPath | quote }}
          {{- end }}
          {{- if .Values.storage.persistentVolumeClaims.Plugins.enabled }}  
          - name: realtimeplugins
            mountPath: {{ .Values.storage.persistentVolumeClaims.Plugins.mountPath }}
          {{- end }}
          {{- if .Values.storage.persistentVolumeClaims.DataManagementUploadDirectory.enabled }} 
          - name: rpdmuploaddirectory
            mountPath: {{ .Values.storage.persistentVolumeClaims.DataManagementUploadDirectory.mountPath }}
          {{- end }}
      volumes:
        - name: tempstore
          emptyDir: {}
        {{- if $dwEnabled }}
        - name: odbc-config
          configMap:
            name: odbc-config
            defaultMode: 0777
        - name: odbcini
          emptyDir: {}
        {{- end }}
        {{- if (($dw.bigquery | default dict).enabled | default false) }}
        {{- range .Values.databases.datawarehouse.bigquery.connections }}
        {{- if eq .credentialsType "serviceAccount" }}
        - name: {{ .configMapName | quote }}
          configMap:
            name: {{ .configMapName | quote }}
        {{- end }}
        {{- end }}
        {{- end }}
        {{- if (($dw.snowflake | default dict).enabled | default false) }}
        {{- if eq .Values.databases.datawarehouse.snowflake.credentialsType "snowflake_jwt" }}
        - name: {{ .Values.databases.datawarehouse.snowflake.ConfigMapName }}
          configMap:
            name: {{ .Values.databases.datawarehouse.snowflake.ConfigMapName }}
        {{- end }}
        {{- end }}
        {{- if .Values.storage.persistentVolumeClaims.FileOutputDirectory.enabled }}
        - name: fileoutputdirectory
          persistentVolumeClaim:
            claimName: {{ .Values.storage.persistentVolumeClaims.FileOutputDirectory.claimName }}
        {{- end }}
        {{- if .Values.storage.persistentVolumeClaims.Plugins.enabled }}
        - name: realtimeplugins
          persistentVolumeClaim:
            claimName: {{ .Values.storage.persistentVolumeClaims.Plugins.claimName }}
        {{- end }}
        {{- if .Values.storage.persistentVolumeClaims.DataManagementUploadDirectory.enabled }}
        - name: rpdmuploaddirectory
          persistentVolumeClaim:
            claimName: {{ .Values.storage.persistentVolumeClaims.DataManagementUploadDirectory.claimName }}
        {{- end }}
      {{- if .Values.nodeSelector.enabled }}
      nodeSelector:
        {{ .Values.nodeSelector.key }}: {{ .Values.nodeSelector.value }}
      {{- end }}
      {{- if .Values.tolerations.enabled }}
      tolerations:
        - effect: NoSchedule
          key: {{ .Values.nodeSelector.key }}
          operator: Equal
          value: {{ .Values.nodeSelector.value }}
      {{- end }}
{{- end }}

