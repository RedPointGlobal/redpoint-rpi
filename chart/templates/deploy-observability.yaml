
{{- $cfg := .Values.observability | default dict -}}
{{- if $cfg.enabled -}}

{{/*
  ----------------------------------------------------------------------
  Chart-render contract assertions for RPI Observability.

  These execute at `helm template` / `helm install` / `helm upgrade`
  time. They reject deployment configurations that the v1 architecture
  does not support, with an explicit error instead of a silently broken
  install. The principle: absence (or contradiction) of configuration
  is an error condition, not an alternate operating mode.
  ----------------------------------------------------------------------
*/}}

{{- /* F-H01: single-instance deployment contract.
       The component owns local SQLite + in-process scheduler/cache; it
       cannot be safely scaled. Reject any explicit replicas override. */ -}}
{{- if hasKey $cfg "replicas" -}}
{{- fail "observability.replicas is not configurable; v1 RPI Observability is single-instance by design (local SQLite, in-process scheduler, in-process auth cache). Multi-replica is a v2 concern." -}}
{{- end -}}

{{- /* F-H03: chart/app contract for AI provider.
       model.provider=localLlm runs against the in-cluster Ollama
       deployment; the deployment is gated by localLlm.enabled. The two
       knobs must agree. */ -}}
{{- $modelProvider := ($cfg.model | default dict).provider | default "helmAssistant" -}}
{{- $localLlmEnabled := ($cfg.localLlm | default dict).enabled | default false -}}
{{- if and (eq $modelProvider "localLlm") (not $localLlmEnabled) -}}
{{- fail "model.provider=localLlm requires observability.localLlm.enabled=true (the in-cluster Ollama deployment must be rendered for the application to reach it)." -}}
{{- end -}}

{{- /* F-N07: native auth authorization host must be derivable.
       When auth.mode=native, the chart synthesizes
       Authentication__RPIAuthentication__AuthorizationHost from
       ingress.hosts.client + ingress.domain unless explicitly
       overridden. If neither is set, the synthesized URL is "https://"
       (broken). Require one or the other when native mode is on.
       Single-provider model: auth.mode is the only switch. */ -}}
{{- $authCfg := $cfg.auth | default dict -}}
{{- $authMode := $authCfg.mode | default "public" -}}
{{- if eq $authMode "native" -}}
{{- $nativeCfg := $authCfg.native | default dict -}}
{{- $ingForCheck := fromYaml (include "rpi.merged.ingress" .) -}}
{{- if and (not $nativeCfg.authorizationHost) (not (($ingForCheck.hosts | default dict).client)) -}}
{{- fail "auth.mode=native requires either auth.native.authorizationHost OR ingress.hosts.client (used to auto-derive Authentication__RPIAuthentication__AuthorizationHost). Both are unset." -}}
{{- end -}}
{{- end -}}

{{- $name := "rpi-observability" -}}
{{- $service := $cfg.service | default dict -}}
{{- $resources := $cfg.resources | default dict -}}
{{- $storage := $cfg.storage | default dict -}}
{{- $vct := $storage.volumeClaimTemplates | default dict -}}
{{- $secCtx := fromYaml (include "rpi.merged.securityContext" .) -}}
{{- /* Diagnostics tab mounts the chart-managed FileOutputDirectory PVC
       read-only when both the analyzer's own toggle AND the chart's
       FileOutputDirectory PVC are enabled. The analyzer toggle alone
       cannot create a missing PVC; this gate prevents schedule failures
       on customers without the FileOutputDirectory storage configured. */ -}}
{{- $fileOutPvc := (.Values.storage.persistentVolumeClaims | default dict).FileOutputDirectory | default dict -}}
{{- $diagFileOut := (($cfg.diagnostics | default dict).fileOutput | default dict) -}}
{{- $mountFileOut := and $diagFileOut.enabled $fileOutPvc.enabled -}}

{{- include "rpi.block.serviceAccount" (dict "root" . "name" $name "component" "observability" "cfg" $cfg) }}

---
# Read-only K8s API access for the analyzer's pod-health and event
# collectors. Namespace-scoped.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" $name "component" "observability") | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  # metrics-server. Optional; if absent, CPU/memory columns show "-".
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" $name "component" "observability") | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $name }}
subjects:
  - kind: ServiceAccount
    name: {{ include "rpi.serviceAccountName" (dict "root" . "name" $name "cfg" $cfg) }}
    namespace: {{ .Release.Namespace }}

{{- if (($cfg.nodeHealth | default dict).enabled | default false) }}
---
# Cluster-scoped read-only access for the Node health panel. Nodes are
# cluster-scoped resources, so a Role/RoleBinding cannot grant access.
# Names are namespace-suffixed so multiple analyzer installs in the same
# cluster don't collide on the cluster-scoped binding.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ $name }}-nodes-{{ .Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" $name "component" "observability") | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
  # metrics-server. Optional; if absent, CPU/memory columns show "-".
  - apiGroups: ["metrics.k8s.io"]
    resources: ["nodes"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ $name }}-nodes-{{ .Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" $name "component" "observability") | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ $name }}-nodes-{{ .Release.Namespace }}
subjects:
  - kind: ServiceAccount
    name: {{ include "rpi.serviceAccountName" (dict "root" . "name" $name "cfg" $cfg) }}
    namespace: {{ .Release.Namespace }}
{{- end }}

---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" $name "component" "observability") | nindent 4 }}
  {{- $svcAnnotations := include "rpi.mergedAnnotations" (dict "root" . "type" "service") | trim }}
  {{- if $svcAnnotations }}
  annotations:
    {{- $svcAnnotations | nindent 4 }}
  {{- end }}
spec:
  ports:
  - name: http
    port: {{ $service.port | default 80 }}
    protocol: TCP
    targetPort: ui
  selector:
    app.kubernetes.io/name: {{ $name }}

{{- if (.Values.observability.auth | default dict).enabled }}
---
# Sibling Service exposing FastAPI directly. Used by the ingress to
# route /auth/* to the auth router without going through Streamlit.
# Created only when auth is enabled.
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" (printf "%s-api" $name) "component" "observability-api") | nindent 4 }}
spec:
  ports:
  - name: http
    port: {{ $service.apiPort | default 8080 }}
    protocol: TCP
    targetPort: api
  selector:
    app.kubernetes.io/name: {{ $name }}
{{- end }}

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" $name "component" "observability") | nindent 4 }}
spec:
  serviceName: {{ $name }}
  replicas: 1
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Retain
    whenScaled: Retain
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $name }}
  template:
    metadata:
      labels:
        {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" $name "component" "observability") | nindent 8 }}
        {{- with (include "rpi.cloudidentity.podLabels" (dict "root" . "svcCloudIdentity" (hasKey $cfg "cloudIdentity" | ternary $cfg.cloudIdentity false)) | trim) }}{{- . | nindent 8 }}{{- end }}
      {{- $podAnnotations := include "rpi.mergedAnnotations" (dict "root" . "type" "pod") | trim }}
      {{- if $podAnnotations }}
      annotations:
        {{- $podAnnotations | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "rpi.serviceAccountName" (dict "root" . "name" $name "cfg" $cfg) }}
      {{- if .Values.global.deployment.images.imagePullSecret.enabled }}
      imagePullSecrets:
        - name: {{ .Values.global.deployment.images.imagePullSecret.name }}
      {{- end }}
#      securityContext:
#        fsGroup: 7777
#        fsGroupChangePolicy: OnRootMismatch
#        {{- with $secCtx.pod }}
#        {{- toYaml . | nindent 8 }}
#       {{- end }}
      containers:
      - name: {{ $name }}
        image: {{ include "rpi.image" (dict "root" . "name" "rpi-observability") }}
        imagePullPolicy: {{ .Values.global.deployment.images.imagePullPolicy | default "IfNotPresent" }}
        ports:
        - name: ui
          containerPort: {{ $service.uiPort | default 8501 }}
          protocol: TCP
        - name: api
          containerPort: {{ $service.apiPort | default 8080 }}
          protocol: TCP
        env:
        # Downward-API: lets the K8s events collector know which
        # namespace to scope its event/pod queries to.
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        {{- include "rpi.observability.modelEnvvars" . | nindent 8 }}
        {{- include "rpi.observability.runtimeEnvvars" . | nindent 8 }}
        {{- include "rpi.observability.authEnvvars" . | nindent 8 }}
        # Same SDK + cloudIdentity envvar wiring the deploymentapi (and the
        # rest of the RPI services) use. The analyzer reads KeyVault__Provider
        # to know which cloud vault to talk to in SDK mode -- same shape as
        # the .NET services, no analyzer-specific knobs.
        {{- with (include "rpi.secrets.sdk.envvars" . | trim) }}{{- . | nindent 8 }}{{- end }}
        {{- with (include "rpi.cloudidentity.envvars" . | trim) }}{{- . | nindent 8 }}{{- end }}
        {{- with (include "rpi.cloudidentity.awsAccessKeyEnvvars" . | trim) }}{{- . | nindent 8 }}{{- end }}
        {{- include "rpi.customCACerts.envVar" . | nindent 8 }}
        {{- with $resources }}
        resources:
          {{- toYaml . | nindent 10 }}
        {{- end }}
#        {{- with $secCtx.container }}
#        securityContext:
#          {{- toYaml . | nindent 10 }}
#        {{- end }}
        # Probes hit the FastAPI side. Streamlit is consumer-facing only.
        # Generous thresholds because a local-LLM analysis cycle blocks
        # the event loop for 30-90s on CPU, and the eager first-cycle
        # runs during lifespan startup -- without this headroom kubelet
        # SIGKILLs the pod before uvicorn opens the port.
        readinessProbe:
          httpGet:
            path: /health/ready
            port: api
          initialDelaySeconds: 10
          periodSeconds: 15
          failureThreshold: 30          # ~7.5 min before NotReady
        livenessProbe:
          httpGet:
            path: /health/live
            port: api
          initialDelaySeconds: 60
          periodSeconds: 30
          failureThreshold: 10          # ~6 min before SIGKILL
        volumeMounts:
        - name: {{ $name }}-data
          mountPath: /data
        {{- if $mountFileOut }}
        # Mount path inside the analyzer container is fixed; it does not
        # need to track FileOutputDirectory.mountPath (different filesystem
        # namespace from the .NET service pods).
        - name: fileoutputdirectory
          mountPath: /rpifileoutputdir
          readOnly: false
        {{- end }}
        {{- include "rpi.cloudidentity.googleVolumeMounts" . | nindent 8 }}
        {{- include "rpi.customCACerts.volumeMount" . | nindent 8 }}
      volumes:
      {{- if $storage.existingClaim }}
      - name: {{ $name }}-data
        persistentVolumeClaim:
          claimName: {{ $storage.existingClaim | quote }}
      {{- else if not $vct.enabled }}
      - name: {{ $name }}-data
        emptyDir: {}
      {{- end }}
      {{- if $mountFileOut }}
      - name: fileoutputdirectory
        persistentVolumeClaim:
          claimName: {{ $fileOutPvc.claimName | quote }}
          readOnly: false
      {{- end }}
      {{- include "rpi.cloudidentity.googleVolumes" . | nindent 6 }}
      {{- include "rpi.customCACerts.volume" . | nindent 6 }}
      {{- if .Values.nodeSelector.enabled }}
      nodeSelector:
        {{ .Values.nodeSelector.key }}: {{ .Values.nodeSelector.value }}
      {{- end }}
      {{- if .Values.tolerations.enabled }}
      tolerations:
        - effect: NoSchedule
          key: {{ .Values.nodeSelector.key }}
          operator: Equal
          value: {{ .Values.nodeSelector.value }}
      {{- end }}
  {{- if and $vct.enabled (not $storage.existingClaim) }}
  volumeClaimTemplates:
    - metadata:
        name: {{ $name }}-data
      spec:
        accessModes:
          - {{ $vct.accessModes | default "ReadWriteOnce" }}
        {{- if $vct.storageClassName }}
        storageClassName: {{ $vct.storageClassName | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ $vct.storage | default "5Gi" | quote }}
  {{- end }}
{{- end }}
