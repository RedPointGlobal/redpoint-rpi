{{/*
  Persistent Volumes — PV + PVC pair creation
  Creates PersistentVolume and PersistentVolumeClaim resources for CSI-backed storage
  (Azure Blob, Azure File, AWS EFS, GCP Filestore, etc.).
  Configured via: storage.persistentVolumes[]
*/}}
{{- range .Values.storage.persistentVolumes }}
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: {{ .name }}
  {{- if .annotations }}
  annotations:
    {{- toYaml .annotations | nindent 4 }}
  {{- end }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" $ "name" .name "component" "storage") | nindent 4 }}
spec:
  capacity:
    storage: {{ .capacity }}
  accessModes:
    {{- toYaml .accessModes | nindent 4 }}
  persistentVolumeReclaimPolicy: {{ .reclaimPolicy | default "Retain" }}
  {{- if .storageClassName }}
  storageClassName: {{ .storageClassName | quote }}
  {{- end }}
  {{- if .mountOptions }}
  mountOptions:
    {{- toYaml .mountOptions | nindent 4 }}
  {{- end }}
  csi:
    driver: {{ .csi.driver }}
    volumeHandle: {{ .csi.volumeHandle }}
    {{- if .csi.readOnly }}
    readOnly: {{ .csi.readOnly }}
    {{- end }}
    {{- if .csi.volumeAttributes }}
    volumeAttributes:
      {{- toYaml .csi.volumeAttributes | nindent 6 }}
    {{- end }}
    {{- if .csi.nodeStageSecretRef }}
    {{- if .csi.nodeStageSecretRef.name }}
    nodeStageSecretRef:
      name: {{ .csi.nodeStageSecretRef.name }}
      namespace: {{ .csi.nodeStageSecretRef.namespace | default $.Release.Namespace }}
    {{- end }}
    {{- end }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .pvc.claimName }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" $ "name" .pvc.claimName "component" "storage") | nindent 4 }}
spec:
  accessModes:
    {{- if .pvc.accessModes }}
    {{- toYaml .pvc.accessModes | nindent 4 }}
    {{- else }}
    {{- toYaml .accessModes | nindent 4 }}
    {{- end }}
  {{- if or .pvc.storageClassName .storageClassName }}
  storageClassName: {{ (.pvc.storageClassName | default .storageClassName) | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .pvc.capacity | default .capacity }}
  volumeName: {{ .name }}
{{- end }}
