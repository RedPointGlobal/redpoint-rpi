{{/*
  Service Mesh Integration
  Generates Server CRDs for Linkerd (or other supported mesh providers).
  Each Server is optionally paired with an AuthorizationPolicy and
  NetworkAuthentication to allow unmeshed (ingress) traffic.
  Controlled per server via allowUnauthenticated (default: true).
  Custom network CIDRs can be set via networks (default: all).
  Enabled via: serviceMesh.enabled: true
*/}}
{{- if .Values.serviceMesh.enabled }}
{{- if eq .Values.serviceMesh.provider "linkerd" }}
{{- range .Values.serviceMesh.servers }}
---
apiVersion: policy.linkerd.io/v1beta3
kind: Server
metadata:
  name: {{ .name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" $ "name" .name "component" "service-mesh") | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- toYaml .podSelector | nindent 6 }}
  port: {{ .port | default 8080 }}
  proxyProtocol: {{ .proxyProtocol | default "HTTP/1" }}
{{- if ne (.allowUnauthenticated | toString) "false" }}
---
apiVersion: policy.linkerd.io/v1alpha1
kind: AuthorizationPolicy
metadata:
  name: {{ .name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" $ "name" .name "component" "service-mesh") | nindent 4 }}
spec:
  targetRef:
    group: policy.linkerd.io
    kind: Server
    name: {{ .name }}
  requiredAuthenticationRefs:
  - name: {{ .name }}
    kind: NetworkAuthentication
    group: policy.linkerd.io
---
apiVersion: policy.linkerd.io/v1alpha1
kind: NetworkAuthentication
metadata:
  name: {{ .name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" $ "name" .name "component" "service-mesh") | nindent 4 }}
spec:
  networks:
  {{- if .networks }}
  {{- toYaml .networks | nindent 2 }}
  {{- else }}
  - cidr: 0.0.0.0/0
  - cidr: ::/0
  {{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
