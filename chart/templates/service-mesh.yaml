{{/*
  Service Mesh Integration
  Generates Server CRDs for Linkerd (or other supported mesh providers).
  Enabled via: serviceMesh.enabled: true
*/}}
{{- if .Values.serviceMesh.enabled }}
{{- if eq .Values.serviceMesh.provider "linkerd" }}
{{- range .Values.serviceMesh.servers }}
---
apiVersion: policy.linkerd.io/v1beta3
kind: Server
metadata:
  name: {{ $.Release.Namespace }}-{{ .name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" $ "name" .name "component" "service-mesh") | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- toYaml .podSelector | nindent 6 }}
  port: {{ .port | default 8080 }}
  proxyProtocol: {{ .proxyProtocol | default "HTTP/1" }}
{{- end }}
{{- end }}
{{- end }}
