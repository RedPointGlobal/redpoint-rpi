          valueFrom:
            secretKeyRef:
              name: {{ $.Values.cloudIdentity.secretsManagement.secretName | quote }}
              key: RealtimeAPI_QueueSettings_AccessKey
        {{- end }}
        {{- end }}
        {{- if eq $rtCfg.queueProvider.provider "amazonmsk" }}
        - name: CallbackServiceConfig__QueueProvider__CallbackServiceQueueSettings__Settings__2__Key
          value: "SecretKey"
        {{- end }}
        {{- if eq $rtCfg.queueProvider.provider "amazonmsk" }}
        {{- if eq $.Values.cloudIdentity.secretsManagement.secretsProvider "kubernetes" }}
        - name: CallbackServiceConfig__QueueProvider__CallbackServiceQueueSettings__Settings__2__Value
          valueFrom:
            secretKeyRef:
              name: {{ $.Values.cloudIdentity.secretsManagement.secretName | quote }}
              key: RealtimeAPI_QueueSettings_SecretKey
        {{- end }}
        {{- end }}
        {{- if eq $rtCfg.queueProvider.provider "amazonmsk" }}
        - name: CallbackServiceConfig__QueueProvider__CallbackServiceQueueSettings__Settings__3__Key
          value: "RegionEndpoint"
        - name: CallbackServiceConfig__QueueProvider__CallbackServiceQueueSettings__Settings__3__Value
          value: {{ $.Values.cloudIdentity.amazonSettings.region | quote }}
        - name: CallbackServiceConfig__QueueProvider__CallbackServiceQueueSettings__Settings__4__Key
          value: "Acks"
        - name: CallbackServiceConfig__QueueProvider__CallbackServiceQueueSettings__Settings__4__Value
          value: {{ $rtCfg.queueProvider.amazonmsk.Acks | quote }}
        - name: CallbackServiceConfig__QueueProvider__CallbackServiceQueueSettings__Settings__5__Key
          value: "CompressionType"
        - name: CallbackServiceConfig__QueueProvider__CallbackServiceQueueSettings__Settings__5__Value
          value: {{ $rtCfg.queueProvider.amazonmsk.CompressionType | quote }}
        - name: CallbackServiceConfig__QueueProvider__CallbackServiceQueueSettings__Settings__6__Key
          value: "MaxRetryAttempt"
        - name: CallbackServiceConfig__QueueProvider__CallbackServiceQueueSettings__Settings__6__Value
          value: {{ $rtCfg.queueProvider.amazonmsk.MaxRetryAttempt | quote }}
        - name: CallbackServiceConfig__QueueProvider__CallbackServiceQueueSettings__Settings__7__Key
          value: "BatchSize"
        - name: CallbackServiceConfig__QueueProvider__CallbackServiceQueueSettings__Settings__7__Value
          value: {{ $rtCfg.queueProvider.amazonmsk.BatchSize | quote }}
        - name: CallbackServiceConfig__QueueProvider__CallbackServiceQueueSettings__Settings__8__Key
          value: "LingerTime"
        - name: CallbackServiceConfig__QueueProvider__CallbackServiceQueueSettings__Settings__8__Value
          value: {{ $rtCfg.queueProvider.amazonmsk.LingerTime | quote }}
        - name: CallbackServiceConfig__QueueProvider__CallbackServiceQueueSettings__Settings__9__Key
          value: "UseAwsMsk"
        - name: CallbackServiceConfig__QueueProvider__CallbackServiceQueueSettings__Settings__9__Value
          value: {{ $rtCfg.queueProvider.amazonmsk.UseAwsMsk | quote }}
        {{- end }}
        image: {{ $.Values.global.deployment.images.callbackapi }}:{{ $.Values.global.deployment.images.tag }}
        imagePullPolicy: {{  $.Values.global.deployment.images.imagePullPolicy | default "IfNotPresent" }}
        name: callbackapi
        {{- if $liveness.enabled }}
        livenessProbe:
          httpGet:
            path: {{ $liveness.httpGet.path }}
            port: {{ $liveness.httpGet.port }}
            scheme: {{ $liveness.httpGet.scheme }}
          initialDelaySeconds: {{ $liveness.initialDelaySeconds }}
          periodSeconds: {{ $liveness.periodSeconds }}
          timeoutSeconds: {{ $liveness.timeoutSeconds }}
          failureThreshold: {{ $liveness.failureThreshold }}
        {{- end }}
        {{- if $readiness.enabled }}
        readinessProbe:
          httpGet:
            path: {{ $liveness.httpGet.path }}
            port: {{ $liveness.httpGet.port }}
            scheme: {{ $liveness.httpGet.scheme }}
          initialDelaySeconds: {{ $readiness.initialDelaySeconds }}
          periodSeconds: {{ $readiness.periodSeconds }}
          failureThreshold: {{ $readiness.failureThreshold }}
          timeoutSeconds: {{ $readiness.timeoutSeconds }}
        {{- end }}
        {{- if $startup.enabled }}
        startupProbe:
          httpGet:
            path: {{ $liveness.httpGet.path }}
            port: {{ $liveness.httpGet.port }}
            scheme: {{ $liveness.httpGet.scheme }}
          failureThreshold: {{ $startup.failureThreshold }}
          periodSeconds: {{ $startup.periodSeconds }}
          initialDelaySeconds: {{ $startup.initialDelaySeconds }}
          timeoutSeconds: {{ $startup.timeoutSeconds }}
        {{- end }}
        ports:
        - name: http
          containerPort: 8080
        {{- if $secCtx.enabled }}
        securityContext:
          privileged: {{ $secCtx.privileged }}
          allowPrivilegeEscalation: {{ $secCtx.allowPrivilegeEscalation }}
          readOnlyRootFilesystem: {{ $secCtx.readOnlyRootFilesystem }}
          capabilities:
            drop:
            {{- range $secCtx.capabilities.drop }}
              - {{ . }}
            {{- end }}
        {{- end }}
        {{- if $cfg.resources.enabled }}
        resources:
          {{- if $cfg.resources.limits }}
          limits:
            {{- if $cfg.resources.limits.cpu }}
            cpu: {{ $cfg.resources.limits.cpu }}
            {{- end }}
            {{- if $cfg.resources.limits.memory }}
            memory: {{ $cfg.resources.limits.memory }}
            {{- end }}
          {{- end }}
          {{- if $cfg.resources.requests }}
          requests:
            {{- if $cfg.resources.requests.cpu }}
            cpu: {{ $cfg.resources.requests.cpu }}
            {{- end }}
            {{- if $cfg.resources.requests.memory }}
            memory: {{ $cfg.resources.requests.memory }}
            {{- end }}
          {{- end }}
        {{- end }}
        volumeMounts:
          {{- if $.Values.cloudIdentity.enabled }}
          {{- if eq $.Values.cloudIdentity.provider "Google" }}
          - name: {{ $.Values.cloudIdentity.googleSettings.configMapName }}
            mountPath: "/app/google-creds/{{ $.Values.cloudIdentity.googleSettings.configMapName }}.json"
            subPath: "{{ $.Values.cloudIdentity.googleSettings.configMapName }}.json"
          {{- end }}
          {{- end }}
      volumes:
      {{- if $.Values.cloudIdentity.enabled }}
      {{- if eq $.Values.cloudIdentity.provider "Google" }}
        - name: {{ $.Values.cloudIdentity.googleSettings.configMapName | quote }}
          configMap:
            name: {{ $.Values.cloudIdentity.googleSettings.configMapName | quote }}
      {{- end }}
      {{- end }}   
      {{- if $.Values.nodeSelector.enabled }}
      nodeSelector:
        {{ $.Values.nodeSelector.key }}: {{ $.Values.nodeSelector.value }}
      {{- end }}
      {{- if $.Values.tolerations.enabled }}
      tolerations:
        - effect: NoSchedule
          key: {{ $.Values.nodeSelector.key }}
          operator: Equal
          value: {{ $.Values.nodeSelector.value }}
      {{- end }}
{{- end }}
{{- end }}
{{- end }}

---
{{- if $cfg.autoscaling.enabled }}
{{- if $cfg.multitenancy.enabled }}
{{- if $cfg.enabled }}
{{- if eq $cfg.autoscaling.type "hpa" }}
{{- range $instance := $cfg.instances }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ $name }}-{{ $instance.name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    app: {{ $name }}-{{ $instance.name }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ $name }}-{{ $instance.name }}
  minReplicas: {{ $cfg.autoscaling.minReplicas }}
  maxReplicas: {{ $cfg.autoscaling.maxReplicas }}
  metrics:
    {{- if $cfg.autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ $cfg.autoscaling.targetCPUUtilizationPercentage }}
    {{- end }}
    {{- if $cfg.autoscaling.targetMemoryUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ $cfg.autoscaling.targetMemoryUtilizationPercentage }}
    {{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}