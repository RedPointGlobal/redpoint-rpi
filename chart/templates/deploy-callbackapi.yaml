      {{- if eq $.Values.cloudIdentity.enabled }}
        - name: {{ $.Values.cloudIdentity.google.configMapName | quote }}
          configMap:
            name: {{ $.Values.cloudIdentity.google.configMapName | quote }}
      {{- end }}
      {{- end }}
      {{- if eq $.Values.global.deployment.platform "azure"}}
      {{- if $dwEnabled }}
        - name: {{ $.Values.cloudIdentity.google.configMapName | quote }}
          configMap:
            name: {{ $.Values.cloudIdentity.google.configMapName | quote }}
