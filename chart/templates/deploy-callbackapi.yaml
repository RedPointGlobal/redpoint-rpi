{{- $cfg := fromYaml (include "rpi.merged.callbackapi" .) -}}
{{- $secCtx := fromYaml (include "rpi.merged.securityContext" .) -}}
{{- $liveness := fromYaml (include "rpi.merged.livenessProbe" .) -}}
{{- $readiness := fromYaml (include "rpi.merged.readinessProbe" .) -}}
{{- $startup := fromYaml (include "rpi.merged.startupProbe" .) -}}
{{- $topo := fromYaml (include "rpi.merged.topologySpreadConstraints" .) -}}
{{- $diag := fromYaml (include "rpi.merged.diagnosticsMode" .) -}}
{{- $rtCfg := fromYaml (include "rpi.merged.realtimeapi" .) -}}
{{- $name := "rpi-callbackapi" -}}

{{- if $cfg.serviceAccount.enabled }}
{{- if $cfg.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" $name "component" "api") | nindent 4 }}
  {{- if eq .Values.global.deployment.platform "azure" }}
  {{- if .Values.cloudIdentity.enabled }}
  {{- if eq .Values.cloudIdentity.azureSettings.credentialsType "workloadIdentity" }}
  annotations:
    azure.workload.identity/client-id: {{ .Values.cloudIdentity.azureSettings.managedIdentityClientId | quote }}
  {{- end }}
  {{- end }}
  {{- end }}
  {{- if eq .Values.global.deployment.platform "google" }}
  {{- if .Values.cloudIdentity.enabled }}
  {{- if eq .Values.cloudIdentity.googleSettings.credentialsType "workloadIdentity" }}
  annotations:
    iam.gke.io/gcp-service-account: {{ .Values.cloudIdentity.googleSettings.serviceAccountEmail | quote }}
  {{- end }}
  {{- end }}
  {{- end }}
  {{- if eq .Values.global.deployment.platform "amazon" }}
  {{- if eq .Values.cloudIdentity.amazonSettings.credentialsType "iamRole" }}
  annotations:
    eks.amazonaws.com/role-arn: {{ .Values.cloudIdentity.amazonSettings.roleArn | quote }}
  {{- end }}
  {{- end }}
{{- end }}
{{- end }}

---
{{- if $cfg.podDisruptionBudget.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" $name "component" "api") | nindent 4 }}
spec:
  maxUnavailable: {{ $cfg.podDisruptionBudget.maxUnavailable }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $name }}
{{- end }}

---
{{- if $cfg.enabled }}
{{- if eq $cfg.type "rollout" }}
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}-preview
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" $name "component" "api") | nindent 4 }}
spec:
  ports:
  - name: http
    port: {{ $cfg.service.port }}
    protocol: TCP
    targetPort: 8080
  selector:
    app.kubernetes.io/name: {{ $name }}
{{- end }}
{{- end }}
   
---
{{- if $cfg.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" $name "component" "api") | nindent 4 }}
spec:
  ports:
  - name: http
    port: {{ $cfg.service.port }}
    protocol: TCP
    targetPort: 8080
  selector:
    app.kubernetes.io/name: {{ $name }}

---
{{- if eq $cfg.type "rollout" }}
apiVersion: argoproj.io/v1alpha1
kind: Rollout
{{- end }}
{{- if eq $cfg.type "deployment" }}
apiVersion: apps/v1
kind: Deployment
{{- end }}
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" $name "component" "api") | nindent 4 }}
    {{- with .Values.customLabels }}
    {{- toYaml . | nindent 4 }} 
    {{- end }}
  annotations:
    {{- with .Values.customAnnotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- if not $cfg.autoscaling.enabled }}
  replicas: {{ $cfg.replicas }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $name }}
  {{- if eq $cfg.type "rollout" }}
  strategy:
    blueGreen:
      activeService: {{ $name }}
      previewService: {{ $name }}-preview
      autoPromotionEnabled: {{ $cfg.rollout.autoPromotionEnabled }}
  revisionHistoryLimit: {{ $cfg.rollout.revisionHistoryLimit }}
  {{- end }}
  template:
    metadata:
      labels:
        {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" $name "component" "api") | nindent 8 }}
        app.kubernetes.io/version: {{ .Values.global.deployment.images.tag | quote }}
        {{- with .Values.customLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with $cfg.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- if eq .Values.global.deployment.platform "azure" }}
        {{- if eq .Values.cloudIdentity.azureSettings.credentialsType "workloadIdentity" }}
        azure.workload.identity/use: "true"
        {{- end }}
        {{- end }}
      annotations:
        {{- with .Values.customAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with $cfg.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- if $cfg.customMetrics.enabled }}
        prometheus.io/scrape: {{ $cfg.customMetrics.prometheus_scrape | quote }}
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
        {{- end }}
    spec:
      {{- if .Values.global.deployment.images.imagePullSecret.enabled }}
      imagePullSecrets:
      - name: {{ .Values.global.deployment.images.imagePullSecret.name }}
      {{- end }}
      terminationGracePeriodSeconds: {{ $cfg.terminationGracePeriodSeconds }}
      serviceAccountName: {{ $name }}
      {{- if $secCtx.enabled }}
      securityContext:
        runAsUser: {{ $secCtx.runAsUser }}
        runAsGroup: {{ $secCtx.runAsGroup }}
        fsGroup: {{ $secCtx.fsGroup }}
        runAsNonRoot: {{ $secCtx.runAsNonRoot }}
      {{- end }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: {{ $name }}
                topologyKey: kubernetes.io/hostname
      {{- if $topo.enabled }}
      topologySpreadConstraints:
        - maxSkew: {{ $topo.maxSkew }}
          topologyKey: {{ $topo.topologyKey }}
          whenUnsatisfiable: {{ $topo.whenUnsatisfiable }}
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: {{ $name }}
      {{- end }}
      containers:
      - env:
        - name: Logging__LogLevel__Default
          value: {{ $cfg.logging.default | quote }}
        - name: Logging__Database__LogLevel__Default
          value: {{ $cfg.logging.database | quote }}
        - name: Logging__Database__RPITrace
          value: {{ $cfg.logging.rpiTrace | quote }}
        - name: Logging__Database__RPIError
          value: {{ $cfg.logging.rpiError | quote }}
        - name: Logging__Console__LogLevel__Default
          value: {{ $cfg.logging.Console | quote }}
        - name: CallbackServiceConfig__QueueEnabled
          value: "true"
        - name: RPI__DateTimeSource
          value: {{ .Values.databases.operational.dateTimeSource | default "OperatingSystem" | quote }}
        {{- if $diag.copytoAzureBlob.enabled }}
        - name: RPI__Diagnostics__CopyToAzure__IsEnabled
          value: "true"
        - name: RPI__Diagnostics__CopyToAzure__StorageAccount
          value: {{ $diag.copytoAzureBlob.accountName | quote }}
        - name: RPI__Diagnostics__CopyToAzure__AccessKey
          valueFrom:
            secretKeyRef:
              name: {{ .Values.cloudIdentity.secretsManagement.secretName | quote }}
              key: CopyToAzureBlobAccessKey
        - name: RPI__Diagnostics__CopyToAzure__ContainerName
          value: {{ $diag.copytoAzureBlob.containerName | quote }}
        - name: RPI__Diagnostics__CopyToAzure__BlobServiceEndpoint
          value: {{ $diag.copytoAzureBlob.blobServiceEndpoint | quote }}
        - name: RPI__Diagnostics__CopyToAzure__EnableCdn
          value: {{ $diag.copytoAzureBlob.enableCdn | quote }}
        - name: RPI__Diagnostics__CopyToAzure__AzureUseDataLakeStorageGen2
          value: {{ $diag.copytoAzureBlob.UseDataLakeStorageGen2 | quote }}
        {{- end }}
        {{- if $diag.copytoSftp.enabled }}
        - name: RPI__Diagnostics__CopyToSFTP__SecureFTPHost
          value: {{ $diag.copytoSftp.sftpHost | quote }}
        - name: RPI__Diagnostics__CopyToSFTP__SecureFTPUsername
          value: {{ $diag.copytoSftp.sftpUsername | quote }}
        - name: RPI__Diagnostics__CopyToSFTP__SecureFTPPassword
          valueFrom:
            secretKeyRef:
              name: {{ .Values.cloudIdentity.secretsManagement.secretName | quote }}
              key: CopyToSFTPSecureFTPPassword
        - name: RPI__Diagnostics__CopyToSFTP__PortNumber
          value: {{ $diag.copytoSftp.sftpPort | quote }}
        - name: RPI__Diagnostics__UseSFTP
          value: "true"
        - name: RPI__Diagnostics__CopyToSFTP__IsEnabled
          value: "true"
        {{- end }}
        {{- if $diag.dotNetTools.enabled }}
        - name: DOTNET_BUNDLE_EXTRACT_BASE_DIR
          value: {{ $diag.dotNetTools.extractionBaseDir | quote }} 
        - name: RPI__Diagnostics__UseDotNetTools__Path
          value: {{  $diag.dotNetTools.path  | quote }}
        - name: RPI__Diagnostics__UseDotNetTools__UseCounters
          value: {{ $diag.dotNetTools.useCounters | quote }}
        - name: RPI__Diagnostics__UseDotNetTools__CounterProviderList
          value: '["System.Runtime", "Microsoft.Extensions.Diagnostics.ResourceMonitoring"]'
        - name: RPI__Diagnostics__UseDotNetTools__UseGcDump
          value: {{ $diag.dotNetTools.useGcDump | quote }}
        {{- end }}
        {{- if eq .Values.global.deployment.platform "azure" }}
        - name: CallbackServiceConfig__QueueProvider__CallbackServiceQueuePath
          value: {{ $rtCfg.queueProvider.queueNames.callbackServiceQueuePath | quote }}
        {{- end }}
        {{- if eq .Values.global.deployment.platform "amazon" }}
        - name: CallbackServiceConfig__QueueProvider__CallbackServiceQueuePath
          value: {{ $rtCfg.queueProvider.queueNames.callbackServiceQueuePath | quote }}
        {{- end }}
        {{- if eq .Values.global.deployment.platform "selfhosted" }}
        - name: CallbackServiceConfig__QueueProvider__CallbackServiceQueuePath
          value: {{ $rtCfg.queueProvider.queueNames.callbackServiceQueuePath | quote }}
        {{- end }}
        {{- if eq .Values.global.deployment.platform "google" }}
        - name: CallbackServiceConfig__QueueProvider__CallbackServiceQueuePath
          value: "{{ $rtCfg.queueProvider.queueNames.callbackServiceQueuePath }}/{{ $rtCfg.queueProvider.queueNames.callbackServiceQueuePath }}"
        {{- end }}
        - name: CallbackServiceConfig__QueueProvider__CallbackServiceQueueSettings__AllowedHosts
          value: "*"
        - name: CallbackServiceConfig__QueueProvider__ChannelLabel
          value: {{ $cfg.channelLabel | quote }}
        {{- if .Values.cloudIdentity.enabled }}
        {{- if eq .Values.cloudIdentity.provider "Azure" }}
        {{- if eq .Values.cloudIdentity.azureSettings.credentialsType "workloadIdentity" }}
        - name: CloudIdentity__Azure__CredentialType
          value: "AzureIdentity"
        - name: CloudIdentity__Azure__UseADTokenForDatabaseConnection
          value: {{ .Values.cloudIdentity.azureSettings.UseADTokenForDatabaseConnection | quote }}
        {{- end }}
        {{- end }}
        {{- end }}
        {{- if .Values.cloudIdentity.secretsManagement.enabled }}
        {{- if eq .Values.cloudIdentity.provider "Azure" }}
        - name: KeyVault__Provider
          value: "Azure"
        - name: KeyVault__UseForAppSettings
          value: {{ .Values.cloudIdentity.secretsManagement.UseForAppSettings | quote }}
        - name: KeyVault__UseForConfigPasswords
          value: {{ .Values.cloudIdentity.secretsManagement.UseForConfigPasswords | quote }}
        - name: KeyVault__AzureSettings__VaultURI
          value: {{ .Values.cloudIdentity.azureSettings.vaultUri | quote }}
        - name: KeyVault__AzureSettings__AppSettingsVaultURI
          value: {{ .Values.cloudIdentity.azureSettings.appSettingsVaultUri | quote }}
        - name: KeyVault__AzureSettings__ConfigurationReloadIntervalSeconds
          value: {{ .Values.cloudIdentity.secretsManagement.ConfigurationReloadIntervalSeconds | quote }}
        {{- end }}
        {{- end }}
        {{- if eq .Values.global.deployment.platform "google" }}
        {{- if eq .Values.cloudIdentity.googleSettings.credentialsType "serviceAccount" }}
        - name: GOOGLE_APPLICATION_CREDENTIALS 
          value: "{{ .Values.cloudIdentity.googleSettings.ConfigMapFilePath }}/{{ .Values.cloudIdentity.googleSettings.keyName }}"
        {{- end }}
        {{- end }}
        {{- if .Values.cloudIdentity.secretsManagement.enabled }}
        {{- if eq .Values.cloudIdentity.provider "Google" }}
        - name: KeyVault__Provider
          value: "Google"
        - name: KeyVault__UseForAppSettings
          value: {{ .Values.cloudIdentity.secretsManagement.UseForAppSettings | quote }}
        - name: KeyVault__UseForConfigPasswords
          value: {{ .Values.cloudIdentity.secretsManagement.UseForConfigPasswords | quote }}
        {{- end }}
        {{- end }}
        {{- if .Values.cloudIdentity.secretsManagement.enabled }}
        {{- if eq .Values.cloudIdentity.secretsManagement.secretsProvider "awssecretsmanager" }}
        {{- if eq .Values.cloudIdentity.amazonSettings.credentialsType "accessKey" }}
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              key: AWS_SM_Access_Key_ID
              name: {{ .Values.cloudIdentity.amazonSettings.secretsManagerSettings.credentialSecretName | quote }}
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              key: AWS_SM_Secret_Access_Key
              name: {{ .Values.cloudIdentity.amazonSettings.secretsManagerSettings.credentialSecretName | quote }}
        - name: AWS_REGION
          value: {{ .Values.cloudIdentity.amazonSettings.region | quote }}
        {{- end }}
        {{- end }}
        {{- end }}
        {{- if eq .Values.global.deployment.platform "amazon" }}
        {{- if .Values.cloudIdentity.enabled}}
        {{- if eq .Values.cloudIdentity.amazonSettings.credentialsType "iamRole" }}
        - name: AWS_ROLE_ARN
          value: {{ .Values.cloudIdentity.amazonSettings.roleArn | quote }}
        - name: AWS_WEB_IDENTITY_TOKEN_FILE
          value: {{ .Values.cloudIdentity.amazonSettings.webIdentityTokenFile | quote }}
        - name: AWS_STS_REGIONAL_ENDPOINTS
          value: {{ .Values.cloudIdentity.amazonSettings.stsRegionalEndpoints | quote }}
        - name: AWS_DEFAULT_REGION
          value: {{ .Values.cloudIdentity.amazonSettings.region | quote }}
        {{- end }}
        {{- end }}
        {{- end }}
        {{- if .Values.cloudIdentity.secretsManagement.enabled }}
        {{- if eq .Values.cloudIdentity.secretsManagement.secretsProvider "awssecretsmanager" }}
        - name: KeyVault__Provider
          value: "Amazon"
        - name: KeyVault__AmazonSettings__AppSettingsTag
          value: {{ .Values.cloudIdentity.amazonSettings.secretsManagerSettings.secretTagKey | quote }}
        - name: KeyVault__UseForAppSettings
          value: {{ .Values.cloudIdentity.secretsManagement.UseForAppSettings | quote }}
        - name: KeyVault__UseForConfigPasswords
          value: {{ .Values.cloudIdentity.secretsManagement.UseForConfigPasswords | quote }}
        {{- end }}
        {{- end }}
        {{- if eq .Values.databases.operational.provider "sqlserver" }}
        {{- if eq .Values.cloudIdentity.secretsManagement.secretsProvider "kubernetes" }}
        - name: CONNECTIONSTRINGS__LOGGINGDATABASE
          valueFrom:
            secretKeyRef:
              key: ConnectionString_Logging_Database
              name: {{ .Values.cloudIdentity.secretsManagement.secretName | quote }}
        - name: CONNECTIONSTRINGS__OPERATIONALDATABASE
          valueFrom:
            secretKeyRef:
              key: ConnectionString_Operations_Database
              name: {{ .Values.cloudIdentity.secretsManagement.secretName | quote }}
        {{- end }}
        {{- end }}
        {{- if eq .Values.databases.operational.provider "sqlserveronvm" }}
        {{- if eq .Values.cloudIdentity.secretsManagement.secretsProvider "kubernetes" }}
        - name: CONNECTIONSTRINGS__LOGGINGDATABASE
          valueFrom:
            secretKeyRef:
              key: ConnectionString_Logging_Database
              name: {{ .Values.cloudIdentity.secretsManagement.secretName | quote }}
        - name: CONNECTIONSTRINGS__OPERATIONALDATABASE
          valueFrom:
            secretKeyRef:
              key: ConnectionString_Operations_Database
              name: {{ .Values.cloudIdentity.secretsManagement.secretName | quote }}
        {{- end }}
        {{- end }}
        {{- if eq .Values.databases.operational.provider "postgresql" }}
        {{- if eq .Values.cloudIdentity.secretsManagement.secretsProvider "kubernetes" }}
        - name: CONNECTIONSTRINGS__LOGGINGDATABASE
          valueFrom:
            secretKeyRef:
              key: ConnectionString_Logging_Database
              name: {{ .Values.cloudIdentity.secretsManagement.secretName | quote }}
        - name: CONNECTIONSTRINGS__OPERATIONALDATABASE
          valueFrom:
            secretKeyRef:
              key: ConnectionString_Operations_Database
              name: {{ .Values.cloudIdentity.secretsManagement.secretName | quote }}
        - name: RPI_OperationalDatabaseType
          value: "PostgreSQL"
        {{- end }}
        {{- end }}
        {{- if eq $rtCfg.queueProvider.provider "amazonsqs" }}
        - name: CallbackServiceConfig__QueueProvider__CallbackServiceQueueSettings__Assembly
          value: "RedPoint.Amazon.Server"
        - name: CallbackServiceConfig__QueueProvider__CallbackServiceQueueSettings__Type
          value: "RedPoint.Amazon.Server.AWSQueue.SQSQueueFactory"
        {{- end }}
        {{- if eq $rtCfg.queueProvider.provider "amazonsqs" }}
        {{- if eq .Values.cloudIdentity.secretsManagement.secretsProvider "kubernetes" }}
        - name: CallbackServiceConfig__QueueProvider__CallbackServiceQueueSettings__Settings__0__Key
          value: "AccessKey"
        - name: CallbackServiceConfig__QueueProvider__CallbackServiceQueueSettings__Settings__0__Value
          valueFrom:
            secretKeyRef:
              name: {{ .Values.cloudIdentity.secretsManagement.secretName | quote }}
              key: RealtimeAPI_QueueSettings_AccessKey
        {{- end }}
        {{- end }}
        {{- if eq $rtCfg.queueProvider.provider "amazonsqs" }}
        {{- if eq .Values.cloudIdentity.secretsManagement.secretsProvider "kubernetes" }}
        - name: CallbackServiceConfig__QueueProvider__CallbackServiceQueueSettings__Settings__1__Key
          value: "SecretKey"
        - name: CallbackServiceConfig__QueueProvider__CallbackServiceQueueSettings__Settings__1__Value
          valueFrom:
            secretKeyRef:
              name: {{ .Values.cloudIdentity.secretsManagement.secretName | quote }}
              key: RealtimeAPI_QueueSettings_SecretKey
        {{- end }}
        {{- end }}
        {{- if eq $rtCfg.queueProvider.provider "amazonsqs" }}
        - name: CallbackServiceConfig__QueueProvider__CallbackServiceQueueSettings__Settings__2__Key
          value: "RegionEndpoint"
        - name: CallbackServiceConfig__QueueProvider__CallbackServiceQueueSettings__Settings__2__Value
          value: {{ .Values.cloudIdentity.amazonSettings.region | quote }}
        - name: CallbackServiceConfig__QueueProvider__CallbackServiceQueueSettings__Settings__3__Key
          value: "VisibilityTimeout"
        - name: CallbackServiceConfig__QueueProvider__CallbackServiceQueueSettings__Settings__3__Value
          value: {{ $rtCfg.queueProvider.amazonsqs.visibilityTimeout | quote }}
        {{- end }}
        {{- if eq $rtCfg.queueProvider.provider "azureservicebus" }}
        - name: CallbackServiceConfig__QueueProvider__CallbackServiceQueueSettings__Assembly
          value: "RedPoint.Azure.Server"
        - name: CallbackServiceConfig__QueueProvider__CallbackServiceQueueSettings__Type
          value: "RedPoint.Azure.Server.AzureQueue.AzureServiceBusQueueFactory"
        - name: CallbackServiceConfig__QueueProvider__CallbackServiceQueueSettings__Settings__0__Key
          value: "QueueType"
        - name: CallbackServiceConfig__QueueProvider__CallbackServiceQueueSettings__Settings__0__Value
          value: "ServiceBus"
        - name: CallbackServiceConfig__QueueProvider__CallbackServiceQueueSettings__Settings__1__Key
          value: "ConnectionString"
        {{- end }}
        {{- if eq .Values.cloudIdentity.secretsManagement.secretsProvider "kubernetes" }}
        {{- if eq $rtCfg.queueProvider.provider "azureservicebus" }}
        - name: CallbackServiceConfig__QueueProvider__CallbackServiceQueueSettings__Settings__1__Value
          valueFrom:
            secretKeyRef:
              name: {{ .Values.cloudIdentity.secretsManagement.secretName | quote }}
              key: RealtimeAPI_ServiceBus_ConnectionString
        {{- end }}
        {{- end }}
        {{- if eq $rtCfg.queueProvider.provider "azureeventhubs" }}
        - name: CallbackServiceConfig__QueueProvider__CallbackServiceQueueSettings__Assembly
          value: "RedPoint.Azure.Server"
        - name: CallbackServiceConfig__QueueProvider__CallbackServiceQueueSettings__Type
          value: "RedPoint.Azure.Server.AzureEventHubs.AzureEventHubsFactory"
        - name: CallbackServiceConfig__QueueProvider__CallbackServiceQueueSettings__Settings__0__Key
          value: "EventHubName"
        - name: CallbackServiceConfig__QueueProvider__CallbackServiceQueueSettings__Settings__0__Value
          value: {{ $rtCfg.queueProvider.azureeventhubs.eventHubName | quote }}
        - name: CallbackServiceConfig__QueueProvider__CallbackServiceQueueSettings__Settings__1__Key
          value: "EventHubConnectionString"
        {{- end }}
        {{- if eq .Values.cloudIdentity.secretsManagement.secretsProvider "kubernetes" }}
        {{- if eq $rtCfg.queueProvider.provider "azureeventhubs" }}
        - name: CallbackServiceConfig__QueueProvider__CallbackServiceQueueSettings__Settings__1__Value
          valueFrom:
            secretKeyRef:
              name: {{ .Values.cloudIdentity.secretsManagement.secretName | quote }}
              key: RealtimeAPI_EventHub_ConnectionString
        {{- end }}
        {{- end }}
        {{- if eq .Values.cloudIdentity.secretsManagement.secretsProvider "kubernetes" }}
        {{- if eq $rtCfg.queueProvider.provider "googlepubsub" }}
        - name: CallbackServiceConfig__QueueProvider__CallbackServiceQueueSettings__Assembly
          value: "RedPoint.Google.Server"
        - name: CallbackServiceConfig__QueueProvider__CallbackServiceQueueSettings__Type
          value: "RedPoint.Google.Server.GooglePubSub.GooglePubSubFactory"
        - name: CallbackServiceConfig__QueueProvider__CallbackServiceQueueSettings__Settings__0__Key
          value: "ProjectId"
        - name: CallbackServiceConfig__QueueProvider__CallbackServiceQueueSettings__Settings__0__Value
          value: {{ $rtCfg.queueProvider.googlepubsub.projectId | quote }}
        {{- end }}
        {{- end }}
        {{- if eq $rtCfg.queueProvider.provider "rabbitmq" }}
        - name: CallbackServiceConfig__QueueProvider__CallbackServiceQueueSettings__Assembly
          value: "RedPoint.Resonance.RabbitMQAccess"
        - name: CallbackServiceConfig__QueueProvider__CallbackServiceQueueSettings__Type
          value: "RedPoint.Resonance.RabbitMQAccess.RabbitMQFactory"
        - name: CallbackServiceConfig__QueueProvider__CallbackServiceQueueSettings__Settings__0__Key
          value: "Hostname"
        - name: CallbackServiceConfig__QueueProvider__CallbackServiceQueueSettings__Settings__0__Value
          value: {{ $rtCfg.queueProvider.rabbitmq.rabbitmqSettings.hostname | quote }}
        - name: CallbackServiceConfig__QueueProvider__CallbackServiceQueueSettings__Settings__1__Key
          value: "VirtualHost"
        - name: CallbackServiceConfig__QueueProvider__CallbackServiceQueueSettings__Settings__1__Value
          value: {{ $rtCfg.queueProvider.rabbitmq.rabbitmqSettings.virtualhost | quote }}
        - name: CallbackServiceConfig__QueueProvider__CallbackServiceQueueSettings__Settings__2__Key
          value: "Username"
        - name: CallbackServiceConfig__QueueProvider__CallbackServiceQueueSettings__Settings__2__Value
          value: {{ $rtCfg.queueProvider.rabbitmq.rabbitmqSettings.username | quote }}
        - name: CallbackServiceConfig__QueueProvider__CallbackServiceQueueSettings__Settings__3__Key
          value: "Password"
        {{- end }}
        {{- if eq $rtCfg.queueProvider.provider "rabbitmq" }}
        {{- if eq .Values.cloudIdentity.secretsManagement.secretsProvider "kubernetes" }}
        - name: CallbackServiceConfig__QueueProvider__CallbackServiceQueueSettings__Settings__3__Value
          valueFrom:
            secretKeyRef:
              name: {{ .Values.cloudIdentity.secretsManagement.secretName | quote }}
              key: RealtimeAPI_RabbitMQ_Password
        {{- end }}
        {{- end }}
        {{- if eq $rtCfg.queueProvider.provider "amazonmsk" }}
        - name: CallbackServiceConfig__QueueProvider__CallbackServiceQueueSettings__Assembly
          value: "RedPoint.Resonance.KafkaQueueAccess"
        - name: CallbackServiceConfig__QueueProvider__CallbackServiceQueueSettings__Type
          value: "RedPoint.Resonance.KafkaQueueAccess.KafkaQueueFactory"
        - name: CallbackServiceConfig__QueueProvider__CallbackServiceQueueSettings__Settings__0__Key
          value: "BootstrapServers"
        - name: CallbackServiceConfig__QueueProvider__CallbackServiceQueueSettings__Settings__0__Value
          value: {{ $rtCfg.queueProvider.amazonmsk.bootstrapServers | quote }}
        - name: CallbackServiceConfig__QueueProvider__CallbackServiceQueueSettings__Settings__1__Key
          value: "AccessKey"
        {{- end }}
        {{- if eq $rtCfg.queueProvider.provider "amazonmsk" }}
        {{- if eq .Values.cloudIdentity.secretsManagement.secretsProvider "kubernetes" }}
        - name: CallbackServiceConfig__QueueProvider__CallbackServiceQueueSettings__Settings__1__Value
          valueFrom:
            secretKeyRef:
              name: {{ .Values.cloudIdentity.secretsManagement.secretName | quote }}
              key: RealtimeAPI_QueueSettings_AccessKey
        {{- end }}
        {{- end }}
        {{- if eq $rtCfg.queueProvider.provider "amazonmsk" }}
        - name: CallbackServiceConfig__QueueProvider__CallbackServiceQueueSettings__Settings__2__Key
          value: "SecretKey"
        {{- end }}
        {{- if eq $rtCfg.queueProvider.provider "amazonmsk" }}
        {{- if eq .Values.cloudIdentity.secretsManagement.secretsProvider "kubernetes" }}
        - name: CallbackServiceConfig__QueueProvider__CallbackServiceQueueSettings__Settings__2__Value
          valueFrom:
            secretKeyRef:
              name: {{ .Values.cloudIdentity.secretsManagement.secretName | quote }}
              key: RealtimeAPI_QueueSettings_SecretKey
        {{- end }}
        {{- end }}
        {{- if eq $rtCfg.queueProvider.provider "amazonmsk" }}
        - name: CallbackServiceConfig__QueueProvider__CallbackServiceQueueSettings__Settings__3__Key
          value: "RegionEndpoint"
        - name: CallbackServiceConfig__QueueProvider__CallbackServiceQueueSettings__Settings__3__Value
          value: {{ .Values.cloudIdentity.amazonSettings.region | quote }}
        - name: CallbackServiceConfig__QueueProvider__CallbackServiceQueueSettings__Settings__4__Key
          value: "Acks"
        - name: CallbackServiceConfig__QueueProvider__CallbackServiceQueueSettings__Settings__4__Value
          value: {{ $rtCfg.queueProvider.amazonmsk.Acks | quote }}
        - name: CallbackServiceConfig__QueueProvider__CallbackServiceQueueSettings__Settings__5__Key
          value: "CompressionType"
        - name: CallbackServiceConfig__QueueProvider__CallbackServiceQueueSettings__Settings__5__Value
          value: {{ $rtCfg.queueProvider.amazonmsk.CompressionType | quote }}
        - name: CallbackServiceConfig__QueueProvider__CallbackServiceQueueSettings__Settings__6__Key
          value: "MaxRetryAttempt"
        - name: CallbackServiceConfig__QueueProvider__CallbackServiceQueueSettings__Settings__6__Value
          value: {{ $rtCfg.queueProvider.amazonmsk.MaxRetryAttempt | quote }}
        - name: CallbackServiceConfig__QueueProvider__CallbackServiceQueueSettings__Settings__7__Key
          value: "BatchSize"
        - name: CallbackServiceConfig__QueueProvider__CallbackServiceQueueSettings__Settings__7__Value
          value: {{ $rtCfg.queueProvider.amazonmsk.BatchSize | quote }}
        - name: CallbackServiceConfig__QueueProvider__CallbackServiceQueueSettings__Settings__8__Key
          value: "LingerTime"
        - name: CallbackServiceConfig__QueueProvider__CallbackServiceQueueSettings__Settings__8__Value
          value: {{ $rtCfg.queueProvider.amazonmsk.LingerTime | quote }}
        - name: CallbackServiceConfig__QueueProvider__CallbackServiceQueueSettings__Settings__9__Key
          value: "UseAwsMsk"
        - name: CallbackServiceConfig__QueueProvider__CallbackServiceQueueSettings__Settings__9__Value
          value: {{ $rtCfg.queueProvider.amazonmsk.UseAwsMsk | quote }}
        {{- end }}
        image: {{ .Values.global.deployment.images.callbackapi }}:{{ .Values.global.deployment.images.tag }}
        imagePullPolicy: {{  .Values.global.deployment.images.imagePullPolicy | default "IfNotPresent" }}
        name: callbackapi
        ports:
        - name: http
          containerPort: 8080
        {{- if $secCtx.enabled }}
        securityContext:
          privileged: {{ $secCtx.privileged }}
          allowPrivilegeEscalation: {{ $secCtx.allowPrivilegeEscalation }}
          readOnlyRootFilesystem: {{ $secCtx.readOnlyRootFilesystem }}
          capabilities:
            drop:
            {{- range $secCtx.capabilities.drop }}
              - {{ . }}
            {{- end }}
        {{- end }}
        {{- if $cfg.resources.enabled }}
        resources:
          {{- if and $cfg.resources.limits (ne $cfg.resources.limits.enabled false) }}
          limits:
            {{- with $cfg.resources.limits.cpu }}
            cpu: {{ . }}
            {{- end }}
            {{- with $cfg.resources.limits.memory }}
            memory: {{ . }}
            {{- end }}
          {{- end }}
          {{- if and $cfg.resources.requests (ne $cfg.resources.requests.enabled false) }}
          requests:
            {{- with $cfg.resources.requests.cpu }}
            cpu: {{ . }}
            {{- end }}
            {{- with $cfg.resources.requests.memory }}
            memory: {{ . }}
            {{- end }}
          {{- end }}
        {{- end }}
        volumeMounts:
          {{- if .Values.cloudIdentity.enabled }}
          {{- if eq .Values.cloudIdentity.provider "Google" }}
          - name: {{ .Values.cloudIdentity.googleSettings.configMapName }}
            mountPath: "/app/google-creds/{{ .Values.cloudIdentity.googleSettings.configMapName }}.json"
            subPath: "{{ .Values.cloudIdentity.googleSettings.configMapName }}.json"
          {{- end }}
          {{- end }}
      volumes:
      {{- if .Values.cloudIdentity.enabled }}
      {{- if eq .Values.cloudIdentity.provider "Google" }}
        - name: {{ .Values.cloudIdentity.googleSettings.configMapName | quote }}
          configMap:
            name: {{ .Values.cloudIdentity.googleSettings.configMapName | quote }}
      {{- end }}
      {{- end }}   
      {{- if .Values.nodeSelector.enabled }}
      nodeSelector:
        {{ .Values.nodeSelector.key }}: {{ .Values.nodeSelector.value }}
      {{- end }}
      {{- if .Values.tolerations.enabled }}
      tolerations:
        - effect: NoSchedule
          key: {{ .Values.nodeSelector.key }}
          operator: Equal
          value: {{ .Values.nodeSelector.value }}
      {{- end }}
{{- end }}

# Multi Tenant RPI 
---
{{- if $cfg.multitenancy.enabled }}
{{- if $cfg.serviceAccount.enabled }}
{{- if $cfg.enabled }}
{{- range $instanceIndex, $instance := $cfg.instances }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $name }}-{{ $instance.name}}
  namespace: {{ $.Release.Namespace }}
  labels:
    app: {{ $name }}-{{ $instance.name}}
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" $name "component" "api") | nindent 4 }}
  {{- if eq $.Values.global.deployment.platform "azure" }}
  {{- if $.Values.cloudIdentity.enabled }}
  {{- if eq $.Values.cloudIdentity.azureSettings.credentialsType "workloadIdentity" }}
  annotations:
    azure.workload.identity/client-id: {{ $.Values.cloudIdentity.azureSettings.managedIdentityClientId | quote }}
  {{- end }}
  {{- end }}
  {{- end }}
  {{- if eq $.Values.global.deployment.platform "google" }}
  {{- if $.Values.cloudIdentity.enabled }}
  {{- if eq $.Values.cloudIdentity.azureSettings.credentialsType "workloadIdentity" }}
  annotations:
    iam.gke.io/gcp-service-account: {{ $.Values.cloudIdentity.googleSettings.serviceAccountEmail | quote }}
  {{- end }}
  {{- end }}
  {{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}

---
{{- if $cfg.multitenancy.enabled }}
{{- if $cfg.enabled }}
{{- range $instance := $cfg.instances }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}-{{ $instance.name}}
  namespace: {{ $.Release.Namespace }}
  labels:
    app: {{ $name }}-{{ $instance.name}}
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" $name "component" "api") | nindent 4 }}
spec:
  ports:
  - name: http
    port: {{ $cfg.service.port }}
    protocol: TCP
    targetPort: 8080
  selector:
    app: {{ $name }}-{{ $instance.name}}
{{- end }}
{{- end }}
{{- end }}

---
{{- if $cfg.multitenancy.enabled }}
{{- if $cfg.enabled }}
{{- range $instance := $cfg.instances }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}-{{ $instance.name}}
  namespace: {{ $.Release.Namespace }}
  labels:
    app: {{ $name }}-{{ $instance.name}}
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" $name "component" "api") | nindent 4 }}
    {{- with $.Values.customLabels }}
    {{- toYaml . | nindent 4 }} 
    {{- end }}
  annotations:
    {{- with .Values.customAnnotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- if not $cfg.autoscaling.enabled }}
  replicas: {{ $cfg.replicas }}
  {{- end }}
  selector:
    matchLabels:
      app: {{ $name }}-{{ $instance.name}}
  template:
    metadata:
      labels:
        app: {{ $name }}-{{ $instance.name}}
        {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" $name "component" "api") | nindent 8 }}
        {{- with $.Values.customLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with $cfg.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- if eq $.Values.global.deployment.platform "azure" }}
        {{- if eq $.Values.cloudIdentity.azureSettings.credentialsType "workloadIdentity" }}
        azure.workload.identity/use: "true"
        {{- end }}
        {{- end }}
      annotations:
        {{- with $.Values.customAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with $cfg.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- if $cfg.customMetrics.enabled }}
        prometheus.io/scrape: {{ $cfg.customMetrics.prometheus_scrape | quote }}
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
        {{- end }}
    spec:
      {{- if $.Values.global.deployment.images.imagePullSecret.enabled }}
      imagePullSecrets:
      - name: {{ $.Values.global.deployment.images.imagePullSecret.name }}
      {{- end }}
      serviceAccountName: {{ $cfg.name }}
      {{- if $secCtx.enabled }}
      securityContext:
        runAsUser: {{ $secCtx.runAsUser }}
        runAsGroup: {{ $secCtx.runAsGroup }}
        fsGroup: {{ $secCtx.fsGroup }}
        runAsNonRoot: {{ $secCtx.runAsNonRoot }}
        supplementalGroups:
          {{- with $secCtx.supplementalGroups }}
          {{- toYaml . | nindent 10 }}
          {{- end }}
      {{- end }}
      terminationGracePeriodSeconds: 120
      containers:
      - env:
        - name: Logging__LogLevel__Default
          value: {{ $cfg.logging.default | quote }}
        - name: Logging__Database__LogLevel__Default
          value: {{ $cfg.logging.database | quote }}
        - name: Logging__Database__RPITrace
          value: {{ $cfg.logging.rpiTrace | quote }}
        - name: Logging__Database__RPIError
          value: {{ $cfg.logging.rpiError | quote }}
        - name: Logging__Console__LogLevel__Default
          value: {{ $cfg.logging.Console | quote }}
        - name: CallbackServiceConfig__QueueEnabled
          value: "true"
        - name: RPI__DateTimeSource
          value: {{ $.Values.databases.operational.dateTimeSource | default "OperatingSystem" | quote }}
        {{- if $diag.copytoAzureBlob.enabled }}
