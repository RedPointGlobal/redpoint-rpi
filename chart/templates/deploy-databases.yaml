{{/*
  Demo Database Mode
  Deploys embedded MSSQL Server and MongoDB containers for development/POC environments.
  Enabled via: global.deployment.mode: "demo"

  When using demo mode, configure your database connection settings as follows:

    databases.operational.server_host: rpi-demo-mssql
    databases.operational.server_username: sa
    databases.operational.server_password: <value from Secret "rpi-demo-mode" key "DEMOMode_SQL_Password">
  Notes:
    - The MSSQL 'sa' password is automatically generated during deployment.
    - The password is stored in the Kubernetes Secret: rpi-demo-mode
    - Retrieve it with: kubectl get secret rpi-demo-mode -n <namespace> -o jsonpath="{.data.DEMOMode_SQL_Password}" | base64 -d
*/}}

{{- if eq (.Values.global.deployment.mode | default "standard") "demo" }}
# -- Demo MSSQL Server
apiVersion: v1
kind: Service
metadata:
  name: rpi-demo-mssql
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" "rpi-demo-mssql" "component" "database") | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/name: rpi-demo-mssql
  ports:
    - protocol: TCP
      port: 1433
      targetPort: 1433
  type: ClusterIP

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rpi-demo-mssql
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" "rpi-demo-mssql" "component" "database") | nindent 4 }}
spec:
  serviceName: rpi-demo-mssql
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rpi-demo-mssql
  template:
    metadata:
      labels:
        {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" "rpi-demo-mssql" "component" "database") | nindent 8 }}
    spec:
      {{- if .Values.global.deployment.images.imagePullSecret.enabled }}
      imagePullSecrets:
        - name: {{ .Values.global.deployment.images.imagePullSecret.name }}
      {{- end }}
      containers:
      - name: mssql
        image: rg1acrpub.azurecr.io/docker/redpointinteraction/prod/mssql-2022-opsdatabases:latest
        ports:
        - name: mssql
          containerPort: 1433
        env:
        - name: MSSQL_PID
          value: "Developer"
        - name: ACCEPT_EULA
          value: "Y"
        - name: SA_PASSWORD
          valueFrom:
            secretKeyRef:
              name: rpi-demo-mode
              key: DEMOMode_SQL_Password
        - name: MSSQL_DATA_DIR
          value: /var/opt/mssql/data
        volumeMounts:
        - name: mssql-data
          mountPath: /var/opt/mssql
        resources:
          requests:
            cpu: 500m
            memory: 2Gi
          limits:
            memory: 4Gi
      {{- include "redpoint-rpi.nodeSelector" . | nindent 6 }}
      {{- include "redpoint-rpi.tolerations" . | nindent 6 }}
  volumeClaimTemplates:
  - metadata:
      name: mssql-data
    spec:
      accessModes: [ReadWriteOnce]
      resources:
        requests:
          storage: 20Gi

---
# -- Demo MongoDB Server
apiVersion: v1
kind: Service
metadata:
  name: rpi-demo-mongodb
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" "rpi-demo-mongodb" "component" "database") | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/name: rpi-demo-mongodb
  ports:
    - protocol: TCP
      port: 27017
      targetPort: 27017
  type: ClusterIP

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rpi-demo-mongodb
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" "rpi-demo-mongodb" "component" "database") | nindent 4 }}
spec:
  serviceName: rpi-demo-mongodb
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rpi-demo-mongodb
  template:
    metadata:
      labels:
        {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" "rpi-demo-mongodb" "component" "database") | nindent 8 }}
    spec:
      {{- if .Values.global.deployment.images.imagePullSecret.enabled }}
      imagePullSecrets:
        - name: {{ .Values.global.deployment.images.imagePullSecret.name }}
      {{- end }}
      containers:
      - name: mongodb
        image: rg1acrpub.azurecr.io/docker/redpointinteraction/prod/mongodb-6-0-seeded:latest
        ports:
        - name: mongo
          containerPort: 27017
        env:
        - name: MONGO_INITDB_DATABASE
          value: "rpirealtime"
        - name: MONGO_INITDB_ROOT_USERNAME
          value: "rpirealtime"
        - name: MONGO_INITDB_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: rpi-demo-mode
              key: DEMOMode_Mongo_Password
        volumeMounts:
        - name: mongodb-data
          mountPath: /data/db
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            memory: 1Gi
      {{- include "redpoint-rpi.nodeSelector" . | nindent 6 }}
      {{- include "redpoint-rpi.tolerations" . | nindent 6 }}
  volumeClaimTemplates:
  - metadata:
      name: mongodb-data
    spec:
      accessModes: [ReadWriteOnce]
      resources:
        requests:
          storage: 10Gi
{{- end }}