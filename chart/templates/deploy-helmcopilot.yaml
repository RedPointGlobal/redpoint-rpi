{{- $cfg := fromYaml (include "rpi.merged.helmcopilot" .) -}}
{{- $secCtx := fromYaml (include "rpi.merged.securityContext" .) -}}
{{- $liveness := fromYaml (include "rpi.merged.livenessProbe" .) -}}
{{- $readiness := fromYaml (include "rpi.merged.readinessProbe" .) -}}
{{- $name := "rpi-helmcopilot" -}}

{{- if .Values.helmcopilot.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" $name "component" "mcp") | nindent 4 }}
spec:
  ports:
  - name: http
    port: {{ $cfg.service.port }}
    protocol: TCP
    targetPort: 8080
  selector:
    app.kubernetes.io/name: {{ $name }}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" $name "component" "mcp") | nindent 4 }}
    app.kubernetes.io/version: {{ .Values.global.deployment.images.tag | quote }}
    {{- with $cfg.customLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.customAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ $cfg.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $name }}
  template:
    metadata:
      labels:
        {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" $name "component" "mcp") | nindent 8 }}
        app.kubernetes.io/version: {{ .Values.global.deployment.images.tag | quote }}
        {{- with .Values.customLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with $cfg.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- if or .Values.customAnnotations $cfg.podAnnotations }}
      annotations:
        {{- with .Values.customAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with $cfg.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
    spec:
      {{- if .Values.global.deployment.images.imagePullSecret.enabled }}
      imagePullSecrets:
      - name: {{ .Values.global.deployment.images.imagePullSecret.name }}
      {{- end }}
      terminationGracePeriodSeconds: {{ $cfg.terminationGracePeriodSeconds }}
      serviceAccountName: {{ include "rpi.serviceAccountName" (dict "root" . "name" $name) }}
      {{- if $secCtx.enabled }}
      securityContext:
        runAsUser: {{ $secCtx.runAsUser }}
        runAsGroup: {{ $secCtx.runAsGroup }}
        fsGroup: {{ $secCtx.fsGroup }}
        runAsNonRoot: {{ $secCtx.runAsNonRoot }}
        supplementalGroups:
          {{- with $secCtx.supplementalGroups }}
          {{- toYaml . | nindent 10 }}
          {{- end }}
      {{- end }}
      containers:
      - name: {{ $name }}
        image: {{ .Values.global.deployment.images.repository }}/{{ $name }}:{{ .Values.global.deployment.images.tag }}
        {{- if $secCtx.enabled }}
        securityContext:
          privileged: {{ $secCtx.privileged }}
          allowPrivilegeEscalation: {{ $secCtx.allowPrivilegeEscalation }}
          readOnlyRootFilesystem: {{ $secCtx.readOnlyRootFilesystem }}
          capabilities:
            drop:
            {{- range $secCtx.capabilities.drop }}
              - {{ . }}
            {{- end }}
        {{- end }}
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 15
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 2
          failureThreshold: 3
        imagePullPolicy: {{ .Values.global.deployment.images.imagePullPolicy | default "IfNotPresent" }}
        env:
        - name: MCP_TRANSPORT
          value: "http"
        - name: MCP_PORT
          value: "8080"
        {{- if .Values.global.deployment.podTimezone }}
        - name: TZ
          value: {{ .Values.global.deployment.podTimezone | quote }}
        {{- end }}
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        {{- if $cfg.resources.enabled }}
        resources:
          {{- with $cfg.resources.requests }}
          requests:
            {{- with .cpu }}
            cpu: {{ . }}
            {{- end }}
            {{- with .memory }}
            memory: {{ . }}
            {{- end }}
          {{- end }}
          {{- with $cfg.resources.limits }}
          limits:
            {{- with .cpu }}
            cpu: {{ . }}
            {{- end }}
            {{- with .memory }}
            memory: {{ . }}
            {{- end }}
          {{- end }}
        {{- end }}
      {{- if .Values.nodeSelector.enabled }}
      nodeSelector:
        {{ .Values.nodeSelector.key }}: {{ .Values.nodeSelector.value }}
      {{- end }}
      {{- if .Values.tolerations.enabled }}
      tolerations:
        - effect: NoSchedule
          key: {{ .Values.nodeSelector.key }}
          operator: Equal
          value: {{ .Values.nodeSelector.value }}
      {{- end }}
{{- end }}
