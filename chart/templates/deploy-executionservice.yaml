{{- $cfg := fromYaml (include "rpi.merged.executionservice" .) -}}
{{- $secCtx := fromYaml (include "rpi.merged.securityContext" .) -}}
{{- $liveness := fromYaml (include "rpi.merged.livenessProbe" .) -}}
{{- $readiness := fromYaml (include "rpi.merged.readinessProbe" .) -}}
{{- $startup := fromYaml (include "rpi.merged.startupProbe" .) -}}
{{- $topo := fromYaml (include "rpi.merged.topologySpreadConstraints" .) -}}
{{- $diag := fromYaml (include "rpi.merged.diagnosticsMode" .) -}}
{{- $rtCfg := fromYaml (include "rpi.merged.realtimeapi" .) -}}
{{- $name := "rpi-executionservice" -}}
{{- $dwEnabled := (include "redpoint.DatawarehouseProviders" .) | eq "true" -}}
{{- $dw := .Values.databases.datawarehouse | default dict -}}

{{- if $cfg.serviceAccount.enabled }}
{{- if $cfg.enabled }}
{{- if ne (.Values.cloudIdentity.serviceAccount.mode | default "per-service") "shared" }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" $name "component" "api") | nindent 4 }}
  {{- $saAnnotations := include "rpi.mergedAnnotations" (dict "root" . "type" "serviceAccount") | trim }}
  {{- $ciAnnotations := include "rpi.cloudidentity.saAnnotations" . | trim }}
  {{- if or $saAnnotations $ciAnnotations }}
  annotations:
    {{- if $saAnnotations }}
    {{- $saAnnotations | nindent 4 }}
    {{- end }}
    {{- if $ciAnnotations }}
    {{- $ciAnnotations | nindent 4 }}
    {{- end }}
  {{- end }}
{{- end }}
{{- end }}
{{- end }}

---
{{- if $cfg.podDisruptionBudget.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" $name "component" "worker") | nindent 4 }}
spec:
  maxUnavailable: {{ $cfg.podDisruptionBudget.maxUnavailable }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $name }}
{{- end }}

---
{{- if $cfg.enabled }}
{{- if eq $cfg.type "rollout" }}
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}-preview
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" $name "component" "worker") | nindent 4 }}
  {{- $svcAnnotations := include "rpi.mergedAnnotations" (dict "root" . "type" "service") | trim }}
  {{- if $svcAnnotations }}
  annotations:
    {{- $svcAnnotations | nindent 4 }}
  {{- end }}
spec:
  ports:
  - name: http
    port: {{ $cfg.service.port }}
    protocol: TCP
    targetPort: 8080
  selector:
    app.kubernetes.io/name: {{ $name }}
{{- end }}
{{- end }}

---
{{- if $cfg.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" $name "component" "worker") | nindent 4 }}
  {{- $svcAnnotations := include "rpi.mergedAnnotations" (dict "root" . "type" "service") | trim }}
  {{- if $svcAnnotations }}
  annotations:
    {{- $svcAnnotations | nindent 4 }}
  {{- end }}
spec:
  ports:
  - name: http
    port: {{ $cfg.service.port }}
    protocol: TCP
    targetPort: 8080
  selector:
    app.kubernetes.io/name: {{ $name }}

---
{{- if eq $cfg.type "rollout" }}
apiVersion: argoproj.io/v1alpha1
kind: Rollout
{{- end }}
{{- if eq $cfg.type "deployment" }}
apiVersion: apps/v1
kind: Deployment
{{- end }}
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" $name "component" "worker") | nindent 4 }}
    app.kubernetes.io/version: {{ .Values.global.deployment.images.tag | quote }}
    {{- with .Values.customLabels }}
    {{- toYaml . | nindent 4 }} 
    {{- end }}
  {{- with .Values.customAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if not $cfg.autoscaling.enabled }}
  replicas: {{ $cfg.replicas }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $name }}
  {{- if eq $cfg.type "rollout" }}
  strategy:
    blueGreen:
      activeService: {{ $name }}
      previewService: {{ $name }}-preview
      autoPromotionEnabled: {{ $cfg.rollout.autoPromotionEnabled }}
  revisionHistoryLimit: {{ $cfg.rollout.revisionHistoryLimit }}
  {{- end }}
  template:
    metadata:
      labels:
        {{- include "redpoint-rpi.componentLabels" (dict "root" . "name" $name "component" "worker") | nindent 8 }}
        app.kubernetes.io/version: {{ .Values.global.deployment.images.tag | quote }}
        {{- with .Values.customLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with $cfg.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with (include "rpi.cloudidentity.podLabels" . | trim) }}{{- . | nindent 8 }}{{- end }}
      {{- if or .Values.commonAnnotations .Values.customAnnotations $cfg.podAnnotations (or .Values.customMetrics.enabled $cfg.customMetrics.enabled) .Values.serviceMesh.enabled }}
      annotations:
        {{- with .Values.commonAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with .Values.customAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with $cfg.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- if (or .Values.customMetrics.enabled $cfg.customMetrics.enabled) }}
        prometheus.io/scrape: {{ or .Values.customMetrics.enabled $cfg.customMetrics.prometheus_scrape | quote }}
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
        {{- end }}
        {{- include "rpi.serviceMesh.podAnnotations" . | nindent 8 }}
      {{- end }}
    spec:
      {{- if .Values.global.deployment.images.imagePullSecret.enabled }}
      imagePullSecrets:
      - name: {{ .Values.global.deployment.images.imagePullSecret.name }}
      {{- end }}
      {{- if eq $cfg.autoscaling.type "keda" }}
      terminationGracePeriodSeconds: {{ $cfg.autoscaling.kedaScaledObject.terminationGracePeriodSeconds }}
      {{- end }}
      {{- if eq $cfg.autoscaling.type "hpa" }}
      terminationGracePeriodSeconds: {{ $cfg.terminationGracePeriodSeconds }}
      {{- end }}
      serviceAccountName: {{ include "rpi.serviceAccountName" (dict "root" . "name" $name "cfg" $cfg) }}
      {{- include "rpi.pod.securityContext" (dict "sc" $secCtx) | nindent 6 }}
      {{- include "rpi.podAntiAffinity" (dict "root" . "name" $name) | nindent 6 }}
      {{- if $topo.enabled }}
      topologySpreadConstraints:
        - maxSkew: {{ $topo.maxSkew }}
          topologyKey: {{ $topo.topologyKey }}
          whenUnsatisfiable: {{ $topo.whenUnsatisfiable }}
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: {{ $name }}
      {{- end }}
      containers:
      - env:
        {{- if .Values.global.deployment.podTimezone }}
        - name: TZ
          value: {{ .Values.global.deployment.podTimezone | quote }}
        {{- end }}
        - name: Logging__LogLevel__Default
          value: {{ $cfg.logging.default | quote }}
        - name: Logging__Database__LogLevel__Default
          value: {{ $cfg.logging.database | quote }}
        - name: Logging__Database__RPITrace
          value: {{ $cfg.logging.rpiTrace | quote }}
        - name: Logging__Database__RPIError
          value: {{ $cfg.logging.rpiError | quote }}
        - name: Logging__Console__LogLevel__Default
          value: {{ $cfg.logging.Console | quote }}
        - name: RPI__DateTimeSource
          value: {{ .Values.databases.operational.dateTimeSource | default "OperatingSystem" | quote }}
        - name: RPIExecution__MaxSmartAssetInstancesForOfferCodes
          value: {{ $cfg.jobExecution.maxSmartAssetInstancesForOfferCodes | quote }}
        {{- if .Values.rebrandly.enabled }}
        - name: Plugins__Rebrandly__BaseUrl
          value: "http://rpi-rebrandly"
        {{- end }}
        {{- range $cfg.extraEnvs }}
        {{- if .enabled }}
        - name: {{ .name }}
          value: {{ quote .value }}
        {{- end }}
        {{- end }}
        {{- if .Values.OpenIdProviders.enabled }}
        {{- if eq .Values.OpenIdProviders.name "keycloak" }}
        - name: RPI__UserManagement__UseExternalUserManagement
          value: 'true'
        - name: RPI__UserManagement__Keycloak__Address
          value: "http://keycloak"
        - name: RPI__UserManagement__Keycloak__Realm
          value: redpoint-mercury
        - name: RPI__UserManagement__Keycloak__ClientId
          value: rpi-service
        - name: RPI__UserManagement__Keycloak__ClientSecret
          valueFrom:
            secretKeyRef:
              name: {{ include "rpi.secrets.secretName" . | quote }}
              key: CDP_Keycloak_Client_Secret
        {{- end }}
        {{- end }}
        {{- if $cfg.internalCache.enabled }}
        {{- if eq $cfg.internalCache.provider "filesystem" }}
        - name: InternalCache__IsEnabled
          value: "true"
        - name: InternalCache__StatePersistence__Provider
          value: "FileSystem"
        - name: InternalCache__BackupToOpsDBInterval
          value: {{ $cfg.internalCache.backupToOpsDBInterval | quote }}
        - name: InternalCache__MaxNumberRetries
          value: {{ $cfg.internalCache.maxNumberRetries | quote }}
        - name: InternalCache__MaxRetryDelay
          value: {{ $cfg.internalCache.maxRetryDelay | quote }}
        - name: InternalCache__FailOnPrimaryDataLoss
          value: {{ $cfg.internalCache.failOnPrimaryDataLoss | quote }}
        - name: InternalCache__FailOnCacheConnectionError
          value: {{ $cfg.internalCache.failOnCacheConnectionError | quote }}
        {{- end }}
        {{- end }}
        {{- if $cfg.internalCache.enabled }}
        {{- if eq $cfg.internalCache.provider "azureblob" }}
        - name: InternalCache__StatePersistence__FileSystem__OverrideDirectoryPath
          value: "true"
        - name: InternalCache__StatePersistence__AzureBlobStorage__StorageAccount
          value: {{ $cfg.internalCache.azureStorageSettings.accountName | quote }}
        - name: InternalCache__StatePersistence__AzureBlobStorage__ContainerName
          value: {{ $cfg.internalCache.azureStorageSettings.containerName | quote }}
        {{- end }}
        {{- end }}
        {{- if $cfg.internalCache.enabled }}
        {{- if eq $cfg.internalCache.provider "azureblob" }}
        {{- if $cfg.internalCache.azureStorageSettings.useCloudIdentity }}
        - name: InternalCache__StatePersistence__AzureBlobStorage__UseCloudIdentity
          value: {{ $cfg.internalCache.azureStorageSettings.useCloudIdentity | quote }}
        {{- end }}
        {{- end }}
        {{- end }}
        {{- if $cfg.internalCache.enabled }}
        {{- if eq $cfg.internalCache.provider "azureblob" }}
        {{- if not $cfg.internalCache.azureStorageSettings.useCloudIdentity }}
        - name: InternalCache__StatePersistence__AzureBlobStorage__ConnectionString
          value: {{ $cfg.internalCache.azureStorageSettings.connectionString | quote }}
        {{- end }}
        {{- end }}
        {{- end }}
        {{- if $diag.copytoAzureBlob.enabled }}
        - name: RPI__Diagnostics__CopyToAzure__IsEnabled
          value: "true"
        - name: RPI__Diagnostics__CopyToAzure__StorageAccount
          value: {{ $diag.copytoAzureBlob.accountName | quote }}
        - name: RPI__Diagnostics__CopyToAzure__AccessKey
          valueFrom:
            secretKeyRef:
              name: {{ include "rpi.secrets.secretName" . | quote }}
              key: CopyToAzureBlobAccessKey
        - name: RPI__Diagnostics__CopyToAzure__ContainerName
          value: {{ $diag.copytoAzureBlob.containerName | quote }}
        - name: RPI__Diagnostics__CopyToAzure__BlobServiceEndpoint
          value: {{ $diag.copytoAzureBlob.blobServiceEndpoint | quote }}
        - name: RPI__Diagnostics__CopyToAzure__EnableCdn
          value: {{ $diag.copytoAzureBlob.enableCdn | quote }}
        - name: RPI__Diagnostics__CopyToAzure__AzureUseDataLakeStorageGen2
          value: {{ $diag.copytoAzureBlob.UseDataLakeStorageGen2 | quote }}
        {{- end }}
        {{- if $diag.copytoSftp.enabled }}
        - name: RPI__Diagnostics__CopyToSFTP__SecureFTPHost
          value: {{ $diag.copytoSftp.sftpHost | quote }}
        - name: RPI__Diagnostics__CopyToSFTP__SecureFTPUsername
          value: {{ $diag.copytoSftp.sftpUsername | quote }}
        - name: RPI__Diagnostics__CopyToSFTP__SecureFTPPassword
          valueFrom:
            secretKeyRef:
              name: {{ include "rpi.secrets.secretName" . | quote }}
              key: CopyToSFTPSecureFTPPassword
        - name: RPI__Diagnostics__CopyToSFTP__PortNumberNumber
          value: {{ $diag.copytoSftp.sftpPort | quote }}
        - name: RPI__Diagnostics__UseSFTP
          value: "true"
        - name: RPI__Diagnostics__CopyToSFTP__IsEnabled
          value: "true"
        {{- end }}
        {{- if $diag.dotNetTools.enabled }}
        - name: DOTNET_BUNDLE_EXTRACT_BASE_DIR
          value: {{ $diag.dotNetTools.extractionBaseDir | quote }} 
        - name: RPI__Diagnostics__UseDotNetTools__Path
          value: {{  $diag.dotNetTools.path  | quote }}
        - name: RPI__Diagnostics__UseDotNetTools__UseCounters
          value: {{ $diag.dotNetTools.useCounters | quote }}
        - name: RPI__Diagnostics__UseDotNetTools__CounterProviderList
          value: '["System.Runtime", "Microsoft.Extensions.Diagnostics.ResourceMonitoring"]'
        - name: RPI__Diagnostics__UseDotNetTools__UseGcDump
          value: {{ $diag.dotNetTools.useGcDump | quote }}
        {{- end }}
        - name: Plugins__LuxSci__SendRequestCount
          value: {{ $cfg.jobExecution.luxScisendRequestCount | quote }}
        - name: RPIExecution__InternalAddress
          value: {{ $cfg.jobExecution.internalAddress | quote }}
        - name: RPIExecution__AuditTaskEvents
          value: {{ $cfg.jobExecution.auditTaskEvents | quote }}
        - name: RPIExecution__MaxThreadsPerExecutionService
          value: {{ $cfg.jobExecution.maxThreadsPerExecutionService | quote }}
        - name: RPIExecution__ExecutionShutdownWaitForActivity
          value: {{ $cfg.jobExecution.executionShutdownWaitForActivity | quote }}
        - name: RPIExecution__OverrideCustomSQLReservedWords
          value: {{ $cfg.jobExecution.overrideCustomSQLReservedWords | quote }}
        - name: RPIExecution__RPDMOApiPrefixUri
          value: {{ $cfg.jobExecution.rpdmOApiPrefixUri | quote }}
        - name: RPIExecution__RPDMOApiRequestTimeout
          value: {{ $cfg.jobExecution.rpdmOApiRequestTimeout | quote }}
        - name: RPIExecution__TaskTimeout
          value: {{ $cfg.jobExecution.taskTimeout | quote }}
        - name: RPIExecution__TriggerCheckCriteriaInterval
          value: {{ $cfg.jobExecution.triggerCheckCriteriaInterval | quote }}
        - name: RPIExecution__TriggersMaxDaysInactive
          value: {{ $cfg.jobExecution.triggersMaxDaysInactive | quote }}
        - name: RPIExecution__DefaultMaintenanceModeBufferTime
          value: {{ $cfg.jobExecution.defaultMaintenanceModeBufferTime | quote }}
        - name: RPIExecution__WorkflowPrioritization__Enabled
          value: {{ $cfg.jobExecution.workflowPrioritization.enabled | quote }}
        - name: RPIExecution__WorkflowPrioritization__MaxConcurrentWorkflowActivities
          value: {{ $cfg.jobExecution.workflowPrioritization.maxConcurrentWorkflowActivities | quote }}
        - name: RPIExecution__WorkflowPrioritization__MaximumQueueTime
          value: {{ $cfg.jobExecution.workflowPrioritization.maximumQueueTime | quote }}
        {{- if eq .Values.global.deployment.platform "azure" }}
        {{- if (($dw.bigquery | default dict).enabled | default false) }}
        - name: GOOGLE_APPLICATION_CREDENTIALS
          value: "{{ .Values.cloudIdentity.google.configMapFilePath }}/{{ .Values.cloudIdentity.google.keyName }}"
        {{- end }}
        {{- end }}
        {{- if eq .Values.global.deployment.platform "google" }}
        {{- if .Values.cloudIdentity.enabled }}
        - name: GOOGLE_APPLICATION_CREDENTIALS
          value: "{{ .Values.cloudIdentity.google.configMapFilePath }}/{{ .Values.cloudIdentity.google.keyName }}"
        {{- end }}
        {{- end }}
        {{- with (include "rpi.secrets.sdk.envvars" . | trim) }}{{- . | nindent 8 }}{{- end }}
        {{- with (include "rpi.cloudidentity.envvars" . | trim) }}{{- . | nindent 8 }}{{- end }}
        {{- with (include "rpi.cloudidentity.awsAccessKeyEnvvars" . | trim) }}{{- . | nindent 8 }}{{- end }}
        {{- include "rpi.customCACerts.envVar" . | nindent 8 }}
        {{- if not $rtCfg.multitenant }}
        - name: RealtimeAPIAddressOverride
          value: "http://rpi-realtimeapi"
        {{- end }}
        - name: Authentication__EnableRPIAuthentication
          value: {{ $cfg.enableRPIAuthentication | quote }}
        - name: RPI__SMTP__EmailSenderAddress
          value: {{ .Values.SMTPSettings.SMTP_SenderAddress | quote }}
        - name: RPI__SMTP__Address
          value: {{ .Values.SMTPSettings.SMTP_Address | quote }}
        - name: RPI__SMTP__Port
          value: {{ .Values.SMTPSettings.SMTP_Port | quote }}
        - name: RPI__SMTP__EnableSSL
          value: {{ .Values.SMTPSettings.EnableSSL | quote }}
        - name: RPI__SMTP__UseCredentials
          value: {{ .Values.SMTPSettings.UseCredentials | quote }}
        {{- if .Values.SMTPSettings.UseCredentials }}
        {{- if not (eq .Values.secretsManagement.provider "sdk") }}
        - name: RPI__SMTP__Username
          value: {{ .Values.SMTPSettings.SMTP_Username | quote }}
        - name: RPI__SMTP__Password
          valueFrom:
            secretKeyRef:
              name: {{ include "rpi.secrets.secretName" . | quote }}
              key: SMTP_Password
        {{- end }}
        {{- end }}
        - name: RPIClient__ApplicationSupportURL
          value: "https://support.redpointglobal.com"
        {{- if .Values.storage.persistentVolumeClaims.FileOutputDirectory.enabled }}
        - name: RPI__FileOutput__Directory
          value: {{  .Values.storage.persistentVolumeClaims.FileOutputDirectory.mountPath | quote }}
        {{- end }}
        {{- if not (eq .Values.secretsManagement.provider "sdk") }}
        - name: CONNECTIONSTRINGS__LOGGINGDATABASE
          valueFrom:
            secretKeyRef:
              key: ConnectionString_Logging_Database
              name: {{ include "rpi.secrets.secretName" . | quote }}
        - name: CONNECTIONSTRINGS__OPERATIONALDATABASE
          valueFrom:
            secretKeyRef:
              key: ConnectionString_Operations_Database
              name: {{ include "rpi.secrets.secretName" . | quote }}
        {{- end }} 
        {{- if eq .Values.databases.operational.provider "postgresql" }}
        - name: RPI_OperationalDatabaseType
          value: "PostgreSQL"
        {{- end }}
        {{- if .Values.redpointAI.enabled }}
        - name: RPI__NLP__ApiBase
          value: {{ .Values.redpointAI.naturalLanguage.ApiBase | quote }} 
        - name: RPI__NLP__ApiVersion
          value: {{ .Values.redpointAI.naturalLanguage.ApiVersion | quote }}
        - name: RPI__NLP__ChatGptEngine
          value: {{ .Values.redpointAI.naturalLanguage.ChatGptEngine | quote }} 
        - name: RPI__NLP__ChatGptTemp
          value: {{ .Values.redpointAI.naturalLanguage.ChatGptTemp | quote }}
        - name: RPI__NLP__SearchEndpoint
          value: {{ .Values.redpointAI.cognitiveSearch.SearchEndpoint | quote }} 
        - name: RPI__NLP__EmbeddingsModel
          value: {{ .Values.redpointAI.modelStorage.EmbeddingsModel | quote }}
        - name: RPI__NLP__Model__ModelDimensions
          value: {{ .Values.redpointAI.modelStorage.ModelDimensions | quote }}
        - name: RPI__NLP__Model__ContainerName
          value: {{ .Values.redpointAI.modelStorage.ContainerName | quote }}
        - name: RPI__NLP__Model__BlobFolder
          value: {{ .Values.redpointAI.modelStorage.BlobFolder | quote }}
        {{- end }}
        {{- if .Values.redpointAI.enabled }}
        {{- if not (eq .Values.secretsManagement.provider "sdk") }}
        - name: RPI__NLP__ApiKey
          valueFrom:
            secretKeyRef:
              key:  RPI_NLP_API_KEY
              name: {{ include "rpi.secrets.secretName" . | quote }}
        - name: RPI__NLP__SearchKey
          valueFrom:
            secretKeyRef:
              key:  RPI_NLP_SEARCH_KEY
              name: {{ include "rpi.secrets.secretName" . | quote }}
        - name: RPI__NLP__Model__ConnectionString
          valueFrom:
            secretKeyRef:
              key:  RPI_NLP_MODEL_CONNECTION_STRING
              name: {{ include "rpi.secrets.secretName" . | quote }}
        {{- end }}
        {{- end }}
        - name: SeedService__MemoryCacheSize
          value: {{ $cfg.seedService.memoryCacheSize | quote }}
        - name: SeedService__MaxNumberRetries
          value: {{ $cfg.seedService.maxNumberRetries | quote }}
        - name: SeedService__MaxRetryDelay
          value: {{ $cfg.seedService.maxRetryDelay | quote }}
        image: {{ include "rpi.image" (dict "root" . "name" $name) }}
        imagePullPolicy: {{  .Values.global.deployment.images.imagePullPolicy | default "IfNotPresent" }}
        name: {{ $name }}
        {{- if $liveness.enabled }}
        livenessProbe:
          httpGet:
            path: {{ $liveness.httpGet.path }}
            port: {{ $liveness.httpGet.port }}
            scheme: {{ $liveness.httpGet.scheme }}
          initialDelaySeconds: {{ $liveness.initialDelaySeconds }}
          periodSeconds: {{ $liveness.periodSeconds }}
          timeoutSeconds: {{ $liveness.timeoutSeconds }}
          failureThreshold: {{ $liveness.failureThreshold }}
        {{- end }}
        {{- if $readiness.enabled }}
        readinessProbe:
          httpGet:
            path: {{ $readiness.httpGet.path }}
            port: {{ $readiness.httpGet.port }}
            scheme: {{ $readiness.httpGet.scheme }}
          initialDelaySeconds: {{ $readiness.initialDelaySeconds }}
          periodSeconds: {{ $readiness.periodSeconds }}
          failureThreshold: {{ $readiness.failureThreshold }}
          timeoutSeconds: {{ $readiness.timeoutSeconds }}
        {{- end }}
        {{- if $startup.enabled }}
        startupProbe:
          httpGet:
            path: {{ $startup.httpGet.path }}
            port: {{ $startup.httpGet.port }}
            scheme: {{ $startup.httpGet.scheme }}
          failureThreshold: {{ $startup.failureThreshold }}
          periodSeconds: {{ $startup.periodSeconds }}
          initialDelaySeconds: {{ $startup.initialDelaySeconds }}
          timeoutSeconds: {{ $startup.timeoutSeconds }}
        {{- end }}
        lifecycle:
          preStop:
            exec:
              command:
                - /bin/sh
                - -c
                - |
                  echo "[PreStop] Putting the Execution Service to Sleep...." 
                  curl -s http://localhost:8080/api/operations/sleep
                  while true; do
                    count=$(curl -s http://localhost:8080/metrics | grep '^execution_total_executing_count' | awk '{print $2}')
                    if [ "$count" = "" ]; then
                      echo "[preStop] Metric not found, assuming 0"
                      break
                    fi
                    if [ "$count" = "0" ]; then
                      echo "[preStop] No executing tasks. Proceeding with shutdown."
                      break
                    fi
                    echo "[preStop] Still executing ($count tasks). Sleeping..."
                    sleep 5
                  done
        ports:
        - containerPort: 8080
          name: web-port
          protocol: TCP
        {{- include "rpi.container.securityContext" (dict "sc" $secCtx) | nindent 8 }}
        {{- if $cfg.resources.enabled }}
        resources:
          {{- if and $cfg.resources.limits (ne $cfg.resources.limits.enabled false) }}
          limits:
            {{- with $cfg.resources.limits.cpu }}
            cpu: {{ . }}
            {{- end }}
            {{- with $cfg.resources.limits.memory }}
            memory: {{ . }}
            {{- end }}
          {{- end }}
          {{- if and $cfg.resources.requests (ne $cfg.resources.requests.enabled false) }}
          requests:
            {{- with $cfg.resources.requests.cpu }}
            cpu: {{ . }}
            {{- end }}
            {{- with $cfg.resources.requests.memory }}
            memory: {{ . }}
            {{- end }}
        {{- end }}
        {{- end }}
        volumeMounts:
          - name: tempstore
            mountPath: /tmp
          {{- if (($dw.bigquery | default dict).enabled | default false) }}
          {{- range .Values.databases.datawarehouse.bigquery.connections }}
          {{- if eq .credentialsType "serviceAccount" }}
          - name: {{ .configMapName | quote }}
            mountPath: {{ .ConfigMapFilePath }}/{{ .keyName }}
            subPath: {{ .keyName }}
            readOnly: true
          {{- end }}
          {{- end }}
          {{- end }}
          {{- if (($dw.snowflake | default dict).enabled | default false) }}
          {{- if eq .Values.databases.datawarehouse.snowflake.credentialsType "snowflake_jwt" }}
          {{- include "rpi.snowflake.volumeMount" . | nindent 10 }}
          {{- end }}
          {{- end }}
          {{- if .Values.storage.persistentVolumeClaims.FileOutputDirectory.enabled }}    
          - name: fileoutputdirectory
            mountPath: {{  .Values.storage.persistentVolumeClaims.FileOutputDirectory.mountPath | quote }}
          {{- end }}
          {{- if .Values.storage.persistentVolumeClaims.Plugins.enabled }}  
          - name: realtimeplugins
            mountPath: {{ .Values.storage.persistentVolumeClaims.Plugins.mountPath }}
          {{- end }}
          {{- if .Values.storage.persistentVolumeClaims.DataManagementUploadDirectory.enabled }}
          - name: rpdmuploaddirectory
            mountPath: {{ .Values.storage.persistentVolumeClaims.DataManagementUploadDirectory.mountPath }}
          {{- end }}
          {{- include "rpi.customCACerts.volumeMount" . | nindent 10 }}
      volumes:
        - name: tempstore
          emptyDir: {}
        {{- if (($dw.bigquery | default dict).enabled | default false) }}
        {{- range .Values.databases.datawarehouse.bigquery.connections }}
        {{- if eq .credentialsType "serviceAccount" }}
        - name: {{ .configMapName | quote }}
          configMap:
            name: {{ .configMapName | quote }}
        {{- end }}
        {{- end }}
        {{- end }}
        {{- if (($dw.snowflake | default dict).enabled | default false) }}
        {{- if eq .Values.databases.datawarehouse.snowflake.credentialsType "snowflake_jwt" }}
        {{- include "rpi.snowflake.volume" . | nindent 8 }}
        {{- end }}
        {{- end }}
        {{- if .Values.storage.persistentVolumeClaims.FileOutputDirectory.enabled }}
        - name: fileoutputdirectory
          persistentVolumeClaim:
            claimName: {{ .Values.storage.persistentVolumeClaims.FileOutputDirectory.claimName }}
        {{- end }}
        {{- if .Values.storage.persistentVolumeClaims.Plugins.enabled }}
        - name: realtimeplugins
          persistentVolumeClaim:
            claimName: {{ .Values.storage.persistentVolumeClaims.Plugins.claimName }}
        {{- end }}
        {{- if .Values.storage.persistentVolumeClaims.DataManagementUploadDirectory.enabled }}
        - name: rpdmuploaddirectory
          persistentVolumeClaim:
            claimName: {{ .Values.storage.persistentVolumeClaims.DataManagementUploadDirectory.claimName }}
        {{- end }}
        {{- include "rpi.customCACerts.volume" . | nindent 8 }}
      {{- if .Values.nodeSelector.enabled }}
      nodeSelector:
        {{ .Values.nodeSelector.key }}: {{ .Values.nodeSelector.value }}
      {{- end }}
      {{- if .Values.tolerations.enabled }}
      tolerations:
        - effect: NoSchedule
          key: {{ .Values.nodeSelector.key }}
          operator: Equal
          value: {{ .Values.nodeSelector.value }}
      {{- end }}
{{- end }}

